<script type="module">
// ── Phase 9：Firebase 初始化改由共用模組提供 ──

const reportId = urlParams.get('id');

window.onload = function() {

    if (user) {
      fetchReport(user.uid);
    } else {
      document.getElementById('loading-screen').classList.add('hidden');

};

// ================= XSS 防護 =================
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ================= TWA fallback matrix（僅類別 + 名稱）=================
// 如果 data/twa-matrix.json fetch 失敗，還能保底把需求名跟類別渲染出來

  { v: '利他', n: '同事氣氛', indicators: [] }, { v: '利他', n: '社會貢獻', indicators: [] }, { v: '利他', n: '價值契合', indicators: [] },
  { v: '安全', n: '制度合理', indicators: [] }, { v: '安全', n: '主管領導', indicators: [] }, { v: '安全', n: '主管專業', indicators: [] },
  { v: '自主', n: '發揮創意', indicators: [] }, { v: '自主', n: '責任擔當', indicators: [] }
];

// ================= 類別顏色設定（對齊 twa.html CAT_CONFIG）=================
const CAT_COLOR = {
  '成就': { bg:'bg-teal-50',    fg:'text-teal-700',    border:'border-teal-100',    dot:'#14b8a6' },
  '舒適': { bg:'bg-sky-50',     fg:'text-sky-700',     border:'border-sky-100',     dot:'#0ea5e9' },
  '地位': { bg:'bg-violet-50',  fg:'text-violet-700',  border:'border-violet-100',  dot:'#8b5cf6' },
  '利他': { bg:'bg-emerald-50', fg:'text-emerald-700', border:'border-emerald-100', dot:'#10b981' },
  '安全': { bg:'bg-amber-50',   fg:'text-amber-700',   border:'border-amber-100',   dot:'#f59e0b' },
  '自主': { bg:'bg-rose-50',    fg:'text-rose-700',    border:'border-rose-100',    dot:'#f43f5e' }
};

// ================= 三態 + 九格分類演算法 =================
function classifyNeed(current, ideal) {
  if (ideal === 0 && current === 0) return null; // 未評分

  // 三態：差距 >= 2 才分渴望/盈餘
  let tier;
  if (ideal - current >= 2) tier = '渴望';
  else if (current - ideal >= 2) tier = '盈餘';
  else tier = '平衡';

  // 九格
  const idealBand = ideal >= 8 ? 'high' : (ideal >= 5 ? 'mid' : 'low');
  const currentBand = current >= 8 ? 'high' : (current >= 5 ? 'mid' : 'low');
  const key = idealBand + '-' + currentBand;

  const QUAD_MAP = {
    'high-low':  { name:'強烈渴望',     emoji:'🔥', short:'🔥 強烈渴望' },
    'high-mid':  { name:'仍想更好',     emoji:'📈', short:'📈 仍想更好' },
    'high-high': { name:'理想完全實現', emoji:'🌟', short:'🌟 理想完全實現' },
    'mid-low':   { name:'隱性不滿',     emoji:'🌱', short:'🌱 隱性不滿' },
    'mid-mid':   { name:'平衡中性',     emoji:'⚖', short:'⚖ 平衡中性' },
    'mid-high':  { name:'額外加分',     emoji:'🎁', short:'🎁 額外加分' },
    'low-low':   { name:'無感地帶',     emoji:'—', short:'— 無感地帶' },
    'low-mid':   { name:'多出來的',     emoji:'🌊', short:'🌊 多出來的' },
    'low-high':  { name:'不需要卻擁有', emoji:'💎', short:'💎 不需要卻擁有' }
  };

  return { tier, quadrant: QUAD_MAP[key], quadrantKey: key };
}

// 三態顯示對照
const TIER_STYLE = {
  '渴望': { chipClass:'tier-want',    pointColor:'#f97316', label:'渴望' },
  '平衡': { chipClass:'tier-balance', pointColor:'#64748b', label:'平衡' },
  '盈餘': { chipClass:'tier-surplus', pointColor:'#0d9488', label:'盈餘' }
};

// ================= 核心啟動邏輯 =================
async function fetchReport(currentUid) {
  if (!reportId) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
    return;
  }

  try {
    // 並行 fetch assessment 與 twa-matrix.json
    const [docSnap, matrixRes] = await Promise.all([
      getDoc(doc(db, "assessments", reportId)),
      fetch('data/twa-matrix.json').catch(() => null)
    ]);

    if (!docSnap.exists()) throw new Error("Report not found");

    const data = docSnap.data();

    // ⭐ 權限判斷：本人 / Super Admin / 綁定諮詢師（受 counselorAccess 控制）
    // ⭐ Phase 8：H4 fail-safe — data.uid 為空時直接拒絕（避免任何登入者都能看的漏洞）
    // ⭐ Phase 8：S1 — 學員可用「取消授權」即時撤回一般諮詢師的可見性，但 Super Admin 永遠看得到
    if (!data.uid) {
      // fail-safe：assessment 沒有 uid 欄位（早期測試資料），拒絕
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('error-screen').classList.remove('hidden');
      return;
    }
    if (data.uid !== currentUid) {
      let canView = false;
      try {
        const cSnap = await getDoc(doc(db, 'counselors', currentUid));
        if (cSnap.exists() && cSnap.data().isActive !== false) {
          const isAdmin = cSnap.data().isSuperAdmin === true;
          if (isAdmin) {
            // Super Admin 永遠可看（繞過 counselorAccess）
            canView = true;
          } else if (data.assignedCounselorUid === currentUid) {
            // 一般諮詢師：必須是被綁定那位，且學員未取消授權
            // counselorAccess 預設 true（白板邀請）；學員按取消授權 → false
            canView = data.counselorAccess !== false;
          }
        }
      } catch(e) {}
      if (!canView) {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('error-screen').classList.remove('hidden');
        return;
      }
    }

    // 解析 matrix
    let matrix = TWA_FALLBACK_MATRIX;
    if (matrixRes && matrixRes.ok) {
      try {
        const j = await matrixRes.json();
        if (Array.isArray(j) && j.length === 20) {
          matrix = j;
        } else if (j && Array.isArray(j.matrix) && j.matrix.length === 20) {
          // 相容 { matrix: [...] } 格式
          matrix = j.matrix;
        }
      } catch(e) {
        console.warn('twa-matrix.json 解析失敗，使用 fallback', e);
      }
    }

    if (data.toolType === "HTI") {
      renderHTIReport(data);
    } else {
      renderTWAReport(data, matrix);
    }

    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('report-content').classList.remove('hidden');

  } catch (error) {
    console.error(error);
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
  }
}

// ================= TWA 渲染引擎（全新）=================
function renderTWAReport(data, matrix) {
  document.title = "職涯需求覺察報告 | 原味藍圖";

  const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('zh-TW') : new Date().toLocaleDateString('zh-TW');
  const userName = data.clientInfo?.name || data.name || "探索者";
  const rawData = data.rawData || {};
  const scores = rawData.scores || {};
  const currentScores = rawData.currentScores || {};
  const selectedItems = rawData.selectedItems || {};
  const insight = rawData.insight || '';
  const focusType = rawData.focusType || '精準分析';
  const goal = data.clientInfo?.goal || rawData.goal || '';

  // ─── 計算每個 need 的分類與資料 ───
  const needRows = [];
  const tierCounts = { '渴望': 0, '平衡': 0, '盈餘': 0 };
  const quadCounts = {};
  const quadrantMembers = {};
  let unscoredCount = 0;

  matrix.forEach((m, idx) => {
    const id = 'n' + idx;
    const cur = Number(currentScores[id]) || 0;
    const ide = Number(scores[id]) || 0;
    const cls = classifyNeed(cur, ide);
    const selList = selectedItems[id] || [];
    const totalInd = Array.isArray(m.indicators) ? m.indicators.length : 0;

    const row = {
      id, idx, name: m.n, cat: m.v,
      current: cur, ideal: ide,
      gap: ide - cur,
      selectedCount: selList.length,
      totalIndicators: totalInd,
      selected: selList,
      cls: cls
    };
    needRows.push(row);

    if (cls === null) { unscoredCount++; return; }
    tierCounts[cls.tier] = (tierCounts[cls.tier] || 0) + 1;
    quadCounts[cls.quadrantKey] = (quadCounts[cls.quadrantKey] || 0) + 1;
    if (!quadrantMembers[cls.quadrantKey]) quadrantMembers[cls.quadrantKey] = [];
    quadrantMembers[cls.quadrantKey].push(row);
  });

  const total = matrix.length;
  const scoredCount = total - unscoredCount;
  const totalSelected = needRows.reduce((a, r) => a + r.selectedCount, 0);

  // 進階指標數
  let advancedSelected = 0;
  needRows.forEach(r => {
    const m = matrix[r.idx];
    if (!m || !Array.isArray(m.indicators)) return;
    r.selected.forEach(txt => {
      const ind = m.indicators.find(i => i.text === txt || i.label === txt);
      if (ind && Number(ind.weight) >= 2) advancedSelected++;
    });
  });

  // Top5
  const top5 = needRows.filter(r => r.ideal > 0)
    .slice().sort((a, b) => b.ideal - a.ideal).slice(0, 5);

  // 六大類雷達數值
  const CATS = ['成就', '舒適', '地位', '利他', '安全', '自主'];
  const idealByCat = {};
  const currentByCat = {};
  CATS.forEach(cat => {
    const items = needRows.filter(r => r.cat === cat);
    if (items.length === 0) { idealByCat[cat] = 0; currentByCat[cat] = 0; return; }
    const ideSum = items.reduce((a, x) => a + x.ideal, 0);
    const curSum = items.reduce((a, x) => a + x.current, 0);
    idealByCat[cat] = Math.round((ideSum / (items.length * 10)) * 100);
    currentByCat[cat] = Math.round((curSum / (items.length * 10)) * 100);
  });

  // ── 雷達解讀：類別層級 + 具體需求層級 ──
  const gapByCat = {};
  CATS.forEach(c => { gapByCat[c] = idealByCat[c] - currentByCat[c]; });
  const sortedByGap = Object.entries(gapByCat).slice().sort((a, b) => b[1] - a[1]);
  const topCatsGap = sortedByGap.filter(e => e[1] > 10).slice(0, 2);

  let catReadingHtml;
  if (topCatsGap.length >= 2) {
    catReadingHtml = '落差最明顯的類別是 <strong class="text-orange-600">' + escHtml(topCatsGap[0][0]) + '</strong>（落差 ' + topCatsGap[0][1] + '%）與 <strong class="text-orange-600">' + escHtml(topCatsGap[1][0]) + '</strong>（落差 ' + topCatsGap[1][1] + '%）';
  } else if (topCatsGap.length === 1) {
    catReadingHtml = '落差最明顯的類別是 <strong class="text-orange-600">' + escHtml(topCatsGap[0][0]) + '</strong>（落差 ' + topCatsGap[0][1] + '%）';
  } else {
    catReadingHtml = '各類別之間的落差都在 10% 以內，整體屬於均衡狀態';
  }

  // 具體需求層級：「缺口」前 3 名（只看 ideal > current 的項目）
  const topGaps = needRows
    .filter(r => r.cls !== null && r.gap > 0)
    .slice()
    .sort((a, b) => b.gap - a.gap)
    .slice(0, 3);

  let topGapsHtml = '';
  topGaps.forEach((r, i) => {
    const cat = CAT_COLOR[r.cat] || { bg: 'bg-slate-50', fg: 'text-slate-600', border: 'border-slate-100' };

      '<div class="flex items-center justify-between gap-2 py-2 border-b border-slate-200 last:border-0">' +
        '<div class="flex items-center gap-2 min-w-0 flex-1">' +
          '<span class="text-xs font-black text-slate-400 w-4">' + (i + 1) + '.</span>' +
          '<span class="font-black text-slate-800 text-sm">' + escHtml(r.name) + '</span>' +
          '<span class="inline-flex items-center text-[10px] font-black px-1.5 py-0.5 rounded ' + cat.bg + ' ' + cat.fg + ' border ' + cat.border + '">' + escHtml(r.cat) + '</span>' +
        '</div>' +
        '<div class="flex items-center gap-3 text-xs flex-shrink-0">' +
          '<span class="text-slate-400">現 <span class="font-bold text-slate-700">' + r.current + '</span></span>' +
          '<span class="text-slate-400">理 <span class="font-black text-teal-600">' + r.ideal + '</span></span>' +
          '<span class="text-sm font-black text-orange-600 whitespace-nowrap">缺 ' + r.gap + ' 分</span>' +
        '</div>' +
      '</div>';
  });

  const gapsBlockHtml = topGapsHtml
    ? '<div class="bg-orange-50/40 rounded-2xl p-3 border border-orange-100">' + topGapsHtml + '</div>'
    : '<div class="text-sm text-slate-500 italic py-2">目前沒有明顯的需求缺口，你的理想與現況大致匹配。</div>';

  const radarReading =
    '<div class="space-y-5">' +
      '<div>' +
        '<div class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-2">類別層級</div>' +
        '<p class="text-slate-700 leading-loose">' + catReadingHtml + '。這反映了這幾個面向的<strong>整體氛圍</strong>是你目前主要的缺口或養分源。</p>' +
      '</div>' +
      '<div>' +
        '<div class="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-2">具體需求層級 · 缺口前三名</div>' +
        gapsBlockHtml +
      '</div>' +
      '<div class="pt-4 border-t border-slate-200">' +
        '<p class="text-slate-600 text-sm leading-loose">類別層級反映<strong>「整體氛圍」</strong>，具體需求是<strong>「當下最有感的痛點」</strong>，兩者不一定完全一致。建議從具體需求切入覺察，再對照類別層級理解結構性成因。</p>' +
      '</div>' +
    '</div>';

  // 三態總結句（摘要裡使用）
  const sortedTier = Object.entries(tierCounts).slice().sort((a, b) => b[1] - a[1]);
  const dominantTier = sortedTier[0][0];
  const allEqual = sortedTier.every(([, v]) => v === sortedTier[0][1]);

  let tierSummary;
  if (scoredCount === 0) {
    tierSummary = '本次評測尚未完成，請完成後再查看分析。';
  } else if (allEqual) {
    tierSummary = '你的需求分布均衡，沒有單一主導狀態。這種狀態通常出現在對自身需求已有清晰了解、能理性看待得失的人身上。';
  } else if (dominantTier === '渴望') {
    tierSummary = '你現在處於<strong class="text-orange-600">「追求更好」</strong>的階段，有多項需求尚未被環境滿足。這是改變的起點，也是動能最強的時候。';
  } else if (dominantTier === '平衡') {
    tierSummary = '你<strong class="text-slate-700">大致處於適配的狀態</strong>，沒有明顯的壓力點，但也少了明確的動能。適合此時思考：下一個階段想往哪裡走？';
  } else {
    tierSummary = '你的環境給你的<strong class="text-teal-700">比你需要的多</strong>。可以思考：什麼是你真正不能放棄的？什麼其實是「陷在舒適圈」而非真正渴望？';
  }

  // ─── 組 HTML ───
  const parts = [];
  parts.push(renderTwaHero(userName, dateStr, goal));
  parts.push(renderSummaryCard(focusType, scoredCount, total, totalSelected, advancedSelected, tierCounts, tierSummary, quadCounts, top5));
  parts.push(renderRadarSection(radarReading));
  parts.push(renderQuadrantGrid(quadCounts, quadrantMembers));
  parts.push(renderDetailTable(needRows));
  parts.push(renderIndicatorsSummary(needRows));
  if (insight && insight.trim()) parts.push(renderInsight(insight));
  parts.push(renderTwaCTA());

  document.getElementById('report-content').innerHTML = parts.join('');

  lucide.createIcons();
  drawRadarChart(idealByCat, currentByCat);
  drawScatterChart(needRows);
  setupQuadrantToggle();
}

  return '' +

        '<div class="flex-shrink-0">' +
          '<div class="text-[10px] font-black text-teal-700 tracking-widest uppercase mb-1">決策狀態</div>' +

function renderDetailTable(needRows) {
  const CATS = ['成就', '舒適', '地位', '利他', '安全', '自主'];

  // 按 cat 分組
  const byCat = {};
  CATS.forEach(c => { byCat[c] = []; });
  needRows.forEach(r => {
    if (byCat[r.cat]) byCat[r.cat].push(r);
    else {
      if (!byCat['其他']) byCat['其他'] = [];
      byCat['其他'].push(r);
    }
  });
  const allCats = CATS.concat(byCat['其他'] ? ['其他'] : []);

  // 同組內部排序：缺口（大→小）→ 持平 → 盈餘（大→小）→ 未評分
  const sortFn = (a, b) => {
    if (a.cls === null && b.cls !== null) return 1;
    if (a.cls !== null && b.cls === null) return -1;
    if (a.cls === null && b.cls === null) return a.idx - b.idx;
    const aPri = a.gap > 0 ? 1 : (a.gap === 0 ? 2 : 3);
    const bPri = b.gap > 0 ? 1 : (b.gap === 0 ? 2 : 3);
    if (aPri !== bPri) return aPri - bPri;
    return Math.abs(b.gap) - Math.abs(a.gap);
  };

  const renderGapCell = (r) => {
    if (r.cls === null) return '<span class="text-slate-300">—</span>';
    if (r.gap > 0) return '<span class="font-black text-orange-600 whitespace-nowrap">缺 ' + r.gap + ' 分</span>';
    if (r.gap < 0) return '<span class="font-black text-teal-600 whitespace-nowrap">' + Math.abs(r.gap) + ' 分</span>';
    return '<span class="font-bold text-slate-400">0 分</span>';
  };
  const renderGapBadge = (r) => {
    if (r.cls === null) return '<span class="text-xs font-bold text-slate-400">未評分</span>';
    if (r.gap > 0) return '<span class="text-xs font-black text-orange-600">缺 ' + r.gap + ' 分</span>';
    if (r.gap < 0) return '<span class="text-xs font-black text-teal-600">盈餘 ' + Math.abs(r.gap) + ' 分</span>';
    return '<span class="text-xs font-bold text-slate-400">持平</span>';
  };
  const renderQuadCell = (r) => {
    return r.cls === null
      ? '<span class="text-xs text-slate-400 font-bold">未評分</span>'
      : '<span class="text-sm font-bold text-slate-700">' + r.cls.quadrant.short + '</span>';
  };

  // 類別小計：缺 N · 足 M · 持平 K · 未評 L（只顯示 > 0 的）
  const renderCatSummary = (items) => {
    const deficit = items.filter(r => r.cls !== null && r.gap > 0).length;
    const surplus = items.filter(r => r.cls !== null && r.gap < 0).length;
    const even = items.filter(r => r.cls !== null && r.gap === 0).length;
    const unscored = items.filter(r => r.cls === null).length;
    const parts = [];
    if (deficit > 0) parts.push('<span class="text-orange-600 font-black">缺 ' + deficit + ' 項</span>');
    if (surplus > 0) parts.push('<span class="text-teal-600 font-black">足 ' + surplus + ' 項</span>');
    if (even > 0) parts.push('<span class="text-slate-500 font-bold">持平 ' + even + ' 項</span>');
    if (unscored > 0) parts.push('<span class="text-slate-400 font-bold">未評 ' + unscored + ' 項</span>');
    return parts.join('　·　');
  };

  // 桌機 table body（多段 tbody style，用 colspan header row）
  let desktopBody = '';
  allCats.forEach(c => {
    const items = byCat[c] || [];
    if (items.length === 0) return;
    const cat = CAT_COLOR[c] || { bg: 'bg-slate-50', fg: 'text-slate-600', border: 'border-slate-100' };
    const items_sorted = items.slice().sort(sortFn);

    desktopBody +=
      '<tr class="cat-group-header">' +
        '<td colspan="5" class="!bg-slate-50/80 border-t-2 border-b border-slate-200 !py-2">' +
          '<div class="flex items-center justify-between flex-wrap gap-3 px-1">' +
            '<div class="flex items-center gap-2">' +
              '<span class="inline-flex items-center text-xs font-black px-2.5 py-1 rounded-lg ' + cat.bg + ' ' + cat.fg + ' border ' + cat.border + '">' + escHtml(c) + '類</span>' +
              '<span class="text-[11px] text-slate-400 font-bold">共 ' + items.length + ' 項</span>' +
            '</div>' +
            '<div class="text-xs flex items-center flex-wrap gap-x-1">' + renderCatSummary(items) + '</div>' +
          '</div>' +
        '</td>' +
      '</tr>';

    items_sorted.forEach(r => {
      const isUnscored = r.cls === null;
      const curTxt = isUnscored && r.current === 0 ? '—' : r.current;
      const ideTxt = isUnscored && r.ideal === 0 ? '—' : r.ideal;

      desktopBody +=
        '<tr' + (isUnscored ? ' class="unscored"' : '') + '>' +
          '<td><div class="font-black text-slate-800 pl-4">' + escHtml(r.name) + '</div></td>' +
          '<td><span class="font-bold text-slate-500">' + curTxt + '</span></td>' +
          '<td><span class="font-black text-teal-600">' + ideTxt + '</span></td>' +
          '<td>' + renderGapCell(r) + '</td>' +
          '<td>' + renderQuadCell(r) + '</td>' +
        '</tr>';
    });
  });

  // 手機：每類一個 section
  let mobileBody = '';
  allCats.forEach(c => {
    const items = byCat[c] || [];
    if (items.length === 0) return;
    const cat = CAT_COLOR[c] || { bg: 'bg-slate-50', fg: 'text-slate-600', border: 'border-slate-100' };
    const items_sorted = items.slice().sort(sortFn);

    mobileBody +=
      '<div class="mb-5 last:mb-0">' +
        '<div class="flex items-center justify-between flex-wrap gap-2 mb-3 pb-2 border-b-2 border-slate-100">' +
          '<div class="flex items-center gap-2">' +
            '<span class="inline-flex items-center text-xs font-black px-2.5 py-1 rounded-lg ' + cat.bg + ' ' + cat.fg + ' border ' + cat.border + '">' + escHtml(c) + '類</span>' +
            '<span class="text-[10px] text-slate-400 font-bold">共 ' + items.length + ' 項</span>' +
          '</div>' +
          '<div class="text-[10px] flex items-center flex-wrap gap-x-1">' + renderCatSummary(items) + '</div>' +
        '</div>' +
        '<div class="flex flex-col gap-2">';

    items_sorted.forEach(r => {
      const isUnscored = r.cls === null;
      const curTxt = isUnscored && r.current === 0 ? '—' : r.current;
      const ideTxt = isUnscored && r.ideal === 0 ? '—' : r.ideal;
      const quadBadge = isUnscored ? '' : '<span class="text-[11px] font-bold text-slate-700">' + r.cls.quadrant.short + '</span>';

      mobileBody +=
        '<div class="p-3 rounded-xl border border-slate-100 ' + (isUnscored ? 'bg-slate-50/60 opacity-70' : 'bg-white') + '">' +
          '<div class="flex items-start justify-between mb-2 gap-2">' +
            '<div class="font-black text-slate-800 text-sm">' + escHtml(r.name) + '</div>' +
            '<div class="flex-shrink-0">' + renderGapBadge(r) + '</div>' +
          '</div>' +
          '<div class="flex items-center gap-3 text-xs flex-wrap">' +
            '<div><span class="text-[10px] text-slate-400 font-bold">現況</span> <span class="font-bold text-slate-600 ml-1">' + curTxt + '</span></div>' +
            '<div><span class="text-[10px] text-slate-400 font-bold">理想</span> <span class="font-black text-teal-600 ml-1">' + ideTxt + '</span></div>' +
            (quadBadge ? '<div class="ml-auto">' + quadBadge + '</div>' : '') +
          '</div>' +
        '</div>';
    });

    mobileBody += '</div></div>';
  });

  return '' +
    '<div class="bg-white rounded-[3rem] p-8 lg:p-12 border border-slate-200 shadow-sm mb-8">' +
      '<div class="flex items-center gap-3 mb-6">' +
        '<div class="w-10 h-10 rounded-2xl bg-teal-50 border border-teal-100 flex items-center justify-center text-teal-600"><i data-lucide="list-checks" class="w-5 h-5"></i></div>' +
        '<div>' +
          '<div class="text-[10px] font-black text-teal-600 tracking-[0.3em] uppercase">Full Breakdown</div>' +
          '<h3 class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight">20 項需求完整明細</h3>' +
          '<div class="text-xs text-slate-500 mt-1">依六大心理需求分類，每類內部先顯示匱乏項（橘色）、再顯示充足項（綠色）</div>' +
        '</div>' +
      '</div>' +
      // 桌機
      '<div class="hidden md:block overflow-x-auto">' +
        '<table class="detail-table w-full">' +
          '<thead><tr>' +
            '<th>需求</th><th>現況</th><th>理想</th><th>落差</th><th>象限</th>' +
          '</tr></thead>' +
          '<tbody>' + desktopBody + '</tbody>' +
        '</table>' +
      '</div>' +
      // 手機
      '<div class="md:hidden">' + mobileBody + '</div>' +
    '</div>';
}

function renderIndicatorsSummary(needRows) {
  // 只顯示有選指標的，按落差絕對值降序
  const rows = needRows
    .filter(r => r.selectedCount > 0 && r.cls !== null)
    .slice()
    .sort((a, b) => Math.abs(b.gap) - Math.abs(a.gap));

  if (rows.length === 0) {
    return '' +
      '<div class="bg-white rounded-[3rem] p-8 lg:p-12 border border-slate-200 shadow-sm mb-8">' +
        '<div class="flex items-center gap-3 mb-4">' +
          '<div class="w-10 h-10 rounded-2xl bg-teal-50 border border-teal-100 flex items-center justify-center text-teal-600"><i data-lucide="flag" class="w-5 h-5"></i></div>' +
          '<div>' +
            '<div class="text-[10px] font-black text-teal-600 tracking-[0.3em] uppercase">Chosen Indicators</div>' +
            '<h3 class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight">環境指標選擇彙整</h3>' +
          '</div>' +
        '</div>' +
        '<p class="text-slate-500 text-sm italic">（此次評測未勾選任何環境指標）</p>' +
      '</div>';
  }

  // 組純文字版本（供「複製全部」+「分區複製」使用）
  window.__indicatorSectionTexts = {};
  const textParts = [];
  rows.forEach((r, idx) => {

// 九格背景繪製 plugin
const quadBgPlugin = {
  id: 'quadBg',
  beforeDatasetsDraw(chart) {
    const { ctx, chartArea, scales: { x, y } } = chart;
    if (!chartArea) return;

    const QUAD_BG_TIER = {
      'high-low': '渴望',   'high-mid': '渴望',   'high-high': '平衡',
      'mid-low':  '渴望',   'mid-mid':  '平衡',   'mid-high':  '盈餘',
      'low-low':  '平衡',   'low-mid':  '盈餘',   'low-high':  '盈餘'
    };
    const TIER_BG_COLOR = {
      '渴望': 'rgba(249, 115, 22, 0.08)',
      '平衡': 'rgba(148, 163, 184, 0.08)',
      '盈餘': 'rgba(13, 148, 136, 0.08)'
    };
    const BAND_RANGE = {
      'low':  [0, 4.5],
      'mid':  [4.5, 7.5],
      'high': [7.5, 10]
    };

    Object.keys(QUAD_BG_TIER).forEach(key => {
      const [yBand, xBand] = key.split('-');
      const [xFrom, xTo] = BAND_RANGE[xBand];
      const [yFrom, yTo] = BAND_RANGE[yBand];
      const px1 = x.getPixelForValue(xFrom);
      const px2 = x.getPixelForValue(xTo);
      const py1 = y.getPixelForValue(yTo);   // top of cell (higher y value → smaller pixel)
      const py2 = y.getPixelForValue(yFrom); // bottom
      ctx.save();
      ctx.fillStyle = TIER_BG_COLOR[QUAD_BG_TIER[key]];
      ctx.fillRect(px1, py1, px2 - px1, py2 - py1);
      ctx.restore();
    });

    // 九格分隔線（band 邊界）
    ctx.save();
    ctx.strokeStyle = 'rgba(148, 163, 184, 0.35)';
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1;
    [4.5, 7.5].forEach(v => {
      const px = x.getPixelForValue(v);
      ctx.beginPath();
      ctx.moveTo(px, chartArea.top);
      ctx.lineTo(px, chartArea.bottom);
      ctx.stroke();
      const py = y.getPixelForValue(v);
      ctx.beginPath();
      ctx.moveTo(chartArea.left, py);
      ctx.lineTo(chartArea.right, py);
      ctx.stroke();
    });
    ctx.restore();
  }
};

function drawScatterChart(needRows) {
  const ctx = document.getElementById('reportScatterChart');
  if (!ctx) return;

  // 按 tier 分三個 dataset
  const byTier = { '渴望': [], '平衡': [], '盈餘': [] };
  needRows.forEach(r => {
    if (r.cls === null) return;
    byTier[r.cls.tier].push({
      x: r.current,
      y: r.ideal,
      name: r.name,
      cat: r.cat,
      current: r.current,
      ideal: r.ideal,
      gap: r.gap,
      quad: r.cls.quadrant.short
    });
  });

  // 重疊點檢測：同座標多個點時，把它們各自小偏移
  const jitter = (pts) => {
    const groups = {};
    pts.forEach(p => {
      const key = p.x + ',' + p.y;
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });
    Object.values(groups).forEach(grp => {
      if (grp.length === 1) return;
      const radius = 0.18;
      grp.forEach((p, i) => {
        const angle = (i / grp.length) * Math.PI * 2;
        // clamp 到 [0.15, 9.85]，避免偏移跑出座標軸 0-10 被 Chart.js 剪掉
        p._dispX = Math.max(0.15, Math.min(9.85, p.x + Math.cos(angle) * radius));
        p._dispY = Math.max(0.15, Math.min(9.85, p.y + Math.sin(angle) * radius));
      });
    });
    pts.forEach(p => {
      if (p._dispX !== undefined) { p.x = p._dispX; p.y = p._dispY; }
    });
  };
  Object.values(byTier).forEach(arr => jitter(arr));

  const datasets = [
    { label: '渴望', data: byTier['渴望'], backgroundColor: '#f97316', borderColor: '#ea580c', pointRadius: 6, pointHoverRadius: 9, borderWidth: 1.5 },
    { label: '平衡', data: byTier['平衡'], backgroundColor: '#64748b', borderColor: '#475569', pointRadius: 6, pointHoverRadius: 9, borderWidth: 1.5 },
    { label: '盈餘', data: byTier['盈餘'], backgroundColor: '#0d9488', borderColor: '#0f766e', pointRadius: 6, pointHoverRadius: 9, borderWidth: 1.5 }
  ];

  new Chart(ctx, {
    type: 'scatter',
    data: { datasets: datasets },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: {
          min: 0, max: 10,
          title: { display: true, text: '現況滿意度', font: { family: 'Noto Sans TC', weight: 'bold', size: 12 }, color: '#64748b' },
          ticks: { stepSize: 1, font: { family: 'Noto Sans TC' }, color: '#94a3b8' },
          grid: { color: 'rgba(226, 232, 240, 0.4)' }
        },
        y: {
          min: 0, max: 10,
          title: { display: true, text: '理想期待值', font: { family: 'Noto Sans TC', weight: 'bold', size: 12 }, color: '#64748b' },
          ticks: { stepSize: 1, font: { family: 'Noto Sans TC' }, color: '#94a3b8' },
          grid: { color: 'rgba(226, 232, 240, 0.4)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          titleFont: { family: 'Noto Sans TC', weight: 'bold' },
          bodyFont: { family: 'Noto Sans TC' },
          padding: 12,
          cornerRadius: 12,
          displayColors: false,
          callbacks: {
            title: (items) => items[0]?.raw?.name || '',
            label: (item) => {
              const p = item.raw;
              return [
                p.cat + ' 類',
                '現況 ' + p.current + ' → 理想 ' + p.ideal,
                p.quad
              ];
            }
          }
        }
      }
    },
    plugins: [quadBgPlugin]
  });
}

// ===== 複製功能：共用底層 + 兩個 inline onclick handler =====
function __doClipboardCopy(text, btn, successLabel) {
  if (!text) return;
  const labelEl = btn.querySelector('.copy-label');
  const origText = labelEl ? labelEl.textContent : '';
  const successText = successLabel || '已複製！';
  const restore = () => {
    if (labelEl) labelEl.textContent = origText;
    btn.classList.remove('bg-teal-100', 'text-teal-800');
  };
  const showSuccess = () => {
    if (labelEl) labelEl.textContent = successText;
    btn.classList.add('bg-teal-100', 'text-teal-800');
    setTimeout(restore, 1800);
  };
  const showFail = () => {
    if (labelEl) labelEl.textContent = '複製失敗';
    setTimeout(restore, 1800);
  };

  function fallbackCopy(t) {
    try {
      const ta = document.createElement('textarea');
      ta.value = t;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch(e) {
      return false;
    }
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
      fallbackCopy(text) ? showSuccess() : showFail();
    });
  } else {
    fallbackCopy(text) ? showSuccess() : showFail();
  }
}

// 複製所有環境指標（「複製全部」按鈕）
window.copyIndicators = function(btn) {
  const text = window.__indicatorsCopyText || '';

window.copyIndicatorSection = function(btn, sectionId) {
  const text = (window.__indicatorSectionTexts || {})[sectionId] || '';
  __doClipboardCopy(text, btn);
