// ═══════════ M5 甄選流程設計書 ═══════════
function renderM5(area){
  moduleHeader(area,'m5');
  // 候選人流程資訊（H）
  const info=c.fields['m5.candidate_process_info']?.value||{};
  const infoWrap=el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-5');
  infoWrap.innerHTML='<div class="font-bold text-navy mb-3">候選人流程資訊（這幾項留給你填）</div>';
  const grid=el('div','grid sm:grid-cols-2 gap-3');
  F.M5_CANDIDATE_INFO_FIELDS.forEach(col=>{
    const w=el('div');w.innerHTML=`<label class="block text-sm font-semibold text-navy mb-1">${col.name}</label>`;
    let inp;
    if(col.type==='select'){inp=el('select','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm bg-white');inp.innerHTML='<option value="">—</option>'+col.options.map(o=>`<option ${info[col.key]===o?'selected':''}>${o}</option>`).join('');}
    else if(col.type==='textarea'){inp=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm');inp.value=info[col.key]||'';}
    else{inp=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm');inp.value=info[col.key]||'';}
    inp.disabled=readOnly();
    const upd=()=>{info[col.key]=inp.value;S.saveField(c,'m5.candidate_process_info',{...info},'user_input');save();};
    inp.addEventListener('input',upd);inp.addEventListener('change',upd);
    w.appendChild(inp);grid.appendChild(w);
  });
  infoWrap.appendChild(grid);area.appendChild(infoWrap);

  const genBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg font-semibold hover:bg-tealdeep mb-4','<i data-lucide="list-checks" class="w-4 h-4"></i>產生甄選流程建議');
  genBtn.disabled=readOnly();
  area.appendChild(genBtn);
  const preview=el('div');area.appendChild(preview);

  /** 產生一次草稿並存起來。之後的 paint() 只讀存好的內容，不再重跑，免得蓋掉人工修改。 */
  function generate(){
    const r=AI.runM5(confirmedM3());
    S.recordAiJob(c,'M5-01');S.recordAiJob(c,'M5-02');S.recordAiJob(c,'M5-03');
    S.saveField(c,'m5.process_steps',r.organized_content['m5.process_steps'],'ai_inference','M5-01');
    S.saveField(c,'m5.interview_questions',r.organized_content['m5.interview_questions'],'ai_inference','M5-02');
    S.saveField(c,'m5.behavior_anchors',r.organized_content['m5.behavior_anchors']||[],'ai_inference','M5-03');
    save();paint();
  }

  function paint(){
    const P=F.M5_PROCESS_TABLE, Q=F.M5_QUESTION_TABLE;
    const steps=c.fields['m5.process_steps']?.value||[];
    const qs=c.fields['m5.interview_questions']?.value||[];
    const anchors=c.fields['m5.behavior_anchors']?.value||[];
    preview.innerHTML='';
    if(!steps.length && !qs.length){
      preview.appendChild(el('p','text-sm text-navy/45','還沒有草稿。按上面的按鈕產生一份，產生後每一格都可以直接改。'));
      return;
    }

    // 三張表都用可編輯的編輯器，不是唯讀 HTML。欄位多的會自動變成卡片式。
    const box=(title,node,hint)=>{
      const w=el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3');
      w.innerHTML=`<h3 class="font-bold text-navy mb-1">${title}</h3>`+
        (hint?`<p class="text-xs text-navy/45 mb-3">${hint}</p>`:'<div class="mb-3"></div>');
      w.appendChild(node); preview.appendChild(w); return w;
    };

    box(P.name, repeatEditor(P,steps,false,rows=>{S.saveField(c,'m5.process_steps',rows,'user_input');save();}),
      '階段可以增減、改名，順序不對就直接改。');
    // 二十幾張卡片攤平在一頁會看不下去。改成依職能分組、預設收合，
    // 一次只展開正在看的那一項。
    const qBox=el('div');
    const byComp=new Map();
    qs.forEach((q,idx)=>{ const k=q.competency||'其他'; if(!byComp.has(k))byComp.set(k,[]); byComp.get(k).push({q,idx}); });
    const saveQs=()=>{S.saveField(c,'m5.interview_questions',qs,'user_input');save();};
    byComp.forEach((items,comp)=>{
      const d=el('details','rounded-xl border border-navy/12 bg-white mb-2 overflow-hidden');
      const lv=items[0].q.level?`　<span class="text-[11px] text-navy/40">最低 ${esc(items[0].q.level)}</span>`:'';
      d.innerHTML=`<summary class="px-4 py-3 cursor-pointer select-none font-semibold text-navy text-sm">${esc(comp)}　<span class="text-[11px] text-navy/40">${items.length} 題</span>${lv}</summary>`;
      const inner=el('div','px-4 pb-4 space-y-3');
      items.forEach(({q,idx})=>{
        const card=el('div','rounded-lg border border-navy/10 p-3');
        card.innerHTML=`<div class="text-[11px] font-bold text-tealdeep mb-2">${esc(q.qtype||'')}</div>`;
        [['question','核心問題'],['followup','結構化追問'],['evidence','需要取得的行為證據']].forEach(([k,label])=>{
          const cell=el('div','mb-2');
          cell.innerHTML=`<label class="block text-[11px] font-semibold text-navy/55 mb-1">${label}</label>`;
          const ta=el('textarea','w-full border border-navy/15 rounded-lg px-2.5 py-2 text-sm leading-relaxed resize-y');
          ta.rows=2; ta.value=q[k]||''; ta.disabled=readOnly();
          ta.addEventListener('input',()=>{qs[idx][k]=ta.value;saveQs();});
          cell.appendChild(ta); card.appendChild(cell);
        });
        const del=el('button','text-[11px] text-navy/35 hover:text-accent','刪掉這一題');
        del.addEventListener('click',()=>{qs.splice(idx,1);saveQs();paint();});
        if(!readOnly()) card.appendChild(del);
        inner.appendChild(card);
      });
      d.appendChild(inner); qBox.appendChild(d);
    });
    if(!qs.length) qBox.appendChild(el('p','text-sm text-navy/40','目前沒有題目。'));
    box(Q.name, qBox, `只針對核心職能出題，一項兩題。點開職能可以改，用不到的直接刪。目前 ${qs.length} 題。`);

    const aWrap=el('div','text-sm space-y-1');
    aWrap.innerHTML=anchors.length
      ? anchors.map(a=>`<div class="flex justify-between border-b border-navy/5 py-1"><span>${esc(a.competency)}</span><span class="text-navy/50 text-xs">最低 ${esc(a.minimum_level||'—')}／理想 ${esc(a.ideal_level||'—')}</span></div>`).join('')
      : '<span class="text-navy/40">還沒有錨點。</span>';
    box('表格三：各職能的行為定錨等級', aWrap, '等級在「職務與人才規格」那一段設定，這裡只顯示結果。');

    const cf=el('button','bg-tealgreen text-white px-4 py-2 rounded-lg font-semibold','確認甄選流程，進入 JD');
    cf.disabled=readOnly();
    cf.addEventListener('click',()=>{S.setModuleStatus(c,'m5','confirmed');currentModule='m6';c.current_module='m6';save();render();});
    preview.appendChild(cf);
  }
  genBtn.addEventListener('click',()=>{
    const has=(c.fields['m5.process_steps']?.value||[]).length;
    if(has && !confirm('重新產生會覆蓋你在這一頁改過的內容，也會再花一次 AI 用量。確定嗎？')) return;
    generate();
  });
  if(S.getModuleStatus(c,'m5')==='confirmed')paint();
}

// ═══════════ M6 JD 對外文案 ═══════════
function renderM6(area){
  moduleHeader(area,'m6');
  const ready=S.getModuleStatus(c,'m4')==='confirmed'&&S.getModuleStatus(c,'m5')==='confirmed';
  if(!ready){area.appendChild(el('div','p-4 rounded-xl bg-accent/10 border border-accent/30 text-sm text-navy/70','先把職務說明書與甄選流程設計書確認好，這裡的內容才抓得到。'));return;}
  const genBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg font-semibold hover:bg-tealdeep mb-4','<i data-lucide="megaphone" class="w-4 h-4"></i>產生候選人版 JD');
  genBtn.disabled=readOnly();
  area.appendChild(genBtn);
  const preview=el('div');area.appendChild(preview);

  /** 真的呼叫 AI，只在按鈕被按下時。 */
  async function generate(btn){
    const confirmed=confirmedM3();
    const caseFields={'case.job_title_working':c.fields['case.job_title_working']?.value};
    let r=AI.runM6(confirmed,caseFields);
    r=await runWithAi('M6-01',
      `依《6.JD對外文案》寫出候選人版 JD。只公開角色定位、工作內容、到職最低必要職能、情境化工作特質與面試流程。` +
      `
嚴禁出現：完整面試題目、L1–L5 等級代碼、行為錨點、內部評分、表現過度風險、組織內部敏感資訊。` +
      `
語氣用招募文案的第二人稱，例如「你具備⋯能夠⋯」「面對⋯時，你能⋯」。` +
      `
口述裡的「我」是說話的那位主管在講自己。寫進對外文案時要換成角色稱謂（用人主管、專案負責人、活動負責人等），或改寫成組織的口吻，不要留下第一人稱。`,
      r, {目前為止談過的內容:caseBrief(), 已確認的職務規格:confirmed, 職務名稱:caseFields['case.job_title_working']}, btn);
      if(!r) return;   // AI 不可用時不寫入任何欄位，說明已由 runWithAi 顯示
    S.recordAiJob(c,'M6-01');
    for(const[fid,v]of Object.entries(r.organized_content))S.saveField(c,fid,v,'ai_organized','M6-01');
    save(); paint();
  }

  /** 只讀已存好的內容重畫，不呼叫 AI。 */
  function paint(){
    const oc={};
    ['m6.job_title','m6.role_positioning','m6.work_items','m6.minimum_competencies','m6.work_traits','m6.interview_process']
      .forEach(id=>{ if(c.fields[id]?.value!=null) oc[id]=c.fields[id].value; });
    preview.innerHTML='';
    if(!oc['m6.job_title'] && !oc['m6.role_positioning']){
      preview.appendChild(el('p','text-sm text-navy/45','還沒有 JD 草稿。按上面的按鈕產生一份，產生後可以直接改。'));
      return;
    }
    const r={organized_content:{
      'm6.job_title':oc['m6.job_title']||'',
      'm6.role_positioning':oc['m6.role_positioning']||'',
      'm6.work_items':oc['m6.work_items']||[],
      'm6.minimum_competencies':oc['m6.minimum_competencies']||[],
      'm6.interview_process':oc['m6.interview_process']||[],
    }};
    const qa=AI.runQA02(JSON.stringify(r.organized_content));
    preview.appendChild(el('div','p-3 rounded-lg mb-3 text-sm '+(qa.warnings.length?'bg-mist/50 border border-navy/15 text-navy/75':'bg-tealgreen/10 border border-tealgreen/30 text-tealdeep'),
      qa.warnings.length?'<b>發布前，這幾個地方你自己看一眼</b><ul class="list-disc ml-5 mt-1">'+qa.warnings.map(w=>'<li>'+esc(w)+'</li>').join('')+'</ul>':'<b>看起來沒有帶到內部用語</b>：要不要發布仍由你決定。'));
    preview.appendChild(el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3',`
      <div class="text-[11px] text-navy/40 mb-2">下列為對外可揭露內容</div>
      <h3 class="text-lg font-bold text-navy">${esc(r.organized_content['m6.job_title'])}</h3>
      <div class="text-sm space-y-2 mt-2 text-navy/75">
        <div><b class="text-tealdeep">角色定位：</b>${esc(r.organized_content['m6.role_positioning'])}</div>
        <div><b class="text-tealdeep">工作內容：</b><ul class="list-disc ml-5">${r.organized_content['m6.work_items'].map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>
        <div><b class="text-tealdeep">需要具備的職能：</b>${r.organized_content['m6.minimum_competencies'].map(esc).join('、')||'<span class="text-navy/40">還沒設最低等級</span>'}</div>
        <div><b class="text-tealdeep">面試流程：</b>${r.organized_content['m6.interview_process'].map(esc).join(' → ')}</div>
      </div>`));
    const cf=el('button','px-4 py-2 rounded-lg font-semibold bg-tealgreen text-white','確認並完成三份正式輸出');
    cf.disabled=readOnly();
    cf.addEventListener('click',()=>{S.saveField(c,'m6.publish_confirmation',{confirmed:true,disclosure_pass:!!qa.organized_content.pass,at:new Date().toISOString()},'user_input');S.confirmField(c,'m6.job_title');S.confirmField(c,'m6.role_positioning');S.setModuleStatus(c,'m6','confirmed');c.overall_status='output_ready';currentModule='output';c.current_module='output';save();render();});
    preview.appendChild(cf);
    if(window.lucide)lucide.createIcons();
  }
  genBtn.addEventListener('click',()=>{
    if(c.fields['m6.job_title']?.value && !confirm('重新產生會覆蓋目前的 JD 內容，也會再花一次 AI 用量。確定嗎？')) return;
    generate(genBtn);
  });
  // 只要有存過就直接畫，不再重跑 AI。
  // （之前這裡是 paint() 內含 AI 呼叫，每次切回這一頁都會再燒一次用量。）
  paint();
}

// ═══════════ output 文件預覽 ═══════════
function renderOutput(area){
  moduleHeader(area,'output');
  const pending=countPending(c);
  const allConfirmed=['m4','m5','m6'].every(m=>S.getModuleStatus(c,m)==='confirmed');

  // 產出前檢查收成一行狀態列。要看細節再展開。
  // 之前它是一整張卡片壓在文件預覽上面，真的要讀文件時很擠。
  const anchors=allAnchors();
  const items=[
    ['三份正式輸出已確認',allConfirmed],
    ['JD 已完成',S.getModuleStatus(c,'m6')==='confirmed'],
    ['最低適任等級已由人工確認',anchors.length>0&&anchors.every(a=>a.minimum_level)],
  ];
  const okCount=items.filter(([,v])=>v).length;
  const chk=el('details','mb-4 rounded-xl border border-navy/12 bg-white');
  chk.innerHTML=`<summary class="px-4 py-2.5 cursor-pointer select-none text-sm text-navy/70 flex items-center gap-2">
      <i data-lucide="${okCount===items.length?'check-circle':'circle-dashed'}" class="w-4 h-4 ${okCount===items.length?'text-tealgreen':'text-navy/35'}"></i>
      產出前檢查　<span class="text-navy/45">${okCount}/${items.length} 完成${pending>0?`　·　待確認 ${pending} 項`:''}</span>
    </summary>`;
  const chkBody=el('div','px-4 pb-4 space-y-2 text-sm');
  chkBody.innerHTML=items.map(([t,v])=>checkRow(t,v)).join('')+checkRow(`待確認事項：${pending} 項`,true,pending>0);
  chk.appendChild(chkBody);
  area.appendChild(chk);

  // 四份獨立文件：預覽 + 下載
  const docWrap=el('div','bg-white rounded-2xl border border-navy/10 overflow-hidden');
  const docHead=el('div','px-5 py-3.5 border-b border-navy/10 flex items-center justify-between gap-3 flex-wrap');
  docHead.innerHTML='<div class="font-bold text-navy flex items-center gap-2"><i data-lucide="files" class="w-4 h-4 text-tealgreen"></i>四份獨立文件</div>';
  const dlAll=el('button','inline-flex items-center gap-1.5 bg-navy text-ivory px-4 py-2 rounded-lg text-sm font-semibold hover:bg-tealdeep transition',
    '<i data-lucide="download" class="w-4 h-4"></i>下載全部四份');
  dlAll.addEventListener('click',()=>{
    dlAll.disabled=true;
    const old=dlAll.innerHTML;
    dlAll.innerHTML='<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>下載中…';
    if(window.lucide)lucide.createIcons();
    downloadAllDocuments(c,()=>{},{shell:!_unlocked});
    // 四份之間有間隔，等最後一份送出再恢復
    setTimeout(()=>{ dlAll.disabled=false; dlAll.innerHTML=old; if(window.lucide)lucide.createIcons(); }, DOCUMENTS.length*700+400);
  });
  // 文件狀態由你決定，不由系統判定。這個值會印在四份文件的抬頭上。
  const statusWrap=el('div','flex items-center gap-2 mr-auto ml-4');
  statusWrap.innerHTML='<span class="text-xs text-navy/45">狀態</span>';
  const statusSel=el('select','border border-navy/15 rounded-lg px-2.5 py-1.5 text-sm bg-white');
  statusSel.innerHTML=DOC_STATUS.map(x=>`<option ${docStatus(c)===x?'selected':''}>${x}</option>`).join('');
  statusSel.disabled=readOnly();
  statusSel.addEventListener('change',()=>{
    const v=statusSel.value, pend=countPending(c);
    if(v==='正式發布' && pend>0
       && !confirm(`目前還有 ${pend} 項沒確認。要不要先看過再發布？\n\n（要直接標成正式發布也可以，這是你的判斷。）`)){
      statusSel.value=docStatus(c); return;
    }
    c.doc_status=v; save(); paintDoc();
  });
  statusWrap.appendChild(statusSel);
  docHead.appendChild(statusWrap);
  docHead.appendChild(dlAll);
  docWrap.appendChild(docHead);
  const tabs=el('div','flex flex-wrap gap-1.5 px-5 pt-4');
  const meta=el('div','px-5 pt-3 text-xs');
  const iframe=el('iframe','w-full bg-white mt-3');
  // 真的要讀文件時 520px 太矮，一直捲。改成跟著視窗高度走。
  iframe.style.height='min(78vh, 900px)'; iframe.style.border='0'; iframe.style.borderTop='1px solid #14203318';
  docWrap.appendChild(tabs); docWrap.appendChild(meta); docWrap.appendChild(iframe);
  area.appendChild(docWrap);

  let activeKey=DOCUMENTS[0].key;
  let editing=false;
  function paintDoc(){
    editing=false;
    tabs.innerHTML='';
    DOCUMENTS.forEach(d=>{
      const on=d.key===activeKey;
      const b=el('button',`px-3.5 py-2 rounded-lg text-sm font-semibold border transition-colors ${on?'bg-navy text-ivory border-navy':'bg-white text-navy/55 border-navy/15 hover:border-tealgreen/50'}`,d.name);
      b.addEventListener('click',()=>{activeKey=d.key;paintDoc();});
      tabs.appendChild(b);
    });
    const d=getDocument(activeKey);
    meta.innerHTML='';
    const metaRow=el('div','flex items-center justify-between gap-3 flex-wrap');
    metaRow.innerHTML=`<div><span class="badge ${d.external?'bg-tealgreen/15 text-tealdeep':'bg-accent/15 text-accent'}">${d.external?'可對外提供':'內部資料，不對外公開'}</span>
      <span class="text-navy/45 ml-2">${d.kind}</span></div>`;
    // 直接在畫面上改文件。改完存進案例，下載時帶走人工版。
    const btns=el('div','flex items-center gap-2');
    const editBtn=el('button','inline-flex items-center gap-1.5 border border-navy/20 text-navy px-3 py-1.5 rounded-lg text-xs font-semibold hover:border-tealgreen/60 hover:text-tealdeep transition','');
    const dlOne=el('button','inline-flex items-center gap-1.5 border border-navy/20 text-navy px-3 py-1.5 rounded-lg text-xs font-semibold hover:border-tealgreen/60 hover:text-tealdeep transition',
      `<i data-lucide="download" class="w-3.5 h-3.5"></i>下載這一份`);
    dlOne.addEventListener('click',()=>{ downloadDocument(c,d.key,{shell:!_unlocked}); });

    const setEditLabel=()=>{
      editBtn.innerHTML = editing
        ? '<i data-lucide="check" class="w-3.5 h-3.5"></i>完成編輯'
        : '<i data-lucide="pencil" class="w-3.5 h-3.5"></i>直接編輯';
      editBtn.className='inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition '
        + (editing ? 'bg-tealgreen text-white' : 'border border-navy/20 text-navy hover:border-tealgreen/60 hover:text-tealdeep');
    };
    editBtn.addEventListener('click',()=>{
      const body=iframe.contentDocument&&iframe.contentDocument.body;
      if(!body) return;
      if(editing){                      // 收工：把改過的內容存起來
        c.doc_overrides=c.doc_overrides||{};
        const html=iframe.contentDocument.documentElement.outerHTML;
        c.doc_overrides[d.key]={html,at:new Date().toISOString()};
        body.contentEditable='false'; editing=false; save();
        // 人工改過的內容沒有經過任何檢查，這裡補跑一次發布前提醒（只提醒，不擋）
        const qa=AI.runQA02(body.innerText||'');
        if(qa.warnings.length){
          alert('改好了。順帶一提，這幾個地方你可能想再看一眼：\n\n・'+qa.warnings.join('\n・'));
        }
        paintDoc();
      }else{
        body.contentEditable='true'; body.focus(); editing=true; setEditLabel();
      }
    });
    setEditLabel();
    btns.appendChild(editBtn);
    if(isEdited(c,d.key)){
      const reset=el('button','text-xs text-navy/40 hover:text-accent px-2','還原成系統版本');
      reset.addEventListener('click',()=>{
        if(!confirm('確定要丟掉這一份的人工修改，改回系統組裝的版本？')) return;
        delete c.doc_overrides[d.key]; save(); paintDoc();
      });
      btns.appendChild(reset);
    }
    btns.appendChild(dlOne);
    metaRow.appendChild(btns);
    if(isEdited(c,d.key)) metaRow.querySelector('div').insertAdjacentHTML('beforeend',
      '<span class="badge bg-navy/10 text-navy/60 ml-2">已人工修改</span>');
    meta.appendChild(metaRow);
    // 讓客戶知道「已人工修改」的文件怎麼跟後續資料相處：手改保留、空欄位自動補、要整段改回按還原。
    if(isEdited(c,d.key)) meta.insertAdjacentHTML('beforeend',
      '<p class="mt-2 text-xs text-navy/50 leading-relaxed flex gap-1.5">'
      +'<i data-lucide="info" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>'
      +'<span>這份保留了你的手動修改。<b>原本空白的欄位，下載時會自動帶入評測的最新內容</b>；你改過的段落維持原樣不動。'
      +'若想把某段改回最新的系統版本，按「還原成系統版本」（會清掉這份的手動修改）。</span></p>');
    // 沒解鎖（免費）給空殼：結構在、內容遮成 ▨▨▨▨，看得到成品形狀但拿不到 IP
    iframe.srcdoc=documentHtml(c,d.key,{shell:!_unlocked});
    if(window.lucide)lucide.createIcons();
  }
  paintDoc();

  area.appendChild(el('p','mt-5 text-sm text-navy/45 leading-relaxed flex gap-2',
    '<i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i><span>按「直接編輯」可以在這裡改內容，改完按「完成編輯」存起來，下載時帶走的就是你改過的版本。你改過的段落之後不會被系統蓋掉，沒改到的空白欄位仍會自動帶入評測的最新內容。下載的是 Word 檔（.doc）。</span>'));
  if(window.lucide)lucide.createIcons();
}

function checkRow(label,ok,warn){
  const icon=ok?(warn?'alert-circle':'check-circle'):'x-circle';
  const color=ok?(warn?'text-accent':'text-tealgreen'):'text-accent';
  return `<div class="flex items-center gap-2 ${color}"><i data-lucide="${icon}" class="w-4 h-4"></i><span class="text-navy/75">${label}</span></div>`;
}

// 引導者視窗：隱藏編輯用的框架，只留唯讀內容
if(IS_GUIDE){
  document.title='引導者｜'+(c.fields['case.title']?.value||'案例');
  const hdr=document.querySelector('header'); if(hdr)hdr.remove();
}else{
  $('#openGuideBtn').addEventListener('click',openGuideWindow);
}

// 公開站不顯示「AI 設定」入口：那一頁有 API Key 輸入框，
// 放在公開網址等於教人把金鑰打進網頁；而且線上連不到本機代理，點進去也沒有用。
if(!AIX.isLocalEnv()){
  document.querySelectorAll('a[href$="settings.html"]').forEach(a=>a.remove());
}

render();

// 先以「鎖住」狀態畫一次（安全預設），確認有兌換碼後再解鎖重繪
refreshUnlock().then(u=>{ if(u) render(); });
</script>
</body>
</html>
