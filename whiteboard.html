<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>即時互動白板 | Ormap</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { primary: '#0d9488', secondary: '#0f172a' } } } }</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{ font-family:'Noto Sans TC',sans-serif; box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; }

#loading-overlay{ position:fixed;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999; }
.dp span{ display:inline-block;width:7px;height:7px;border-radius:50%;background:#0d9488;margin:0 2px;animation:dp 1.4s ease-in-out infinite; }
.dp span:nth-child(2){animation-delay:.2s}.dp span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

#mirror-scroll{ position:absolute;inset:0;overflow-y:auto;z-index:1;background:#f8fafc; }
#anno-canvas{ position:absolute;inset:0;z-index:10;pointer-events:none; }
#anno-canvas.draw{ pointer-events:auto; }

.m-section{ padding:14px 18px;border-bottom:1px solid #e2e8f0; }
.m-cat-header{ font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:8px;display:flex;align-items:center;gap:6px; }
.m-need-row{ display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 10px;background:white;border-radius:10px;border:1px solid #e2e8f0;transition:border-color .2s; }
.m-need-row.top{ border-color:#b2dfdb;background:#f0fdf4; }
.m-need-name{ font-size:12px;font-weight:700;color:#334155;width:68px;flex-shrink:0;line-height:1.3; }
.m-bars{ flex:1;display:flex;flex-direction:column;gap:3px; }
.m-bar-row{ display:flex;align-items:center;gap:5px; }
.m-bar-label{ font-size:9px;font-weight:900;width:12px; }
.m-bar-track{ flex:1;height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden; }
.m-bar-ideal{ height:100%;background:#0d9488;border-radius:3px;transition:width .5s ease; }
.m-bar-curr{ height:100%;background:#94a3b8;border-radius:3px;transition:width .5s ease; }
.m-bar-val{ font-size:10px;font-weight:900;width:12px;text-align:right; }
.m-delta{ font-size:10px;font-weight:900;width:22px;text-align:right; }

.tool-btn{ width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:#64748b;border:none;background:transparent; }
.tool-btn:hover{ background:#f1f5f9;color:#0d9488; }
.tool-btn.active{ background:#0d9488;color:white; }
.c-dot{ width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s; }
.c-dot:hover{ transform:scale(1.2); }.c-dot.active{ border-color:#0f172a;transform:scale(1.1); }
.w-btn{ width:28px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;border:none;background:transparent; }
.w-btn:hover{ background:#f1f5f9; }.w-btn.active{ background:#e0f2f1; }
.tool-sep{ width:28px;height:1px;background:#e2e8f0;margin:2px auto; }

.side-panel{ width:240px;min-width:240px;background:white;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s; }
.side-panel.collapsed{ width:0!important;min-width:0!important; }
.panel-tab{ padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:#94a3b8;white-space:nowrap; }
.panel-tab.active{ color:#0d9488;border-bottom-color:#0d9488; }
.s-badge{ display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700; }

.sticky-el{ position:absolute;width:156px;min-height:92px;border-radius:12px;padding:9px;cursor:move;box-shadow:2px 4px 14px rgba(0,0,0,.12);z-index:20;user-select:none; }
.sticky-el textarea{ background:transparent;border:none;outline:none;width:100%;min-height:60px;resize:none;font-family:'Noto Sans TC',sans-serif;font-size:12px;line-height:1.6;color:#1e293b;cursor:text; }
.sticky-del{ position:absolute;top:4px;right:5px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s;font-size:9px;color:#334155;font-weight:900; }
.sticky-el:hover .sticky-del{ opacity:1; }

.wb-toast{ position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:white;font-size:13px;font-weight:700;padding:9px 18px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;transition:opacity .3s;white-space:nowrap; }

::-webkit-scrollbar{ width:4px }
::-webkit-scrollbar-track{ background:#f8fafc }
::-webkit-scrollbar-thumb{ background:#cbd5e1;border-radius:2px }
</style>
</head>
<body class="h-screen flex flex-col">

<div id="loading-overlay">
  <img src="./ormap-logo.png" alt="" class="w-10 h-10 object-contain mb-4" onerror="this.style.display='none'">
  <div class="dp mb-3"><span></span><span></span><span></span></div>
  <p id="loading-msg" class="text-sm text-slate-400 font-medium">正在連線...</p>
</div>

<!-- Setup Modal -->
<div id="setup-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-7">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl bg-teal-50 flex items-center justify-center"><i data-lucide="layout" class="w-5 h-5 text-primary"></i></div>
      <div><h2 class="font-black text-lg text-secondary">即時互動白板</h2><p class="text-xs text-slate-400">諮詢師即時觀看評測鏡像</p></div>
    </div>
    <div id="create-section">
      <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">建立新白板</p>
      <div class="flex gap-2 mb-4">
        <button onclick="pickTool('TWA')" id="pick-TWA" class="flex-1 py-2 rounded-xl border-2 border-primary bg-teal-50 text-primary text-sm font-black">TWA</button>
        <button onclick="pickTool('HTI')" id="pick-HTI" class="flex-1 py-2 rounded-xl border-2 border-slate-200 text-slate-500 text-sm font-bold hover:border-primary">HTI</button>
        <button onclick="pickTool(null)" id="pick-FREE" class="flex-1 py-2 rounded-xl border-2 border-slate-200 text-slate-500 text-sm font-bold hover:border-primary">自由</button>
      </div>
      <button id="create-btn" onclick="createSession()" class="w-full bg-primary text-white rounded-2xl py-3 font-black text-sm shadow-lg hover:-translate-y-0.5 transition-all">建立白板</button>
      <div class="my-4 flex items-center gap-3"><div class="flex-1 h-px bg-slate-100"></div><span class="text-xs text-slate-300">或</span><div class="flex-1 h-px bg-slate-100"></div></div>
    </div>
    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">加入工作階段</p>
    <div class="flex gap-2">
      <input id="join-input" type="text" placeholder="貼上邀請連結或 Session ID" class="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary min-w-0">
      <button onclick="joinSession()" class="bg-secondary text-white rounded-xl px-4 text-sm font-bold hover:bg-slate-700 whitespace-nowrap">加入</button>
    </div>
    <a href="dashboard.html" class="block text-center text-xs text-slate-300 mt-5 hover:text-slate-500">← 返回後臺</a>
  </div>
</div>

<!-- Invite Modal -->
<div id="invite-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-7 text-center">
    <div class="w-14 h-14 bg-teal-50 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle-2" class="w-7 h-7 text-primary"></i></div>
    <h3 class="font-black text-xl text-secondary mb-1">白板已建立！</h3>
    <p class="text-slate-400 text-sm mb-5">複製連結傳給學員 → 學員點擊進入 → 你在這裡即時看到</p>
    <div class="bg-slate-50 rounded-xl p-3.5 mb-5 flex items-start gap-3 text-left">
      <span id="invite-url" class="text-xs text-slate-600 flex-1 break-all leading-relaxed font-mono"></span>
      <button onclick="copyInvite()" class="flex-shrink-0 text-primary mt-0.5" title="複製連結"><i data-lucide="copy" class="w-4 h-4"></i></button>
    </div>
    <!-- ⭐ 寄送邀請信（需學員 email） -->
    <div class="mt-3 flex gap-2 items-center">
      <input id="student-email-input" type="email" placeholder="學員 Email（選填，寄信用）"
        class="flex-1 text-xs px-3 py-2 border border-slate-200 rounded-xl focus:outline-none focus:border-primary">
      <button onclick="sendInviteEmail()" class="flex-shrink-0 bg-teal-50 border border-primary text-primary rounded-xl px-3 py-2 text-xs font-bold hover:bg-teal-100 flex items-center gap-1.5">
        <i data-lucide="mail" class="w-3.5 h-3.5"></i>寄信
      </button>
    </div>
    <button onclick="enterBoard()" class="w-full bg-primary text-white rounded-2xl py-3 font-black text-sm shadow-lg hover:-translate-y-0.5 transition-all mt-3">進入白板</button>
  </div>
</div>

<!-- Main App -->
<div id="wb-app" class="hidden flex flex-col h-screen">

  <!-- Navbar -->
  <nav class="h-12 bg-white border-b border-slate-200 flex items-center justify-between px-4 flex-shrink-0 z-40 gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <a href="dashboard.html" class="text-slate-400 hover:text-primary flex-shrink-0"><i data-lucide="arrow-left" class="w-4 h-4"></i></a>
      <div class="w-px h-4 bg-slate-200 flex-shrink-0"></div>
      <span class="font-black text-sm text-secondary whitespace-nowrap">即時白板</span>
      <span id="tool-badge" class="hidden text-xs font-black px-2 py-0.5 bg-teal-50 text-primary rounded-lg flex-shrink-0"></span>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <div id="status-area" class="s-badge bg-amber-50 text-amber-600">
        <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
        <span id="status-txt">等待中</span>
      </div>
      <div id="participants" class="flex -space-x-1.5"></div>
      <span id="last-update" class="text-xs text-teal-600 font-medium hidden"></span>
      <button onclick="togglePanel()" class="tool-btn w-8 h-8"><i data-lucide="panel-right" class="w-4 h-4"></i></button>
      <button id="end-btn" onclick="confirmEnd()" class="hidden bg-white border border-red-200 text-red-500 rounded-xl px-3 py-1.5 text-xs font-bold hover:bg-red-50">結束</button>
    </div>
  </nav>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Mirror + Canvas -->
    <div class="flex-1 relative overflow-hidden flex flex-col">

      <!-- ⭐ 即時洞察列（諮詢師專用，學員看不到）-->
      <div id="insights-bar" class="hidden flex-shrink-0 bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3 flex-wrap z-20">
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">即時洞察</span>
        <div class="flex items-center gap-1.5">
          <div class="h-1.5 w-16 bg-slate-100 rounded-full overflow-hidden">
            <div id="ib-budget-bar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
          <span id="ib-budget" class="text-xs font-black text-primary whitespace-nowrap">0/115</span>
        </div>
        <span id="ib-focus" class="hidden text-xs font-black px-2 py-0.5 bg-teal-50 text-teal-700 rounded-lg"></span>
        <span id="ib-top3" class="text-xs text-slate-500 font-medium truncate flex-1 min-w-0">等待學員開始...</span>
      </div>

      <div class="flex-1 relative overflow-hidden">
      <div id="mirror-scroll">

        <!-- Waiting -->
        <div id="mirror-waiting" class="flex flex-col items-center justify-center min-h-full py-16 text-center px-8">
          <div class="w-16 h-16 bg-teal-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i data-lucide="monitor" class="w-8 h-8 text-primary"></i>
          </div>
          <h3 class="font-black text-xl text-secondary mb-2">等待學員開始評測</h3>
          <p class="text-slate-400 text-sm leading-relaxed mb-6">學員加入並開始做評測後，<br>此處即時顯示其評測畫面</p>
          <div class="bg-slate-100 rounded-xl px-4 py-3 flex items-center gap-3 max-w-sm w-full">
            <span id="wb-invite-url" class="text-xs text-slate-500 font-mono flex-1 text-left truncate"></span>
            <button onclick="copyMainInvite()" class="flex-shrink-0 text-primary hover:text-teal-700"><i data-lucide="copy" class="w-4 h-4"></i></button>
          </div>
          <p class="text-xs text-slate-400 mt-3">傳連結給學員 → 學員去 twa.html / hti.html 做評測</p>
        </div>

        <!-- TWA Mirror（保留，作為 iframe 不可用時的降級方案）-->
        <div id="mirror-twa" class="hidden">
          <!-- Sticky header -->
          <div class="m-section" style="position:sticky;top:0;background:white;z-index:5;border-bottom:2px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);">
            <div class="flex items-center gap-4 flex-wrap">
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-400" id="live-dot"></div>
                <span class="text-xs font-black text-slate-600 uppercase tracking-wider">TWA 即時鏡像</span>
              </div>
              <div class="flex items-center gap-2 flex-1 min-w-40">
                <span class="text-xs font-bold text-slate-400 whitespace-nowrap">預算</span>
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div id="twa-budget-bar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
                </div>
                <span id="twa-budget-num" class="text-xs font-black text-primary whitespace-nowrap">0/115</span>
              </div>
              <div id="twa-focus-badge" class="hidden px-3 py-1 bg-teal-50 text-primary rounded-xl text-xs font-black"></div>
            </div>
          </div>
          <div id="twa-needs-container" class="p-4 space-y-4"></div>
          <div id="twa-insight-section" class="hidden m-section">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">學員體悟</p>
            <div class="bg-amber-50 rounded-xl p-4 border-l-4 border-amber-400">
              <p id="twa-insight-text" class="text-sm text-slate-700 leading-relaxed italic"></p>
            </div>
          </div>
          <div class="h-16"></div>
        </div>

        <!-- HTI Mirror（保留，作為降級方案）-->
        <div id="mirror-hti" class="hidden">
          <div class="m-section" style="position:sticky;top:0;background:white;z-index:5;border-bottom:2px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);">
            <div class="flex items-center gap-4 flex-wrap">
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-400"></div>
                <span class="text-xs font-black text-slate-600 uppercase tracking-wider">HTI 即時鏡像</span>
              </div>
              <div id="hti-bars-header" class="flex gap-2"></div>
              <div id="hti-top-badge" class="flex gap-2 flex-wrap"></div>
            </div>
          </div>
          <div id="hti-acts-container" class="p-4"></div>
          <div class="h-16"></div>
        </div>

      </div><!-- mirror-scroll -->

      <!-- ⭐ 即時鏡像 iframe：顯示與學員完全相同的 twa/hti 畫面 -->
      <iframe id="mirror-iframe"
        style="position:absolute;inset:0;width:100%;height:100%;border:none;z-index:2;display:none;"
        allow="same-origin">
      </iframe>

      <canvas id="anno-canvas"></canvas>
      </div><!-- inner relative wrapper -->
    </div>

    <!-- Right Panel -->
    <div id="side-panel" class="side-panel">
      <div class="flex border-b border-slate-200 flex-shrink-0">
        <button class="panel-tab active flex-1 text-center" onclick="switchTab('info')" id="tab-info">工作階段</button>
        <button class="panel-tab flex-1 text-center" onclick="switchTab('notes')" id="tab-notes">備忘</button>
      </div>

      <div id="panel-info" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div>
          <p class="text-xs font-black text-slate-300 uppercase tracking-widest mb-2">工作階段</p>
          <div class="bg-slate-50 rounded-xl p-3 space-y-2">
            <div class="flex justify-between"><span class="text-xs text-slate-400">角色</span><span id="role-display" class="text-xs font-bold text-primary">-</span></div>
            <div class="flex justify-between"><span class="text-xs text-slate-400">狀態</span><span id="sstat-display" class="text-xs font-bold text-amber-600">等待中</span></div>
          </div>
        </div>
        <div id="stu-info-section" class="hidden">
          <p class="text-xs font-black text-slate-300 uppercase tracking-widest mb-2">學員</p>
          <div class="flex items-center gap-3 bg-slate-50 rounded-xl p-3">
            <div id="stu-avatar" class="w-9 h-9 rounded-full bg-orange-400 text-white flex items-center justify-center text-sm font-black flex-shrink-0">?</div>
            <div class="min-w-0"><p id="stu-name" class="text-sm font-bold text-secondary truncate">-</p><p id="stu-email" class="text-xs text-slate-400 truncate">-</p></div>
          </div>
        </div>
        <div id="invite-section">
          <p class="text-xs font-black text-slate-300 uppercase tracking-widest mb-2">邀請學員</p>
          <div class="bg-slate-50 rounded-xl p-3 space-y-2">
            <p class="text-xs text-slate-400">複製連結後傳給學員</p>
            <div class="flex gap-2 items-center">
              <span id="invite-url-panel" class="text-xs text-slate-500 flex-1 break-all leading-relaxed font-mono truncate"></span>
              <button onclick="copyInvitePanel()" class="flex-shrink-0 text-primary" title="複製連結"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        </div>
        <div id="end-area" class="hidden">
          <button onclick="confirmEnd()" class="w-full bg-white border border-red-200 text-red-500 rounded-xl py-2.5 text-sm font-bold hover:bg-red-50">結束白板階段</button>
        </div>
      </div>

      <div id="panel-notes" class="hidden flex-1 p-4 flex flex-col">
        <p class="text-xs font-black text-slate-300 uppercase tracking-widest mb-2">諮詢備忘</p>
        <textarea id="notes-ta" rows="8" placeholder="諮詢重點、觀察、待追蹤..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm text-slate-700 leading-relaxed focus:outline-none focus:border-primary resize-none"></textarea>
        <button onclick="toast('備忘已儲存')" class="mt-3 w-full bg-primary text-white rounded-xl py-2 text-sm font-bold hover:bg-teal-700">儲存備忘</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, setDoc, addDoc, getDoc, updateDoc, deleteDoc, collection, onSnapshot, serverTimestamp, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDI_joRjSRWZ5qW9sr2rkpQ6o2q-ORhicQ",
  authDomain: "careervalue-ormap.firebaseapp.com",
  projectId: "careervalue-ormap",
  storageBucket: "careervalue-ormap.firebasestorage.app",
  messagingSenderId: "883599167982",
  appId: "1:883599167982:web:6dee33f8abf03de9b53eff"
};

// ⭐ Fix: 移除硬編碼白名單，改用 Firestore counselors/{uid} 動態查詢
// PO 個人 UID（何昆陽）— 作為 Firestore 文件不存在時的 Super Admin fallback
// TODO(v3.6): 抽出 auth-utils.js 後改純 Firestore 判定，這個常數移除
const SUPER_ADMIN_UID = "jhEQJvOIrKgHiGGNqmjOciEGFY52";

async function isCounselor(uid, email) {
  // 先查 uid（正式文件）
  try {
    const snap = await getDoc(doc(db, "counselors", uid));
    if (snap.exists() && snap.data().isActive !== false) return true;
  } catch(e) {}
  // 再查 pending email 文件（由 admin 以 email 新增、尚未登入過）
  if (email) {
    const pendingKey = email.replace(/[.#$\/\[\]]/g, "_");
    try {
      const pSnap = await getDoc(doc(db, "counselors", pendingKey));
      if (pSnap.exists() && pSnap.data().isActive !== false) {
        // ⭐ Fix: 先放行，再背景遷移
        const data = pSnap.data();
        setDoc(doc(db, "counselors", uid), { ...data, uid, pending: false })
          .then(() => deleteDoc(doc(db, "counselors", pendingKey)))
          .catch(() => console.warn("[isCounselor] pending 遷移失敗"));
        return true; // 遷移失敗不影響登入
      }
    } catch(e) {}
  }
  // Super admin 永遠允許
  return uid === SUPER_ADMIN_UID;
}

function initCanvas(){
  annoCanvas=document.getElementById('anno-canvas'); actx=annoCanvas.getContext('2d');
  resizeCanvas(); window.addEventListener('resize',resizeCanvas);
  annoCanvas.addEventListener('mousedown',onDown); annoCanvas.addEventListener('mousemove',onMove);
  annoCanvas.addEventListener('mouseup',onUp); annoCanvas.addEventListener('mouseleave',onUp);
  annoCanvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
  annoCanvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
  annoCanvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});
  annoCanvas.addEventListener('click',onClick);
}
function resizeCanvas(){ if(!annoCanvas)return; const p=annoCanvas.parentElement; annoCanvas.width=p.offsetWidth; annoCanvas.height=p.offsetHeight; redraw(); }
function getXY(e){ const r=annoCanvas.getBoundingClientRect(); return{x:(e.clientX-r.left)*(annoCanvas.width/r.width),y:(e.clientY-r.top)*(annoCanvas.height/r.height)}; }

window.setTool=function(t){
  currentTool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tool-${t}`)?.classList.add('active');
  const d=['pen','highlight','eraser'].includes(t);
  annoCanvas.classList.toggle('draw',d);
  annoCanvas.style.cursor=d?(t==='eraser'?'cell':'crosshair'):'default';
};
window.setColor=function(c){ currentColor=c; document.querySelectorAll('.c-dot').forEach(b=>b.classList.remove('active')); document.getElementById(`cd-${c.replace('#','')}`)?.classList.add('active'); };
window.setWidth=function(w){ currentWidth=w; document.querySelectorAll('.w-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`w-${w}`)?.classList.add('active'); };

function onDown(e){ if(!['pen','highlight','eraser'].includes(currentTool))return; const p=getXY(e); isDrawing=true; drawPts=[p]; }
function onMove(e){
  if(!isDrawing)return; const p=getXY(e); drawPts.push(p);
  if(currentTool==='eraser'){ actx.save(); actx.globalCompositeOperation='destination-out'; actx.beginPath(); actx.arc(p.x,p.y,currentWidth*7,0,Math.PI*2); actx.fill(); actx.restore(); return; }
  redraw(); renderPath(actx,drawPts,sColor(),sWidth(),currentTool==='highlight');
}
function onUp(e){
  if(!isDrawing)return; isDrawing=false;
  if(drawPts.length>=2&&currentTool!=='eraser') localStrokes.push({pts:[...drawPts],color:sColor(),width:sWidth(),isHL:currentTool==='highlight'});
  drawPts=[]; redraw();
}
function onClick(e){ if(currentTool==='sticky'){ const p=getXY(e); spawnSticky(p.x,p.y); } }
function sColor(){ return currentTool==='highlight'?hexA(currentColor,.35):currentColor; }
function sWidth(){ return currentTool==='highlight'?currentWidth*5:currentWidth; }

function renderPath(ctx,pts,color,width,isHL){
  if(!pts||pts.length<2)return;
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineCap='round'; ctx.lineJoin='round';
  if(isHL) ctx.globalAlpha=.42;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++){ const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2; ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my); }
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y); ctx.stroke(); ctx.restore();
}
function redraw(){ if(!actx)return; actx.clearRect(0,0,annoCanvas.width,annoCanvas.height); localStrokes.forEach(s=>renderPath(actx,s.pts,s.color,s.width,s.isHL)); }
window.clearAnno=function(){ if(!confirm('清除所有標注？'))return; localStrokes=[]; redraw(); document.querySelectorAll('.sticky-el').forEach(e=>e.remove()); toast('標注已清除'); };

function spawnSticky(x,y){
  const el=document.createElement('div'); el.className='sticky-el'; el.style.cssText=`left:${x}px;top:${y}px;background:#fef9c3;`;
  const del=document.createElement('div'); del.className='sticky-del'; del.textContent='✕'; del.onclick=()=>el.remove();
  const ta=document.createElement('textarea'); ta.placeholder='備註...';
  el.appendChild(del); el.appendChild(ta);
  let drag=false,ox=0,oy=0;
  el.addEventListener('mousedown',ev=>{ if(ev.target===ta||ev.target===del)return; drag=true; ox=ev.clientX-el.offsetLeft; oy=ev.clientY-el.offsetTop; el.style.zIndex=25; });
  document.addEventListener('mousemove',ev=>{ if(!drag)return; el.style.left=`${ev.clientX-ox}px`; el.style.top=`${ev.clientY-oy}px`; });
  document.addEventListener('mouseup',()=>{ if(!drag)return; drag=false; el.style.zIndex=20; });
  annoCanvas.parentElement.appendChild(el);
  setTimeout(()=>ta.focus(),50);
}

/** 更新頂部即時洞察列 */
function updateInsightsBar(ld, tool) {
  const bar = document.getElementById('insights-bar');
  if (!bar) return;
  bar.classList.remove('hidden');

  if (tool === 'TWA') {
    const scores = ld.scores || {};
    const total  = Object.values(scores).reduce((s, v) => s + (Number(v) || 0), 0);
    const pct    = Math.min(100, (total / 115) * 100);

    const budgetBar = document.getElementById('ib-budget-bar');
    const budgetNum = document.getElementById('ib-budget');
    if (budgetBar) { budgetBar.style.width = pct + '%'; budgetBar.style.background = pct > 95 ? '#ef4444' : '#0d9488'; }
    if (budgetNum) budgetNum.textContent = `${total}/115`;

    const focusBadge = document.getElementById('ib-focus');
    if (focusBadge && ld.focusType) { focusBadge.textContent = ld.focusType; focusBadge.classList.remove('hidden'); }

    const top3El = document.getElementById('ib-top3');
    if (top3El && twaMatrix) {
      const ranked = twaMatrix
        .map((item, i) => ({ name: item.need, score: Number(scores['n' + i]) || 0 }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
      top3El.textContent = ranked.length
        ? '前三：' + ranked.map(x => `${x.name} ${x.score}`).join('　')
        : '尚未開始填答';
    }
  } else if (tool === 'HTI') {
    const scores = ld.scores || {};
    const codes  = ['R','I','A','S','E','C'];
    const top    = codes.filter(c => scores[c] > 0).sort((a, b) => Number(scores[b]) - Number(scores[a])).slice(0, 3);
    const top3El = document.getElementById('ib-top3');
    const focusBadge = document.getElementById('ib-focus');
    const budgetNum  = document.getElementById('ib-budget');
    if (budgetNum) budgetNum.textContent = '';
    if (focusBadge && top.length) { focusBadge.textContent = top.join(' › '); focusBadge.classList.remove('hidden'); }
    if (top3El) top3El.textContent = top.length
      ? '前三代碼：' + top.map(c => `${c}(${RIASEC_L[c]} ${scores[c]})`).join('　')
      : '尚未開始填答';
  }
}

window.confirmEnd=function(){
  const hasStudent = !!(sessionData?.studentEmail);
  const sendReport = hasStudent && confirm(
    '結束前是否同時寄送報告連結給學員？\n\n' +
    '學員：' + (sessionData?.studentName || '未知') + '\n' +

    '按「確定」＝結束並寄信\n按「取消」＝僅結束，不寄信'
  );
  if (!confirm('確定結束此白板階段？')) return;
  const studentUid = sessionData?.studentUid;
  const ops = [
    updateDoc(doc(db,'whiteboard_sessions',sessionId),{status:'ended',endedAt:serverTimestamp()})
  ];
  if (studentUid) ops.push(deleteDoc(doc(db,'whiteboard_active',studentUid)));
  Promise.all(ops)
    .then(async () => {
      // ⭐ 綁定學員：把 assignedCounselorUid 寫入該學員所有未綁定的 assessments
      if (sessionData?.studentUid) {
        try {
          const q = query(
            collection(db, 'assessments'),
            where('uid', '==', sessionData.studentUid)
          );
          const snap = await getDocs(q);
          const bindOps = [];
          snap.forEach(d => {
            // 只綁定還沒有指定諮詢師的報告
            if (!d.data().assignedCounselorUid) {
              bindOps.push(updateDoc(doc(db, 'assessments', d.id), {
                assignedCounselorUid  : currentUser.uid,
                assignedCounselorName : currentUser.displayName || '諮詢師'
              }));
            }
          });
          if (bindOps.length > 0) await Promise.all(bindOps);
          console.log(`[綁定] 已將 ${bindOps.length} 份報告綁定至 ${currentUser.displayName}`);
        } catch(e) { console.warn('[綁定學員]', e); }
      }

      // ⭐ 若選擇寄信，查最新報告寄送
      if (sendReport && sessionData?.studentUid) {
        try {
          const q = query(
            collection(db, 'assessments'),
            where('uid', '==', sessionData.studentUid),
            orderBy('createdAt', 'desc'),
            limit(1)
          );
          const snap = await getDocs(q);
          if (!snap.empty) {
            const reportDocId = snap.docs[0].id;
            const reportUrl = `${location.origin}/report.html?id=${reportDocId}`;
            await callGasMailer('report_ready', {
              to           : sessionData.studentEmail,
              studentName  : sessionData.studentName || '學員',
              counselorName: currentUser.displayName || CONFIG_COUNSELOR_NAME,
              toolType     : sessionData.toolType,
              reportUrl,
            });
            toast('報告信已寄出 ✓');
          }
        } catch(e) { console.warn('[report_ready]', e); }
      }
      toast('已結束');
      setTimeout(() => { location.href='admin.html'; }, 1800);
    })
    .catch(console.error);
};

          <h1 style="color:white;font-size:20px;font-weight:900;margin:0;">${toolName}</h1>
        </div>
      </div>
      <!-- Body -->
      <div style="padding:28px;">
        <div style="background:#f8fafc;border-radius:14px;padding:14px 16px;margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:8px;background:${toolColor}20;display:flex;align-items:center;justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${toolColor}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span style="font-size:13px;color:#334155;font-weight:700;">${tool==='HTI'?'從 25 個活動找出天賦代碼':'評測 20 個心理需求'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:8px;background:${toolColor}20;display:flex;align-items:center;justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${toolColor}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span style="font-size:13px;color:#334155;font-weight:700;">預估 ${tool==='HTI'?'15–20':'20–30'} 分鐘完成</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:28px;height:28px;border-radius:8px;background:${toolColor}20;display:flex;align-items:center;justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${toolColor}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span style="font-size:13px;color:#334155;font-weight:700;">諮詢師同步陪伴，即時解讀結果</span>
          </div>
        </div>

        ${currentUser ? `
        <!-- Already logged in -->
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f1f5f9;border-radius:12px;margin-bottom:14px;">
          <img src="${currentUser.photoURL||''}" style="width:32px;height:32px;border-radius:50%;border:1px solid #e2e8f0;" onerror="this.style.display='none'">
          <div style="flex:1;min-width:0;">
            <p style="font-size:12px;font-weight:700;color:#0f172a;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${currentUser.displayName||''}</p>
            <p style="font-size:10px;color:#94a3b8;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${currentUser.email}</p>
          </div>
        </div>
        <button id="student-start-btn" onclick="studentStartAssessment()" style="width:100%;padding:14px;background:${toolColor};color:white;border:none;border-radius:16px;font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;font-family:Noto Sans TC,sans-serif;">
          開始評測 →
        </button>
        ` : `
        <!-- Login needed -->
        <button onclick="studentLogin()" id="student-login-btn"
          style="width:100%;padding:14px;background:#0f172a;color:white;border:none;border-radius:16px;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:Noto Sans TC,sans-serif;">
          <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          使用 Google 帳號登入並開始
        </button>
        `}
        <p id="student-err" style="color:#ef4444;font-size:11px;text-align:center;margin-top:10px;display:none;"></p>
        <p style="font-size:11px;color:#cbd5e1;text-align:center;margin-top:12px;">由 Ormap 職涯評測平台 提供服務</p>
      </div>
    </div>
  `;
  document.body.appendChild(screen);
  lucide.createIcons();

  // Store session data for later use
  window._pendingSession = { sessionId, sessionData: sData, tool, counselorName };
}

window.studentLogin = async function() {
  const btn = document.getElementById('student-login-btn');
  if (btn) { btn.textContent = '登入中...'; btn.disabled = true; }
  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged will fire and handle the rest
  } catch(e) {
    const err = document.getElementById('student-err');
    if (err) { err.textContent = '登入失敗，請再試一次。'; err.style.display = 'block'; }
    if (btn) { btn.textContent = '使用 Google 帳號登入並開始'; btn.disabled = false; }
  }
};

window.studentStartAssessment = async function() {
  const btn = document.getElementById('student-start-btn');
  if (btn) { btn.textContent = '準備中...'; btn.disabled = true; }
  try {
    const ps = window._pendingSession;
    const sRef = doc(db, 'whiteboard_sessions', ps.sessionId);
    // Update session with student info
    if (!ps.sessionData?.studentUid) {
      await updateDoc(sRef, {
        studentUid: currentUser.uid,
        studentName: currentUser.displayName || '學員',
        studentEmail: currentUser.email,
        status: 'active'
      });
    }
    // Write whiteboard_active
    await setDoc(doc(db, 'whiteboard_active', currentUser.uid), {
      sessionId: ps.sessionId,
      counselorName: ps.counselorName,
      toolType: ps.tool,
      status: 'active',
      createdAt: serverTimestamp()
    });
    // Go to assessment
    window.location.href = ps.tool === 'HTI' ? `tools/hti.html?wb=1&sid=${ps.sessionId}` : `tools/twa.html?wb=1&sid=${ps.sessionId}`;
  } catch(e) {
    console.error(e);
    const err = document.getElementById('student-err');
    if (err) { err.textContent = '發生錯誤，請重新整理。'; err.style.display = 'block'; }
    if (btn) { btn.textContent = '開始評測 →'; btn.disabled = false; }
  }
};

function fatalError(msg){ document.body.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;padding:32px;text-align:center;font-family:'Noto Sans TC',sans-serif;"><h2 style="font-weight:900;font-size:20px;color:#0f172a;margin-bottom:8px">發生錯誤</h2><p style="color:#94a3b8;font-size:14px;margin-bottom:24px">${msg}</p><a href="dashboard.html" style="background:#0d9488;color:white;border-radius:16px;padding:12px 28px;font-weight:900;font-size:14px;text-decoration:none;">返回後臺</a></div>`; }
window.addEventListener('beforeunload',()=>{ unsubs.forEach(u=>u?.()); });
lucide.createIcons();

// ══════════════════════════════════════════════
// ⭐ GAS Mailer 整合
// ══════════════════════════════════════════════
const GAS_MAILER_URL = "https://script.google.com/macros/s/AKfycbzyTam8pCWA9GPAfvr9HeKg5tUHANRKefjGN5FXFzWdaZlkudnqhFfmUfKY_smIWQyRMg/exec"; // 部署後替換此 URL
const CONFIG_COUNSELOR_NAME = "何昆陽";

async function callGasMailer(type, data) {
  if (!GAS_MAILER_URL || GAS_MAILER_URL.includes("__")) {
    console.warn("[GAS Mailer] URL 尚未設定"); return false;
  }
  return new Promise((resolve) => {
    // 用 Image() 觸發 GET，天然跟著 redirect、完全沒有 CORS 問題
    const params = new URLSearchParams({ type, payload: JSON.stringify(data) });
    const img = new Image();
    img.onload  = () => resolve(true);
    img.onerror = () => resolve(true); // GAS 回傳 JSON 非圖片，onerror 是正常的
    img.src = `${GAS_MAILER_URL}?${params.toString()}`;
    // 3 秒 timeout 保護
    setTimeout(() => resolve(true), 3000);
  });
}

window.sendInviteEmail = async function() {
  const emailInput = document.getElementById("student-email-input");
  const email = emailInput?.value?.trim();
  if (!email || !email.includes("@")) { toast("請輸入有效的學員 Email"); return; }
  const btn = emailInput.nextElementSibling;
  const orig = btn.innerHTML; btn.innerHTML = "寄送中..."; btn.disabled = true;
  const ok = await callGasMailer("invite_student", {
    to: email, studentName: "",
    counselorName: currentUser?.displayName || CONFIG_COUNSELOR_NAME,
    toolType: sessionData?.toolType || selectedTool || "TWA",
    whiteboardUrl: buildUrl()
  });
  btn.innerHTML = orig; btn.disabled = false;
  toast(ok ? "邀請信已寄出 ✓" : "GAS URL 未設定，請複製連結手動傳送");
};
