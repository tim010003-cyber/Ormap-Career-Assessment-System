<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人後臺 | Ormap SaaS 平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { primary: '#0d9488', secondary: '#0f172a' } } }
}
</script>
<script src="https://unpkg.com/lucide@1.8.0"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

<!-- Navbar -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <div class="flex items-center gap-2">
        <img src="./ormap-logo.png" alt="Ormap Logo" class="w-8 h-8 object-contain">
        <span class="text-xl font-bold tracking-tight text-secondary">Ormap <span class="text-primary">SaaS</span></span>
      </div>
      <div class="flex items-center gap-3">
        <a id="adminLink" href="admin.html"
          class="hidden items-center gap-1.5 px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-primary hover:text-white transition-all">
          <i data-lucide="shield" class="w-3.5 h-3.5"></i>
          後台管理
        </a>
        <div id="userInfo" class="hidden flex items-center gap-3">
          <img id="userPhoto" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-slate-200">
          <span id="userName" class="text-sm font-medium text-slate-700 hidden md:block">載入中...</span>
          <button id="logoutBtn" class="text-slate-500 hover:text-red-600 transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
  <header class="mb-10">
    <h1 class="text-3xl font-extrabold text-secondary mb-2">歡迎回來，探索者！</h1>
    <p class="text-slate-500">在這裡查看你的職涯評測紀錄，追蹤每一次的成長軌跡。</p>
  </header>

  <!-- ⭐ 白板邀請通知（有 active session 才顯示）-->
  <div id="wbNotice" class="hidden mb-8">
    <div class="relative overflow-hidden flex items-center gap-5 p-5 bg-gradient-to-r from-teal-600 to-teal-500 rounded-2xl shadow-lg text-white">
      <!-- Decorative circle -->
      <div class="absolute right-0 top-0 w-32 h-32 bg-white/10 rounded-full -translate-y-8 translate-x-8 pointer-events-none"></div>
      <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0 backdrop-blur-sm">
        <i data-lucide="layout" class="w-6 h-6 text-white"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-black uppercase tracking-widest text-teal-100 mb-0.5">即時互動白板</p>
        <h3 id="wbNoticeTitle" class="font-black text-base leading-tight">諮詢師邀請你進行即時諮詢</h3>
        <p id="wbNoticeSubtitle" class="text-teal-100 text-sm mt-0.5">點擊加入，與諮詢師一起使用互動白板</p>
      </div>
      <a id="wbNoticeBtn" href="#"
        class="flex-shrink-0 flex items-center gap-2 px-5 py-2.5 bg-white text-primary rounded-xl font-black text-sm shadow hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 transition-all whitespace-nowrap">
        <i data-lucide="arrow-right-circle" class="w-4 h-4"></i>
        加入白板
      </a>
    </div>
  </div>

  <!-- 開始新的評測 -->
  <section class="mb-12">
    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">開始新的評測</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <a href="tools/twa.html" class="group p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-primary hover:shadow-md transition-all">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-teal-50 text-primary rounded-xl flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
              <i data-lucide="compass" class="w-6 h-6"></i>
            </div>
            <div>
              <h3 class="font-bold text-lg text-secondary">TWA 工作價值觀評測</h3>
              <p class="text-sm text-slate-500">開啟一份全新的職涯覺察地圖</p>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 group-hover:text-primary transition-colors"></i>
        </div>
      </a>

      <a href="tools/hti.html" class="group p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-orange-500 hover:shadow-md transition-all">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-colors">
              <i data-lucide="cpu" class="w-6 h-6"></i>
            </div>
            <div>
              <h3 class="font-bold text-lg text-secondary">HTI 何倫特質解析</h3>
              <p class="text-sm text-slate-500">探索你的天賦特質與原動力</p>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 group-hover:text-orange-500 transition-colors"></i>
        </div>
      </a>

    </div>
  </section>

  <!-- TWA 成長軌跡入口（有兩筆以上才顯示）-->
  <div id="timelineEntrance" class="hidden mb-8">
    <a href="timeline.html"
      class="flex items-center gap-4 p-5 bg-gradient-to-r from-teal-50 to-white border border-teal-100 rounded-2xl hover:border-primary hover:shadow-md transition-all group">
      <div class="w-11 h-11 bg-primary text-white rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-105 transition-transform">
        <i data-lucide="trending-up" class="w-5 h-5"></i>
      </div>
      <div class="flex-1 min-w-0">
        <h3 class="font-bold text-secondary">TWA 工作價值觀成長軌跡</h3>
        <p id="timelineSubtitle" class="text-sm text-slate-500 mt-0.5"></p>
      </div>
      <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 group-hover:text-primary transition-colors flex-shrink-0"></i>
    </a>
  </div>

  <!-- 歷史測驗紀錄 -->
  <section>
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">歷史測驗紀錄</h2>
      <span id="recordCount" class="px-2 py-1 bg-slate-200 text-slate-600 text-xs font-bold rounded-full">0</span>
    </div>

    <div id="loadingState" class="space-y-4">
      <div class="h-24 bg-slate-200 animate-pulse rounded-2xl"></div>
    </div>

    <div id="emptyState" class="hidden py-20 text-center">
      <div class="mb-4 text-slate-300 flex justify-center">
        <i data-lucide="folder-open" class="w-16 h-16"></i>
      </div>
      <h3 class="text-lg font-medium text-slate-600">目前還沒有任何紀錄</h3>
      <p class="text-slate-400 mb-6">點擊上方工具卡片，開始你的第一次測驗吧！</p>
    </div>

    <div id="recordsContainer" class="grid grid-cols-1 gap-4"></div>
  </section>
</main>

<!-- 授權確認 Modal -->
<div id="authModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8">
    <div id="authModal-icon" class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-5"></div>
    <h3 id="authModal-title" class="text-xl font-black text-center text-slate-800 mb-3"></h3>
    <p id="authModal-desc" class="text-slate-500 text-center text-sm leading-relaxed mb-8"></p>
    <div class="flex gap-3">
      <button onclick="closeAuthModal()"
        class="flex-1 px-4 py-3 bg-white border border-slate-200 text-slate-600 rounded-2xl font-bold hover:bg-slate-50 transition-all">
        取消
      </button>
      <button id="authModal-confirm" class="flex-1 px-4 py-3 rounded-2xl font-bold text-white transition-all">
        確認
      </button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, getDocs, getDoc, deleteDoc, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { isCounselor } from './auth-utils.js';

const firebaseConfig = {
  apiKey: "AIzaSyDI_joRjSRWZ5qW9sr2rkpQ6o2q-ORhicQ",
  authDomain: "careervalue-ormap.firebaseapp.com",
  projectId: "careervalue-ormap",
  storageBucket: "careervalue-ormap.firebasestorage.app",
  messagingSenderId: "883599167982",
  appId: "1:883599167982:web:6dee33f8abf03de9b53eff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const container = document.getElementById('recordsContainer');
const loadingState = document.getElementById('loadingState');
const emptyState = document.getElementById('emptyState');
const recordCount = document.getElementById('recordCount');

onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('userPhoto').src = user.photoURL || '';
    document.getElementById('userName').innerText = user.displayName;
    // ⭐ Phase 7.3+7.4：諮詢師才看得到「後台管理」按鈕
    if (await isCounselor(db, user.uid)) {
      const adminLink = document.getElementById('adminLink');
      if (adminLink) {
        adminLink.classList.remove('hidden');
        adminLink.classList.add('flex');
      }
    }
    fetchAssessments(user.uid);
    checkActiveWhiteboards(user.uid);
  } else {
    window.location.href = 'index.html';
  }
});

async function fetchAssessments(uid) {
  try {
    const q = query(
      collection(db, "assessments"),
      where("uid", "==", uid),
      orderBy("createdAt", "desc")
    );
    const snapshot = await getDocs(q);
    loadingState.classList.add('hidden');

    if (snapshot.empty) {
      emptyState.classList.remove('hidden');
      return;
    }

    const allRecords = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    recordCount.innerText = allRecords.length;

    // 檢查 TWA 筆數：2 筆以上才顯示成長軌跡入口
    const twaRecords = allRecords.filter(r => r.toolType === 'TWA');
    if (twaRecords.length >= 2) {
      document.getElementById('timelineEntrance').classList.remove('hidden');
      const oldest = twaRecords[twaRecords.length - 1]?.createdAt?.toDate
        ? twaRecords[twaRecords.length - 1].createdAt.toDate().toLocaleDateString('zh-TW') : '';
      const newest = twaRecords[0]?.createdAt?.toDate
        ? twaRecords[0].createdAt.toDate().toLocaleDateString('zh-TW') : '';
      document.getElementById('timelineSubtitle').innerText =
        `共 ${twaRecords.length} 次施測・${oldest} ～ ${newest}`;
    }

    allRecords.forEach(r => renderCard(r.id, r));
    lucide.createIcons();
  } catch (err) {
    console.error(err);
    loadingState.classList.add('hidden');
  }
}

function renderCard(docId, data) {
  const date = data.createdAt?.toDate
    ? data.createdAt.toDate().toLocaleDateString('zh-TW') : '未知日期';

  const card = document.createElement('div');
  card.id = `card-${docId}`;
  card.className = "group bg-white p-5 rounded-2xl border border-slate-200 flex flex-col lg:flex-row lg:items-center justify-between hover:shadow-md transition-all gap-4";

  const isHTI = data.toolType === 'HTI';
  const isTWA = data.toolType === 'TWA';
  const toolTitle = isHTI ? 'HTI 何倫特質解析' : 'TWA 工作價值觀評測';
  const summaryText = data.summary?.text || '已完成評測';
  const reportLink = `report.html?id=${docId}`;
  const retestLink = isHTI ? `tools/hti.html?loadId=${docId}` : `tools/twa.html?loadId=${docId}`;
  const isAuthorized = data.counselorAccess === true;

  card.innerHTML = `
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center group-hover:bg-teal-50 group-hover:text-primary transition-colors">
        <i data-lucide="file-text" class="w-5 h-5"></i>
      </div>
      <div>
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[10px] tracking-widest uppercase">${data.toolType || '評測'}</span>
          <span class="text-xs text-slate-400">${date}</span>
        </div>
        <h4 class="font-bold text-secondary text-base">${toolTitle}</h4>
        <p class="text-sm text-slate-400 truncate max-w-xs">${summaryText}</p>
      </div>
    </div>
    <div class="flex items-center gap-2 justify-end w-full lg:w-auto flex-wrap">
      <button onclick="confirmDeleteReport('${docId}')"
        class="px-3 py-2 bg-white text-red-400 border border-red-100 text-sm font-bold rounded-xl hover:bg-red-50 hover:text-red-600 transition-colors flex items-center gap-1"
        title="刪除紀錄">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
      </button>
      ${renderAuthBtn(docId, isAuthorized)}
      <a href="${retestLink}"
        class="px-3 py-2 bg-teal-50 text-primary border border-teal-100 text-sm font-bold rounded-xl hover:bg-teal-100 transition-colors shadow-sm flex items-center gap-1">
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 以此重測
      </a>
      <a href="${reportLink}"
        class="px-4 py-2 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-primary transition-colors shadow-sm">
        查看報告
      </a>
    </div>
  `;

  container.appendChild(card);
}

function renderAuthBtn(docId, isAuthorized) {
  if (isAuthorized) {
    return `<button id="auth-btn-${docId}" onclick="confirmToggleAccess('${docId}', true)"
      class="px-3 py-2 bg-teal-50 text-primary border border-teal-200 text-sm font-bold rounded-xl hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors flex items-center gap-1">
      <i data-lucide="shield-check" class="w-4 h-4"></i><span>已授權</span>
    </button>`;
  } else {
    return `<button id="auth-btn-${docId}" onclick="confirmToggleAccess('${docId}', false)"
      class="px-3 py-2 bg-white text-slate-400 border border-slate-200 text-sm font-bold rounded-xl hover:bg-teal-50 hover:text-primary hover:border-teal-200 transition-colors flex items-center gap-1">
      <i data-lucide="shield-off" class="w-4 h-4"></i><span>授權</span>
    </button>`;
  }
}

// ── Modal ──────────────────────────────────────────────
let _pendingAction = null;

window.confirmToggleAccess = (docId, isCurrentlyAuthorized) => {
  const icon = document.getElementById('authModal-icon');
  const title = document.getElementById('authModal-title');
  const desc = document.getElementById('authModal-desc');
  const confirmBtn = document.getElementById('authModal-confirm');

  if (isCurrentlyAuthorized) {
    icon.className = "w-14 h-14 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-5";
    icon.innerHTML = '<i data-lucide="shield-off" class="w-7 h-7"></i>';
    title.innerText = '取消授權諮詢師查看？';
    desc.innerText = '取消後，諮詢師將無法查看此份報告。你可以隨時重新開啟授權。';
    confirmBtn.className = "flex-1 px-4 py-3 rounded-2xl font-bold text-white bg-red-500 hover:bg-red-600 transition-all";
    confirmBtn.innerText = '確認取消授權';
  } else {
    icon.className = "w-14 h-14 rounded-2xl bg-teal-50 text-primary flex items-center justify-center mx-auto mb-5";
    icon.innerHTML = '<i data-lucide="shield-check" class="w-7 h-7"></i>';
    title.innerText = '授權諮詢師查看此報告？';
    desc.innerText = '開啟後，具備資格的諮詢師可查看這份報告。你的個人資料將受到保護，且可隨時取消授權。';
    confirmBtn.className = "flex-1 px-4 py-3 rounded-2xl font-bold text-white bg-primary hover:bg-teal-700 transition-all";
    confirmBtn.innerText = '確認授權';
  }

  _pendingAction = () => executeToggleAccess(docId, isCurrentlyAuthorized);
  document.getElementById('authModal').classList.remove('hidden');
  lucide.createIcons();
};

window.closeAuthModal = () => {
  document.getElementById('authModal').classList.add('hidden');
  _pendingAction = null;
};

document.getElementById('authModal-confirm').addEventListener('click', () => {
  if (_pendingAction) { _pendingAction(); closeAuthModal(); }
});

document.getElementById('authModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('authModal')) closeAuthModal();
});

async function executeToggleAccess(docId, isCurrentlyAuthorized) {
  const newState = !isCurrentlyAuthorized;
  try {
    await updateDoc(doc(db, "assessments", docId), { counselorAccess: newState });
    const btn = document.getElementById(`auth-btn-${docId}`);
    if (btn) { btn.outerHTML = renderAuthBtn(docId, newState); lucide.createIcons(); }
  } catch (err) {
    console.error(err);
    alert("操作失敗，請稍後再試。");
  }
}

// ── 刪除 ──────────────────────────────────────────────
window.confirmDeleteReport = (docId) => {
  if (!confirm("確定要刪除這筆測驗紀錄嗎？刪除後將無法恢復。")) return;
  deleteReport(docId);
};

async function deleteReport(docId) {
  try {
    await deleteDoc(doc(db, "assessments", docId));
    document.getElementById(`card-${docId}`)?.remove();
    const current = parseInt(recordCount.innerText) - 1;
    recordCount.innerText = Math.max(current, 0);
    if (current <= 0) emptyState.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    alert("刪除失敗，請稍後再試。");
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

// ── 白板邀請通知 ────────────────────────────────────────
const WB_TTL_MS = 24 * 60 * 60 * 1000; // ⭐ Fix: 24 小時 TTL

function checkActiveWhiteboards(uid) {
  onSnapshot(doc(db, 'whiteboard_active', uid), async (snap) => {
    const notice = document.getElementById('wbNotice');
    if (!snap.exists()) { notice.classList.add('hidden'); return; }
    const data = snap.data();

    // 狀態不是 waiting/active → 清除殘留文件並隱藏
    if (data.status !== 'waiting' && data.status !== 'active') {
      notice.classList.add('hidden');
      try { await deleteDoc(doc(db, 'whiteboard_active', uid)); } catch(e) {}
      return;
    }

    // ⭐ Fix: TTL 保護 — 超過 24 小時的文件視為孤立，自動清除
    if (data.createdAt) {
      const createdMs = data.createdAt.toMillis
        ? data.createdAt.toMillis()
        : data.createdAt.seconds * 1000;
      if (Date.now() - createdMs > WB_TTL_MS) {
        notice.classList.add('hidden');
        try { await deleteDoc(doc(db, 'whiteboard_active', uid)); } catch(e) {}
        return;
      }
    }

    // ⭐ 確認對應 session 是否仍有效（防止孤立文件一直顯示）
    if (data.sessionId) {
      try {
        const sSnap = await getDoc(doc(db, 'whiteboard_sessions', data.sessionId));
        if (!sSnap.exists() || sSnap.data().status === 'ended') {
          notice.classList.add('hidden');
          await deleteDoc(doc(db, 'whiteboard_active', uid));
          return;
        }
      } catch(e) { console.warn('whiteboard session check failed', e); }
    }

    // 顯示橫幅
    notice.classList.remove('hidden');
    document.getElementById('wbNoticeTitle').textContent =
      `${data.counselorName || '諮詢師'} 邀請你進行即時白板諮詢`;
    document.getElementById('wbNoticeSubtitle').textContent =
      `評測類型：${data.toolType || '自由模式'} ・ 點擊立即加入`;
    document.getElementById('wbNoticeBtn').href =
      `whiteboard.html?session=${data.sessionId}`;
    lucide.createIcons();
  });
}

lucide.createIcons();
</script>
</body>
</html>
