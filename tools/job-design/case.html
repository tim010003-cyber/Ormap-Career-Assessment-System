<script type="module">
import * as F from './jd-fields.js';
import * as S from './jd-store.js';
import * as AI from './jd-mock-ai.js';
import { DOCUMENTS, getDocument, collectPending, countPending, downloadDocument, downloadAllDocuments, documentHtml, isEdited, DOC_STATUS, docStatus } from './jd-word.js';
import * as AIX from './jd-ai.js';

/**
 * 跑一個 AI 整理任務。
 *
 * 沒有 AI 就**不整理**，回傳 null，由呼叫端顯示原因。
 * 以前是失敗就悄悄用 Mock 頂替，但 Mock 是關鍵字規則拼的，
 * 使用者會拿到一份看起來像產品、實際是假貨的東西。
 * （2026-07-22 使用者決策：寧可不能跑，也不要爛品質冒充。）
 *
 * mock 參數現在只用來提供「欄位形狀」給提示詞，不再當保底結果。
 */
async function runWithAi(taskCode, instruction, mock, input, btn){
  const label = btn ? btn.innerHTML : null;
  if(btn){ btn.disabled=true; btn.innerHTML='<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>AI 整理中…'; if(window.lucide)lucide.createIcons(); }
  // 安全網：示範案例絕不打真 AI。各按鈕本身已改走 demoFakeRun，這裡再攔一次，
  // 確保就算有漏網的呼叫路徑，示範也不會燒 token。回 null，呼叫端不寫入。
  if(isDemo){
    await new Promise(r=>setTimeout(r, 1100));
    if(btn && label!=null){ btn.disabled=false; btn.innerHTML=label; if(window.lucide)lucide.createIcons(); }
    return null;
  }
  try{
    const ai = await AIX.askAi(taskCode, instruction, mock.organized_content, input, c.case_id);
    const merged = AIX.mergeIntoEnvelope(mock, ai);
    paintQuotaChip();   // 用量變了，頂列的剩餘次數要跟著更新
    // 整理完就把整體敘述更新一次（不擋畫面）。
    // 下一題拿到的背景就是含這一題在內的完整理解，而不是一堆碎片。
    if(taskCode!=='SYNTH-01') setTimeout(()=>{ refreshSummary().catch(()=>{}); }, 50);
    return merged;
  } catch(e) {
    const err = e instanceof AIX.AiUnavailable
      ? e : new AIX.AiUnavailable('provider_error', e.message||String(e));
    if(!(e instanceof AIX.AiUnavailable)) console.error('[AI] 未預期的錯誤', e);
    showAiUnavailable(err, btn);
    return null;
  } finally {
    if(btn){ btn.disabled=false; btn.innerHTML=label; if(window.lucide)lucide.createIcons(); }
  }
}

/**
 * AI 不能用時的說明。原始輸入完全保留，人工填寫與下載都不受影響。
 *
 * 一定要顯示在**按鈕旁邊**。先前放在頁面頂端的固定區塊，按鈕在畫面下方時
 * 使用者只會感覺到「頁面往上跳了一下，然後沒反應」——訊息離操作點太遠，
 * 等於沒說。
 */
function showAiUnavailable(err, btn){
  const info = AIX.whyNotReady({ reason: err.reason });

  // 同一顆按鈕重複按時不要疊出好幾張
  document.querySelectorAll('.ai-unavailable-note').forEach(n=>n.remove());
  const top = $('#aiUnavailable'); if(top) top.classList.add('hidden');

  const note = el('div','ai-unavailable-note mt-3 p-3.5 rounded-xl bg-mist/50 border border-navy/15 text-sm text-navy/75');
  note.innerHTML = `<div class="flex items-start gap-2">
      <i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i>
      <div>
        <div class="font-bold mb-0.5">${esc(info.short)}，這一段沒有整理</div>
        <div class="text-navy/60 leading-relaxed">${esc(info.detail)}</div>
        <div class="text-navy/45 leading-relaxed mt-1">你寫的內容都還在，也可以直接手動填寫下面的欄位。</div>
      </div>
    </div>`;

  if(err.reason === 'signed_out'){
    const b = el('button','mt-2.5 ml-6 inline-flex items-center gap-1.5 bg-navy text-ivory px-3.5 py-2 rounded-lg text-xs font-semibold hover:bg-tealdeep',
      '<i data-lucide="log-in" class="w-3.5 h-3.5"></i>用 Google 登入');
    b.addEventListener('click', async()=>{
      try{ await AIX.signIn(); note.remove(); render(); }
      catch(e){ if(e?.code!=='auth/popup-closed-by-user') alert('登入失敗：'+(e.message||e)); }
    });
    note.appendChild(b);
  }

  // 還沒兌換授權碼，或次數用完想加值：都直接在這裡輸入，不用跑回案例列表。
  // 次數用完卻沒有任何補充入口，等於整個工具當場停擺。（2026-07-23 使用者回報）
  if(err.reason === 'no_code' || err.reason === 'exhausted'){
    const wrap = el('div','mt-2.5 ml-6 flex flex-wrap items-center gap-2');
    if(err.reason==='exhausted')
      wrap.appendChild(el('div','w-full text-xs text-navy/50','有新的授權碼可以直接輸入加值，次數會累加上去：'));
    const inp = el('input','border border-navy/20 rounded-lg px-3 py-1.5 text-sm font-mono w-52');
    inp.placeholder='ORMAP-XXXX-XXXX'; inp.setAttribute('aria-label','課程授權碼');
    const go = el('button','bg-navy text-ivory px-3.5 py-1.5 rounded-lg text-xs font-semibold hover:bg-tealdeep','兌換');
    const msg = el('span','text-xs text-accent');
    const doIt = async()=>{
      const code=inp.value.trim(); if(!code) return;
      go.disabled=true; msg.textContent='';
      try{
        const a=await AIX.redeemCode(code);
        // 這組碼先前就兌換過的話並沒有加到值，別默默關掉訊息讓人以為好了
        if(a.alreadyRedeemed){ msg.textContent='這組碼你先前已經用過了，沒有重複加值。'; go.disabled=false; paintQuotaChip(); return; }
        _unlocked=true; note.remove(); paintQuotaChip(); render();
      }
      catch(e){ msg.textContent=e.message||'兌換失敗'; go.disabled=false; }
    };
    go.addEventListener('click',doIt);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doIt(); });
    wrap.append(inp,go,msg); note.appendChild(wrap);
  }

  // 次數用完：把剩餘次數更新一次，讓頂列數字跟訊息一致
  if(err.reason === 'exhausted') paintQuotaChip();

  // 掛在按鈕所在的那一列後面；找不到按鈕才退回頁面頂端的區塊
  const anchor = btn && btn.isConnected ? (btn.closest('div') || btn) : null;
  if(anchor && anchor.parentNode){
    anchor.parentNode.insertBefore(note, anchor.nextSibling);
  } else if(top){
    top.classList.remove('hidden'); top.innerHTML=''; top.appendChild(note);
  } else {
    $('#moduleArea')?.appendChild(note);
  }
  if(window.lucide)lucide.createIcons();
  note.scrollIntoView({behavior:'smooth', block:'center'});
}

const $ = (s,r=document)=>r.querySelector(s);
const el=(t,cls,html)=>{const e=document.createElement(t);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const listToText=a=>Array.isArray(a)?a.join('\n'):(a||'');
/**
 * 「AI 這一格沒東西可寫」。
 *
 * 送給 AI 的欄位形狀改成永遠完整之後（2026-07-22），它對整理不出來的欄位會
 * 回空字串或空陣列。那是「沒東西可寫」，不是「請把這格清空」——
 * 不可以拿它蓋掉人已經手寫的內容，或上一輪整理出來的東西。要清空由人自己來。
 */
const aiEmpty=v=>v==null||(Array.isArray(v)?v.length===0:String(v).trim()==='');

/**
 * 送進提示詞的欄位角色說明。
 *
 * 跟畫面上的 badge（F.AI_ROLE_LABEL）分開寫，因為兩者的讀者不同：
 * badge 是給人看「這格是誰負責的」，這裡是給 AI 看「這格你該怎麼處理」。
 *
 * 尤其 H：badge 寫「人工決定」，但依 2026-07-22 使用者決策（方案甲），
 * AI 轉換得到的欄位一律先給草稿，人再比對補充——所以這裡不能讓 AI 以為別碰。
 */
const AI_ROLE_HINT={'AI-O':'整理','AI-I':'推論','H':'人工決定（你仍先給草稿）','U':'使用者輸入'};

/**
 * 欄位卡上的來源徽章——只掛「需要人動手」的兩種：推論·待確認、人工決定。
 * 「AI 整理」是預設，幾乎每一格都是，掛了只是重複的雜訊；一律不顯示，
 * 讓草稿區乾淨，橘色的「待確認」才跳得出來、引導者一眼看到該聊哪幾格。
 * （2026-07-23 使用者：精簡工作區資訊量）
 */
function roleBadge(ai){
  if(ai!=='AI-I' && ai!=='H') return '';
  const cls = ai==='AI-I' ? 'bg-accent/15 text-accent' : 'bg-mist text-tealdeep';
  return `<span class="badge ${cls}">${F.AI_ROLE_LABEL[ai]}</span>`;
}
const textToList=t=>String(t||'').split('\n').map(s=>s.trim()).filter(Boolean);

const caseId = new URLSearchParams(location.search).get('caseId');

/*
 * 雲端同步不可以擋住頁面。
 *
 * 一開始這裡是 top-level `await S.initCloud()`——結果 Firestore 一慢，整頁就卡在
 * 空白等待，使用者回報「進去很常卡住」。（2026-07-23）
 *
 * 改成：本機已經有這個案例，就立刻開，雲端在背景啟用（讓存檔能上傳、把雲端較新的
 * 版本補進來，initCloud 內部以 updated_at 逐案例合併，不會蓋掉正在編輯的本機版）。
 * 只有本機沒有時（換裝置直接開網址）才等雲端拉一次，而且 initCloud 自帶逾時，
 * 最壞情況是等幾秒後顯示「找不到案例」，不會無限卡住。
 */
let c = S.getCase(caseId);
if(c){
  S.initCloud();            // 背景啟用，不 await
}else{
  await S.initCloud();      // 本機沒有才等雲端（有逾時上限）
  c = S.getCase(caseId);
}
if(!c){ document.body.innerHTML='<div class="p-10 text-center text-navy/60">找不到案例。<a class="text-tealgreen underline" href="./index.html">回列表</a></div>'; throw new Error('no case'); }

let currentModule = c.current_module || 'existing';

/*
 * 付費牆：沒兌換授權碼的人，每個問答流程只開「第一關」，其餘鎖住。
 *
 * 使用者的智慧財產是這些問題與整合，所以免費只給每個階段的第一題當體驗，
 * 兌換授權碼＝完整解鎖。（2026-07-23 使用者決策）
 *
 * 預設鎖住（_unlocked=false），載入後才用 myAccess 解鎖並重繪——
 * 這樣萬一查詢慢或失敗，是「偏保守地鎖住」而不是「不小心全開」。
 */
let _unlocked = false;
const GATED_MODULES = ['m1', 'm2', 'm3'];
function stepLocked(mod, i){ return !_unlocked && GATED_MODULES.includes(mod) && i > 0; }
async function refreshUnlock(){
  try{ const a = await AIX.myAccess(); _unlocked = !!(a && a.hasCode); }
  catch{ _unlocked = false; }
  return _unlocked;
}

function save(){ S.saveCase(c); }

/* ══════════ 示範案例：假裝在跑，不燒 token ══════════
 * 示範是教學的一環，內容早就整理好了。按下 AI 整理時應該「運轉一下」讓學員
 * 感受實際操作，但**絕不呼叫真 AI**——不花 token、不扣配額。（2026-07-23 使用者決策）
 *
 * 做法：示範案例一開始把整理草稿藏起來（看起來像還沒整理），按下 AI 後跑一段
 * 假的載入動畫，再揭露早就備好的草稿。isDemo 為真時，所有 AI 呼叫路徑一律短路。
 */
const isDemo = !!c.is_demo;
const _demoRevealed = new Set();
const demoShown = (key, st) => !!(isDemo ? (st && _demoRevealed.has(key)) : st);
async function demoFakeRun(key, btn){
  const label = btn ? btn.innerHTML : null;
  if(btn){ btn.disabled=true; btn.innerHTML='<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>AI 整理中…'; if(window.lucide)lucide.createIcons(); }
  await new Promise(r=>setTimeout(r, 1100));   // 假裝在跑
  if(key!=null) _demoRevealed.add(key);
  if(btn && label!=null){ btn.disabled=false; btn.innerHTML=label; }
  render();
}

/* ══════════ 累積上下文 ══════════
   第一版：每次呼叫只拿到「這一題的口述」，AI 看不到前面講過的話，
   所以做不出上下文推論。
   第二版（caseBrief）：把講過的東西全部串起來送出去。有上下文了，
   但送的是一堆碎片——同一件事在三個章節各出現一次，AI 讀到碎片，
   寫出來的也是碎片，於是「前面說過、後面又說一次」。
   第三版（現在）：多一層 caseSummary()。由 AI 把整個案例融成一份連貫的敘述，
   之後每一次整理都以這份敘述為背景，而不是每次重新拼湊碎片。
   rawDump() 保留原始素材，只在產生／更新那份敘述時才用到。 */

const briefText = v => {
  if (v == null) return '';
  if (Array.isArray(v)) return v.map(x =>
    typeof x === 'string' ? x : Object.values(x||{}).filter(y=>typeof y==='string'&&y.trim()).join('｜')
  ).filter(Boolean).join('；');
  if (typeof v === 'object') return Object.values(v).filter(y=>typeof y==='string'&&y.trim()).join('｜');
  return String(v);
};

/**
 * 送給每一次整理的背景：優先用 AI 整合好的連貫敘述，
 * 沒有的話（還沒整合、或 AI 沒開）才退回原始素材。
 */
function caseBrief(exceptRawId){
  const s=c.case_summary;
  if(s && s.text && s.text.trim()){
    // 敘述是背景；這一題的鄰近原話另外由呼叫端帶入
    return '【目前對這個案例的整體理解】\n'+s.text.trim();
  }
  return rawDump(exceptRawId);
}

/** 原始素材：講過的話與已整理的欄位，全部串起來。只在產生整合敘述時使用。 */
function rawDump(exceptRawId){
  const L=[];
  const push=(label,val)=>{ const t=briefText(val).trim(); if(t) L.push(`${label}：${t.slice(0,600)}`); };

  // 案例基本資料
  const base=F.CASE_FIELDS.map(x=>x.id).filter(id=>c.fields[id]?.value);
  if(base.length) L.push('【這個案例】'+base.map(id=>`${F.CASE_FIELDS.find(x=>x.id===id).name}：${briefText(c.fields[id].value)}`).join('、'));

  // 既有職務盤點
  const ex=(F.EXISTING_FIELDS||[]).filter(x=>c.fields[x.id]?.value);
  if(ex.length){ L.push('【既有職務】'); ex.forEach(x=>push('　'+x.name,c.fields[x.id].value)); }

  // M1 問題釐清：原話 + 已整理欄位
  const m1=[];
  F.M1_CHAPTERS.forEach(ch=>{
    if(ch.rawId===exceptRawId) return;
    const raw=c.fields[ch.rawId]?.value;
    const outs=ch.outputs.filter(o=>c.fields[o.id]?.value);
    if(!raw && !outs.length) return;
    m1.push(`　〈${ch.code} ${ch.title}〉`);
    if(raw) m1.push('　　他說：'+String(raw).slice(0,700));
    outs.forEach(o=>{ const t=briefText(c.fields[o.id].value).trim(); if(t) m1.push(`　　${o.name}：${t.slice(0,400)}`); });
  });
  if(m1.length) L.push('【問題釐清】\n' + m1.join('\n'));

  // M2 需求界定：勾了什麼、為什麼
  const m2=[];
  (F.M2_PARTS||[]).forEach(p=>{
    (p.categories||[]).forEach(cat=>{
      const picked=c.fields[cat.optionsId]?.value;
      const notes=c.fields[cat.optionsId+'_notes']?.value;
      if(picked&&picked.length) m2.push(`　${cat.label||cat.title||''}：${briefText(picked)}${notes?'（'+briefText(notes).slice(0,300)+'）':''}`);
    });
    (p.fields||[]).forEach(fd=>{ const v=c.fields[fd.id]?.value; if(v) m2.push(`　${fd.name}：${briefText(v).slice(0,300)}`); });
  });
  if(m2.length) L.push('【需求界定】\n' + m2.join('\n'));

  // M3 已整理的節
  const m3=[];
  F.m3Sections().forEach(sec=>{
    if(sec.rawId===exceptRawId) return;
    const raw=c.fields[sec.rawId]?.value;
    const outs=F.sectionOutputs(sec).filter(o=>c.fields[o.id]?.value);
    if(!raw && !outs.length) return;
    m3.push(`　〈${sec.code} ${sec.title}〉`);
    if(raw) m3.push('　　他說：'+String(raw).slice(0,500));
    outs.forEach(o=>{ const t=briefText(c.fields[o.id].value).trim(); if(t) m3.push(`　　${o.name}：${t.slice(0,350)}`); });
  });
  if(m3.length) L.push('【職務與人才規格】\n' + m3.join('\n'));

  const out=L.join('\n');
  return out.length>14000 ? out.slice(-14000) : out;
}

/**
 * 整合：請 AI 把整個案例讀過一遍，寫成一份連貫的敘述，存在案例上。
 * 之後每一次整理都以這份敘述當背景，破碎感的根治就在這裡。
 * 沒有真 AI 時直接跳過（Mock 拼不出敘述，硬拼只會更碎）。
 */
let _synthing=false;
async function refreshSummary(force){
  if(isDemo) return c.case_summary;   // 示範不跑整合，避免打真 AI 燒 token
  if(_synthing) return c.case_summary;
  const material=rawDump();
  if(material.length<80) return c.case_summary;
  // 省用量：素材沒變、或只多了一點點，就不重跑整合。
  // 手動按「重新整合」時 force=true，一律重算。
  const stamp=material.length+'|'+material.slice(-120);
  if(!force && c.case_summary){
    if(c.case_summary.stamp===stamp) return c.case_summary;
    const grew=material.length-(c.case_summary.materialLen||0);
    if(grew<400) return c.case_summary;   // 只多了一兩句話，不值得再花一次
  }
  if(!(await AIX.aiReady())) return c.case_summary;   // 整合是背景工作，沒 AI 就安靜跳過

  _synthing=true;
  try{
    const ai=await AIX.askAi('SYNTH-01',
      '把這個案例目前談過的所有內容，整合成一份連貫的敘述。這份敘述會成為後續每一次整理的背景，'+
      '所以重點是「融會貫通」而不是「摘錄」：重複的合併、散落的收攏、前後呼應的串起來。'+
      '\n只輸出 {"organized_content":{"summary":"……"}}，summary 是一段完整的中文敘述。',
      {summary:'…'}, {案例目前的所有素材:material});
    const text=ai && ai.organized_content && ai.organized_content.summary;
    if(text && String(text).trim().length>50){
      c.case_summary={text:String(text).trim(), stamp, materialLen:material.length, at:new Date().toISOString()};
      save();
      return c.case_summary;
    }
  }catch(e){ console.warn('[整合] 失敗，維持原本背景：',e.message); }
  finally{ _synthing=false; }
  return c.case_summary;
}


// ── 模組是否可進入（前一模組需 confirmed）──
const flow=()=>F.modulesForPath(c.path_type);

// 階段不上鎖。想先跳到後面看看、想回頭改，都由人決定；
// 導覽上仍會標示各階段的完成狀態，但不擋。
function moduleUnlocked(){ return true; }

/* ══════════ 階段 × 步驟 模型 ══════════
   階段（頂部大流程）：思考階段各自一站，三份正式文件與預覽合併成「產出文件」。
   步驟（階段內）：一次只顯示一步，避免使用者一往下拉就看到別題。 */

const DOC_MODULES=['m4','m5','m6','output'];

function stages(){
  const think=flow().filter(m=>!DOC_MODULES.includes(m));
  return [...think.map(m=>({key:m,title:F.MODULE_META[m].title,modules:[m]})),
          {key:'docs',title:'產出文件',modules:DOC_MODULES}];
}
const stageOf=(m)=>stages().find(s=>s.modules.includes(m));

/** 一個模組內的步驟清單 */
function stepsOf(mod){
  if(mod==='m1') return F.M1_CHAPTERS.map(ch=>({title:ch.title,kind:'m1ch',data:ch}));
  if(mod==='m2') return F.M2_PARTS.map(p=>({title:p.title,kind:'m2part',data:p}));
  if(mod==='m3') return [
    ...F.m3Sections().map(s=>({title:s.title,kind:'m3sec',data:s})),
    ...F.MATURITY_DIMENSIONS.map(d=>({title:d.name,kind:'m3dim',data:d})),
    {title:'彙整五個維度',kind:'m3agg'},
  ];
  return [{title:F.MODULE_META[mod].title,kind:'single'}];
}

function cursor(mod){
  const st=c.modules[mod]; const n=stepsOf(mod).length;
  let i=Math.min(Math.max(st?.cursor||0,0),n-1);
  if(stepLocked(mod,i)) i=0;   // 免費使用者一律釘在第一關，不論草稿存的是第幾步
  return i;
}
function setCursor(mod,i){
  if(!c.modules[mod])c.modules[mod]={structured_values:{}};
  c.modules[mod].cursor=Math.max(0,Math.min(i,stepsOf(mod).length-1));
  save();
}

// ── 頂部階段列（單列，與返回鍵同一條 bar）──
function renderStageBar(){
  const bar=$('#stageBar'); bar.innerHTML='';
  const list=stages();
  const curStage=stageOf(currentModule);
  const curIdx=list.findIndex(s=>curStage&&s.key===curStage.key);

  const row=el('div','flex items-center gap-1 overflow-x-auto');
  list.forEach((s,i)=>{
    if(i>0)row.appendChild(el('div',`stage-sep ${i<=curIdx?'done':''}`));
    const allDone=s.modules.every(m=>S.getModuleStatus(c,m)==='confirmed');
    const unlocked=moduleUnlocked(s.modules[0]);
    const on=curStage&&curStage.key===s.key;
    const b=el('button',`stage ${on?'on':''} ${allDone&&!on?'done':''} ${unlocked?'':'locked'}`);
    const num = allDone&&!on
      ? `<span class="num"><i data-lucide="check" class="w-3 h-3"></i></span>`
      : `<span class="num">${i+1}</span>`;
    b.innerHTML=`${num}<span>${s.title}</span>`;
    if(unlocked)b.addEventListener('click',()=>{ goModule(s.modules[0]); });
    row.appendChild(b);
  });
  bar.appendChild(row);
  if(window.lucide)lucide.createIcons();
}

/* ══════════ 兩側欄：左＝階段（給所有人看位置）｜右＝提問（給引導者）══════════
   兩欄都可收合，收合後中間思考區自動放大。狀態記在本機，下次進來維持。 */

const RAIL_KEY = { left: 'jd_rail_left', right: 'jd_rail_right' };
const railOpen = (side) => localStorage.getItem(RAIL_KEY[side]) !== 'closed';
function setRail(side, open) {
  localStorage.setItem(RAIL_KEY[side], open ? 'open' : 'closed');
  applyRailState();
  renderStageRail(); renderPromptRail();   // 收合／展開後內容不同，需重繪
}
function applyRailState() {
  const ws = $('#workspace'); if (!ws) return;
  const L = railOpen('left'), R = railOpen('right');
  ws.classList.toggle('no-left', !L);
  ws.classList.toggle('no-right', !R);
  // 思考區寬度直接指定：收得越多，想事情的空間越大
  // 思考區寬度全部以行內樣式指定，避免受串接影響。
  // 注意：grid item 不可用 margin auto（auto margin 會吃掉剩餘空間，
  // 使元素縮成內容寬而讓 max-width 失效），改用 justify-self 置中。
  const area = $('#moduleArea');
  if (area) {
    const wide = matchMedia('(min-width:1180px)').matches;
    ['max-width', 'width', 'margin', 'justify-self'].forEach(p => area.style.removeProperty(p));
    if (wide) {
      const w = (!L && !R) ? '900px' : ((!L || !R) ? '780px' : '680px');
      area.style.setProperty('width', '100%', 'important');
      area.style.setProperty('max-width', w, 'important');
      area.style.setProperty('margin', '0', 'important');
      area.style.setProperty('justify-self', 'center', 'important');
    }
  }
}
addEventListener('resize', applyRailState);

/** 收合後的窄條：直書標籤 ＋ 展開鍵 */
function collapsedRail(rail, side, label, icon) {
  const box = el('div', 'rail-collapsed sticky top-24');
  const btn = el('button', 'rail-toggle', `<i data-lucide="${icon}" class="w-4 h-4"></i>`);
  btn.title = `展開${label}`;
  btn.addEventListener('click', () => setRail(side, true));
  const v = el('div', 'vlabel', esc(label));
  v.addEventListener('click', () => setRail(side, true));
  box.appendChild(btn); box.appendChild(v);
  rail.appendChild(box);
}

/** 欄位標頭 ＋ 收合鍵 */
function railHead(box, side, label) {
  const head = el('div', 'rail-head');
  head.appendChild(el('div', 'text-[11px] tracking-[2px] text-tealdeep font-bold', esc(label)));
  const btn = el('button', 'rail-toggle', `<i data-lucide="${side === 'left' ? 'chevrons-left' : 'chevrons-right'}" class="w-4 h-4"></i>`);
  btn.title = `收起${label}`;
  btn.addEventListener('click', () => setRail(side, false));
  head.appendChild(btn);
  box.appendChild(head);
}

// ── 左欄：階段與位置 ──
function renderStageRail() {
  const rail = $('#stageRail'); if (!rail) return;
  rail.innerHTML = '';
  if (!railOpen('left')) return collapsedRail(rail, 'left', '階段', 'panel-left-open');

  const steps = stepsOf(currentModule);
  const meta = F.MODULE_META[currentModule];
  const i = cursor(currentModule);
  const box = el('div', 'sticky top-24');
  railHead(box, 'left', '階段');

  box.appendChild(el('div', 'mb-5',
    `<div class="text-[15px] font-black text-navy leading-snug">${esc(meta.title)}</div>`));

  // 「產出文件」這一站底下其實有四個模組，但它們各自只有一個步驟，
  // 所以之前左欄什麼都不顯示，只能靠「確認…進入下一步」單向前進。
  // 這裡把四個模組本身當成步驟列出來，跟其他階段一樣可以點選、可以回頭改。
  if (DOC_MODULES.includes(currentModule)) {
    const list = el('div', 'space-y-0.5');
    DOC_MODULES.forEach((m, k) => {
      const on = m === currentModule;
      const done = m === 'output' ? false : S.getModuleStatus(c, m) === 'confirmed';
      const b = el('button', `railitem ${on ? 'on' : ''} ${done ? 'done' : ''}`);
      b.innerHTML = `<span class="idx">${done && !on ? '✓' : k + 1}</span>${esc(F.MODULE_META[m].title)}`;
      b.addEventListener('click', () => {
        currentModule = m; c.current_module = m; save(); render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      list.appendChild(b);
    });
    box.appendChild(list);
    box.appendChild(el('p', 'mt-3 text-[11px] text-navy/35 leading-relaxed',
      '四份文件可以來回切換。改了前面的內容，後面重新產生一次就會更新。'));
    rail.appendChild(box);
    if (window.lucide) lucide.createIcons();
    return;
  }

  if (steps.length > 1) {
    /*
     * 只留這一份可點選的完整目錄（2026-07-23 使用者決策）。
     * 原本上方還有一段「相鄰預覽（▸ 現在／下一題）」，與這份清單資訊重複、
     * 又不能點——資訊與功能拆成兩塊。移除相鄰預覽，保留這份能點的清單當唯一目錄，
     * 預設展開，直接看得到自己在整個流程的哪裡。
     */
    const more = el('details', 'ref'); more.open = true;
    more.innerHTML = `<summary>全部 ${steps.length} 題</summary>`;
    const list = el('div', 'body space-y-0.5 max-h-[62vh] overflow-y-auto');
    steps.forEach((s, k) => {
      const locked = stepLocked(currentModule, k);
      const b = el('button', `railitem ${k === i ? 'on' : ''} ${stepDone(currentModule, k) ? 'done' : ''} ${locked ? 'opacity-55' : ''}`);
      b.innerHTML = `<span class="idx">${locked ? '🔒' : (stepDone(currentModule, k) && k !== i ? '✓' : k + 1)}</span>${esc(s.title)}`;
      b.addEventListener('click', () => {
        if(locked){ showUnlockGate(); return; }   // 鎖住的題點了顯示解鎖，不切換
        setCursor(currentModule, k); render(); window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      list.appendChild(b);
    });
    more.appendChild(list);
    box.appendChild(more);
  }
  rail.appendChild(box);
  if (window.lucide) lucide.createIcons();
}

// ── 右欄：給引導者的提問 ──
function renderPromptRail() {
  const rail = $('#promptRail'); if (!rail) return;
  rail.innerHTML = '';
  if (!railOpen('right')) return collapsedRail(rail, 'right', '提問', 'panel-right-open');

  const box = el('div', 'sticky top-24');
  railHead(box, 'right', '提問');

  const prompts = currentPrompts();
  if (prompts.length) {
    box.appendChild(el('p', 'text-[11.5px] text-navy/40 leading-relaxed mb-4',
      '這一頁可以問的問題。一次問一題，等對方講完再問下一題。'));
    const ol = el('ol', 'space-y-3');
    prompts.forEach(q => {
      if (q.group) { ol.appendChild(el('li', 'text-[11px] tracking-[1px] text-tealdeep font-bold pt-2', esc(q.text))); return; }
      ol.appendChild(el('li', 'text-[13px] text-navy/65 leading-[1.8] flex gap-2',
        `<span class="text-accent/50 shrink-0 mt-0.5">·</span><span>${esc(q.text || q)}</span>`));
    });
    box.appendChild(ol);
  } else {
    box.appendChild(el('p', 'text-[12px] text-navy/35 leading-relaxed', '這一頁沒有預設追問，讓對方自己說就好。'));
  }

  box.appendChild(el('p', 'mt-6 pt-5 border-t border-navy/10 text-[11.5px] text-navy/35 leading-relaxed',
    '想不出來的部分可以先留白，之後再回來補。'));

  // 目前 AI 對整個案例的理解。看得到、改得動——改過的會直接影響後面每一次整理。
  const sum = c.case_summary;
  const sBox = el('div', 'mt-6 pt-5 border-t border-navy/10');
  const sHead = el('div', 'flex items-center justify-between mb-2');
  sHead.innerHTML = '<span class="text-[11px] tracking-[1px] font-bold text-tealdeep">目前的整體理解</span>';
  const reBtn = el('button', 'text-[11px] text-navy/40 hover:text-tealdeep', sum ? '重新整合' : '整合一次');
  reBtn.addEventListener('click', async () => {
    reBtn.textContent = '整合中…'; reBtn.disabled = true;
    await refreshSummary(true);
    render();
  });
  sHead.appendChild(reBtn);
  sBox.appendChild(sHead);
  if (sum && sum.text) {
    const ta = el('textarea', 'w-full text-[12px] leading-[1.75] text-navy/65 border border-navy/12 rounded-lg p-2.5 resize-y bg-white');
    ta.rows = 10; ta.value = sum.text;
    ta.disabled = readOnly();
    ta.addEventListener('input', () => {
      c.case_summary = { ...c.case_summary, text: ta.value, edited: true };
      save();
    });
    sBox.appendChild(ta);
    sBox.appendChild(el('p', 'text-[11px] text-navy/30 mt-1.5 leading-relaxed',
      '這是後面每一次整理的背景。覺得哪裡不對就直接改，改完會影響後續整理。'));
  } else {
    sBox.appendChild(el('p', 'text-[12px] text-navy/35 leading-relaxed',
      '談過幾題、並且 AI 已設定之後，這裡會出現整合後的案例理解，避免後面重複問已經講過的事。'));
  }
  box.appendChild(sBox);

  rail.appendChild(box);
  if (window.lucide) lucide.createIcons();
}

/** 目前這一步要給引導者的提問（{text, group?} 或字串） */
function currentPrompts() {
  const steps = stepsOf(currentModule), s = steps[cursor(currentModule)];
  if (!s) return [];
  if (currentModule === 'existing') return F.EXISTING_QUESTIONS.map(text => ({ text }));
  if (s.kind === 'm1ch' || s.kind === 'm3sec' || s.kind === 'm3dim') return (s.data.questions || []).map(text => ({ text }));
  if (s.kind === 'm2part') {
    if (s.data.categories) {
      // 一頁一類，直接用該類的追問；不顯示 A／B／C／D 代號
      return s.data.categories.flatMap(cat => (cat.questions || []).map(text => ({ text })));
    }
    return (s.data.questions || []).map(text => ({ text }));
  }
  return [];
}

/** 某個步驟是否已完成（用於脈絡欄打勾） */
function stepDone(mod,k){
  const steps=stepsOf(mod), s=steps[k];
  if(!s) return false;
  if(s.kind==='m1ch') return !!String(c.fields[s.data.rawId]?.value||'').trim() || s.data.outputs.some(o=>c.fields[o.id]);
  if(s.kind==='m3sec') return !!String(c.fields[s.data.rawId]?.value||'').trim() || F.sectionOutputs(s.data).some(o=>c.fields[o.id]);
  if(s.kind==='m3dim') return !!(c.fields['m3._raw_'+s.data.code.replace('.','_')]?.value||'').trim();
  if(s.kind==='m3agg') return S.isConfirmed(c,'m3.maturity_anchors');
  if(s.kind==='m2part') return S.getModuleStatus(c,'m2')==='confirmed';
  return false;
}

function goModule(m){
  currentModule=m; c.current_module=m; save(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/** 一頁一題的底部導覽 */
function stepNav(area,mod,{onNext,nextLabel,nextEnabled=true}={}){
  const steps=stepsOf(mod), i=cursor(mod);
  const wrap=el('div','flex items-center justify-between gap-3 mt-10 pt-6 border-t border-navy/10');
  const prev=el('button','inline-flex items-center gap-1.5 px-4 py-2.5 rounded-lg text-navy/60 hover:bg-navy/5 disabled:opacity-30',
    '<i data-lucide="arrow-left" class="w-4 h-4"></i>上一題');
  prev.disabled=i===0;
  prev.addEventListener('click',()=>{setCursor(mod,i-1);render();window.scrollTo({top:0,behavior:'smooth'});});
  wrap.appendChild(prev);

  const isLast=i===steps.length-1;
  const label=nextLabel||(isLast?'完成這個階段':'下一題');
  const next=el('button',`inline-flex items-center gap-1.5 px-5 py-2.5 rounded-lg font-semibold ${nextEnabled?'bg-navy text-ivory hover:bg-tealdeep':'bg-navy/15 text-navy/40 cursor-not-allowed'}`,
    `${label}<i data-lucide="arrow-right" class="w-4 h-4"></i>`);
  next.disabled=!nextEnabled;
  next.addEventListener('click',()=>{
    if(onNext&&isLast){onNext();return;}
    if(isLast)return;
    if(stepLocked(mod,i+1)){ showUnlockGate(); return; }   // 免費只到第一關，下一題要解鎖
    setCursor(mod,i+1);render();window.scrollTo({top:0,behavior:'smooth'});
  });
  wrap.appendChild(next);
  area.appendChild(wrap);
}

/** 口述回應區 */
function answerBlock(area,fieldId,placeholder){
  const wrap=el('div','mb-2');
  wrap.appendChild(el('div','flex items-center gap-1.5 mb-2',
    '<i data-lucide="pencil-line" class="w-4 h-4 text-navy/35"></i><span class="text-sm font-semibold text-navy/70">你的回應</span>'));

}

/** 頂列常駐顯示 AI 剩餘次數。低於 5 次變色，讓人自己斟酌。 */
async function paintQuotaChip(){
  const chip=$('#accessChip'); if(!chip) return;
  const a=await AIX.myAccess();
  if(!a?.hasCode){ chip.classList.add('hidden'); return; }
  chip.classList.remove('hidden');
  if(a.isInstructor){
    chip.className='badge bg-tealgreen/15 text-tealdeep shrink-0';
    chip.textContent='講師模式 · 不計次';
    return;
  }
  const left=AIX.remaining(a);
  chip.className='badge shrink-0 '+(left<=5?'bg-accent/15 text-accent':'bg-tealgreen/15 text-tealdeep');
  chip.textContent=`AI 還有 ${left} 次`;
}

const readOnly=()=>S.isClosed(c);

/**
 * 鎖住的內容被點到時，就地顯示解鎖說明＋兌換框。
 * 不用彈窗打斷，貼著操作點出現，兌換成功即解鎖並重繪。
 */
function showUnlockGate(){
  document.querySelectorAll('.jd-unlock-gate').forEach(n=>n.remove());
  const gate=el('div','jd-unlock-gate mt-8 p-5 rounded-2xl border border-tealgreen/30 bg-mist/40');
  gate.innerHTML=`<div class="flex items-start gap-3">
      <i data-lucide="lock" class="w-5 h-5 text-tealdeep shrink-0 mt-0.5"></i>
      <div class="min-w-0">
        <div class="font-bold text-navy mb-1">這一段是完整版內容</div>
        <div class="text-sm text-navy/65 leading-relaxed">免費體驗開放每個階段的第一題。輸入課程授權碼即可解鎖全部問題、AI 整理與完整文件。</div>
      </div>
    </div>`;
  const wrap=el('div','mt-3 ml-8 flex flex-wrap items-center gap-2');
  const inp=el('input','border border-navy/20 rounded-lg px-3 py-2 text-sm font-mono w-56');
  inp.placeholder='ORMAP-XXXX-XXXX'; inp.setAttribute('aria-label','課程授權碼');
  const go=el('button','bg-navy text-ivory px-4 py-2 rounded-lg text-sm font-semibold hover:bg-tealdeep','兌換解鎖');
  const msg=el('span','text-xs text-accent');
  const doIt=async()=>{
    const code=inp.value.trim(); if(!code) return;
    go.disabled=true; msg.textContent='';
    try{ await AIX.redeemCode(code); _unlocked=true; paintQuotaChip(); render(); }
    catch(e){ msg.textContent=e.message||'兌換失敗'; go.disabled=false; }
  };
  go.addEventListener('click',doIt);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doIt(); });
  wrap.append(inp,go,msg); gate.appendChild(wrap);
  $('#moduleArea')?.appendChild(gate);
  if(window.lucide)lucide.createIcons();
  gate.scrollIntoView({behavior:'smooth', block:'center'});
}

   這一面是唯讀的，避免兩邊同時寫入互相覆蓋。 */

const IS_GUIDE = new URLSearchParams(location.search).get('view') === 'guide';

function openGuideWindow() {
  const url = `${location.pathname}?caseId=${c.case_id}&view=guide`;
  window.open(url, 'jd_guide_' + c.case_id, 'width=520,height=900');

/** 目前這一步在畫面上的標題與大問題 */
function currentStepInfo() {
  const steps = stepsOf(currentModule);
  const s = steps[cursor(currentModule)];
  const meta = F.MODULE_META[currentModule];
  if (currentModule === 'existing') {
    return { stage: meta.title, title: '先把這個職務目前的樣子講清楚', core: '這個職務現在實際上在做什麼？', pos: '' };
  }
  const pos = steps.length > 1 ? `第 ${cursor(currentModule) + 1} / ${steps.length} 題` : '';
  if (!s) return { stage: meta.title, title: meta.title, core: '', pos };
  const d = s.data || {};
  return {
    stage: meta.title,
    title: s.kind === 'm3dim' ? d.name : (s.title || meta.title),
    core: d.coreQuestion || d.definition || '',
    pos,
  };
}

/** 回應者目前這一步寫了什麼（唯讀鏡像） */
function currentAnswers() {
  const steps = stepsOf(currentModule);
  const s = steps[cursor(currentModule)];
  const out = [];
  const push = (label, id) => {
    const v = c.fields[id]?.value;
    if (typeof v === 'string' && v.trim()) out.push({ label, text: v });
  };
  if (currentModule === 'existing') {
    F.EXISTING_FIELDS.forEach(f => push(f.name, f.id));
    return out;
  }
  if (!s) return out;
  const d = s.data || {};
  if (d.rawId) push('口述回應', d.rawId);
  if (s.kind === 'm3dim') push('口述回應', 'm3._raw_' + d.code.replace('.', '_'));
  if (s.kind === 'm2part' && d.categories) d.categories.forEach(cat => push('口述回應', cat.rawId));
  return out;
}

function renderGuideView() {
  document.body.classList.add('guide-mode');
  const root = $('#moduleArea');
  root.innerHTML = '';
  const info = currentStepInfo();

  root.appendChild(el('div', 'mb-6',
    `<div class="flex items-center justify-between gap-2 mb-2">
       <span class="text-[11px] tracking-[2px] text-tealdeep font-bold">${esc(info.stage)}</span>
       <span class="text-[11px] text-navy/40">${esc(info.pos)}</span>
     </div>
     <h1 class="text-[22px] font-black text-navy leading-snug">${esc(info.title)}</h1>
     ${info.core ? `<p class="text-[17px] leading-[1.85] text-navy/80 font-medium mt-3">${esc(info.core)}</p>` : ''}`));

  // 提問腳本
  const prompts = currentPrompts();
  const box = el('div', 'rounded-2xl border border-accent/25 bg-accent/5 p-5 mb-6');
  box.appendChild(el('div', 'flex items-center gap-1.5 mb-1',
    '<i data-lucide="messages-square" class="w-4 h-4 text-accent"></i><span class="text-[12px] tracking-[1px] text-accent font-bold">提問</span>'));
  box.appendChild(el('p', 'text-[11.5px] text-navy/40 leading-relaxed mb-4', '一次問一題，等對方講完再問下一題。'));
  if (prompts.length) {
    const ol = el('ol', 'space-y-3.5');
    prompts.forEach(q => ol.appendChild(el('li', 'text-[14px] text-navy/75 leading-[1.8] flex gap-2.5',
      `<span class="text-accent/50 shrink-0 mt-0.5">·</span><span>${esc(q.text || q)}</span>`)));
    box.appendChild(ol);
  } else {
    box.appendChild(el('p', 'text-[13px] text-navy/40', '這一頁沒有預設追問，讓對方自己說就好。'));
  }
  root.appendChild(box);

  // 對方正在寫什麼
  root.appendChild(el('div', 'flex items-center gap-1.5 mb-3',
    '<i data-lucide="pencil-line" class="w-4 h-4 text-tealgreen"></i><span class="text-[12px] tracking-[1px] text-tealdeep font-bold">對方寫的內容</span>'));
  const answers = currentAnswers();
  if (answers.length) {
    answers.forEach(a => {
      const card = el('div', 'rounded-xl border border-navy/12 bg-white p-4 mb-3');
      card.appendChild(el('div', 'text-[11px] text-navy/40 mb-1.5', esc(a.label)));
      card.appendChild(el('div', 'text-[14.5px] leading-[1.9] text-navy/80 whitespace-pre-wrap', esc(a.text)));
      root.appendChild(card);
    });
  } else {
    root.appendChild(el('div', 'rounded-xl border border-dashed border-navy/15 p-6 text-center text-[13px] text-navy/35',
      '對方還沒開始寫。'));
  }

  root.appendChild(el('p', 'mt-8 pt-5 border-t border-navy/10 text-[11.5px] text-navy/35 leading-relaxed',
    '這個視窗會跟著對方的畫面自動更新，只能看、不能改。'));
  if (window.lucide) lucide.createIcons();
}

// ═══════════ 模組渲染 ═══════════
function render(){
  // 引導者視窗：唯讀，且頂列已移除，必須在動到 header 之前先返回
  if(IS_GUIDE){ renderGuideView(); return; }
  // 頭部顯示「組織 · 職務」，讓人隨時知道這個案例在處理誰的哪個職務。
  // 之前顯示 case.title（示範案例是一段描述），看不出組織與職務。（2026-07-23 使用者回報）
  const t=$('#hCaseTitle');
  if(t){
    const org=c.fields['case.organization_name']?.value||'';
    const job=c.fields['case.job_title_working']?.value||'';
    t.textContent = (org||job) ? [org,job].filter(Boolean).join(' · ') : (c.fields['case.title']?.value||'案例');
    t.title = t.textContent;
  }
  renderStageBar(); applyRailState(); renderStageRail(); renderPromptRail(); renderAccess();
  const area=$('#moduleArea'); area.innerHTML='';
  const R={existing:renderExisting, m1:renderM1, m2:renderM2, m3:renderM3, m4:renderM4, m5:renderM5, m6:renderM6, output:renderOutput};
  (R[currentModule]||renderExisting)(area);
  if(window.lucide)lucide.createIcons();
}

/* 跨視窗同步：另一個視窗改了資料就重新載入這個案例並重繪。
   storage 事件不會在自己這個視窗觸發，所以打字時不會被自己中斷。 */
let syncTimer=null;
S.watchExternalChanges(()=>{
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{
    const fresh=S.getCase(caseId);
    if(!fresh) return;
    c=fresh;
    currentModule=c.current_module||currentModule;
    render();
  },250);
});

// ── 通用：欄位輸入卡（U 純人工）──
function inputCard(field, value, onInput){
  const card=el('div','bg-white rounded-xl border border-navy/10 p-4');
  card.innerHTML=`<div class="flex items-center justify-between mb-1.5">
    <label class="font-semibold text-navy">${field.name}${field.required?' <span class="text-accent">*</span>':''}</label>
    ${roleBadge(field.ai)}</div>
    ${field.help?`<p class="text-xs text-navy/40 mb-2">${field.help}</p>`:''}`;
  let input;
  if(field.type==='list'){
    input=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[80px] focus:outline-none focus:border-tealgreen');
    input.placeholder='一行一項'; input.value=listToText(value);
    input.addEventListener('input',()=>onInput(textToList(input.value)));
  }else if(field.type==='textarea'){
    input=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[80px] focus:outline-none focus:border-tealgreen');
    input.value=value||''; input.addEventListener('input',()=>onInput(input.value));
  }else{
    input=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-tealgreen');
    input.value=value||''; input.addEventListener('input',()=>onInput(input.value));
  }
  if(readOnly())input.disabled=true;
  card.appendChild(input);
  return card;
}

// ═══════════ M1 問題釐清（一頁一題）═══════════
function m1State(){
  c.modules.m1=c.modules.m1||{structured_values:{}};
  c.modules.m1.chapters=c.modules.m1.chapters||{};
  return c.modules.m1;
}

function renderM1(area){
  const i=cursor('m1');
  const ch=F.M1_CHAPTERS[i];
  const st=m1State().chapters[ch.code]||null;
  const shown=demoShown(ch.code, st);   // 示範：按 AI 揭露前先藏整理草稿
  const allConfirmed=ch.outputs.every(o=>S.isConfirmed(c,o.id));

  thinkHeader(area,{eyebrow:`問題釐清 · ${ch.code}`,title:ch.title,icon:'search',coreQuestion:ch.coreQuestion});

  if(ch.showProblemTypes){
    refBlock(area,'參考：八種問題類型',
      F.PROBLEM_TYPES.map(t=>`<div style="margin-bottom:6px"><b style="color:#136E68">${t.name}</b>　${esc(t.desc)}</div>`).join(''));
  }

  answerBlock(area,ch.rawId,ch.responseHint);

  const aiRow=el('div','flex items-center gap-3 mt-5');
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep disabled:opacity-40',
    `<i data-lucide="sparkles" class="w-4 h-4"></i>${shown?'重新整理':'請 AI 幫我整理'}`);
  aiBtn.disabled=readOnly();
  aiBtn.addEventListener('click',async()=>{
    if(isDemo){ demoFakeRun(ch.code, aiBtn); return; }   // 示範：假裝在跑並揭露備好的草稿
    const text=c.fields[ch.rawId]?.value;
    // 沒寫東西也讓他按。整理不出來就整理不出來，不要用彈窗擋人。
    let r=AI.runM1Chapter(ch.code,text);
    r=await runWithAi(r.task_code,
      `《問題釐清定位書》${ch.code} ${ch.title}。${ch.purpose}　依使用者的口述整理可編輯草稿。`+
      // 帶上每一格的角色（AI 整理／AI 推論·待確認／人工決定）。
      // 少了這個，AI 只看得到欄位名稱，會一律用「他講過才寫」的標準去填，
      // 於是設計成給它推論的那幾格永遠是空的——不是它判斷不必填，是不知道可以填。
      `\n欄位定義（角色說明：整理＝把他說的話整理好；推論＝可以由你推論，人會再確認；人工決定＝最後由人定案，你仍先給草稿）：`+
      `\n${ch.outputs.map(o=>`・${o.id}｜${o.name}｜${o.type}｜${AI_ROLE_HINT[o.ai]||'整理'}`).join('\n')}`+
      /*
       * 口述的長處是完整，短處是破碎——同一件事散在三個地方、因果順序顛倒、
       * 講到一半跳題。使用者要的正是 AI 補這一塊：重組、串起邏輯鏈，
       * 讓草稿比原話更通順。（2026-07-22 使用者決策「輕」力道）
       *
       * 邊界寫在第二句：串的是他講過的事之間的關係，不是憑空長出新事實。
       * 這跟 STANCE 的「不要為了填滿而補寫」不衝突——那條講的是不要編造沒談過的內容。
       */
      `\n口述會破碎、順序顛倒、同一件事散在好幾處。請重組並把因果、前後關係串起來，讓這份草稿讀起來比原話更通順完整。`+
      `\n串的是他已經講過的事情之間的關係；需要延伸的判斷放進標示「推論」的欄位或 inferences，不要寫成他說過的話。`+
      `\n使用者已明確表達的增員或找人決策要忠實保留，不要自動降格為假設。任何缺口或不同角度都只是可選提醒，不得阻擋流程。`,
      r, {目前為止談過的內容:caseBrief(ch.rawId), 這一題他說的:text}, aiBtn);
      if(!r) return;   // AI 不可用時不寫入任何欄位，說明已由 runWithAi 顯示
    S.recordAiJob(c,r.task_code);
    for(const[fid,v]of Object.entries(r.organized_content)){
      if(aiEmpty(v))continue;   // 空的就別動這一格，維持原樣
      const f=ch.outputs.find(o=>o.id===fid);
      S.saveField(c,fid,v,f&&f.ai==='AI-I'?'ai_inference':'ai_organized',r.task_code);
    }
    m1State().chapters[ch.code]={inferences:r.inferences_requiring_confirmation,gaps:r.information_gaps,warnings:r.warnings,source:r._source,model:r._model};
    save();render();
  });
  aiRow.appendChild(aiBtn);
  if(allConfirmed)aiRow.appendChild(el('span','inline-flex items-center gap-1 text-sm text-tealdeep font-semibold',
    '<i data-lucide="check-circle" class="w-4 h-4"></i>本題已確認'));
  area.appendChild(aiRow);

  if(shown){
    if(st.warnings?.length)area.appendChild(el('div','mt-6 p-3.5 rounded-xl bg-mist/45 border border-tealgreen/25 text-sm text-navy/70 leading-relaxed',
      `<div class="text-xs font-semibold text-tealdeep mb-2">延伸思考（不影響繼續）</div>`+
      st.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-tealdeep shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

    area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
      '<i data-lucide="list-checks" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">AI 整理草稿（可修改、可留白，確認與否不影響繼續）</span>'));
    const outWrap=el('div','space-y-3'); area.appendChild(outWrap);
    ch.outputs.forEach(o=>outWrap.appendChild(outputCard(o,st)));
  }

  const isLast=i===F.M1_CHAPTERS.length-1;
  stepNav(area,'m1',{
    nextLabel:isLast?'完成問題釐清':'下一題',
    nextEnabled:true,
    onNext:()=>{S.setModuleStatus(c,'m1','confirmed');goModule('m2');},
  });
}


// ═══════════ M2 職務需求界定（一頁一部分）═══════════

/**
 * 整合決策：口述 → AI 整合成量化配置表 → 人改數字。
 *
 * 為什麼要這樣做：原本這一節只有五格空白 textarea，等於要人一次想清楚
 * 「幾個正職、幾個兼職、外包多少錢」再寫下來。使用者回饋思考負擔太重，
 * 實際上多半只寫得出幾句籠統的話，估算根本沒發生。
 *
 * AI 的角色是「先給一個起點」，不是替人決定——所有數字都在可編輯的表格裡，
 * 而且配置表標記為 AI-I（推論·待確認），人改掉它是預期行為不是例外。
 */
function renderM2Mix(area,part){
  area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
    '<i data-lucide="mic" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">先講講你的想法</span>'));
  answerBlock(area,part.rawId,part.responseHint);

  const fields=(part.blocks||[]).flatMap(b=>b.fields||[]);
  const done=fields.some(f=>c.fields[f.id]?.source_type?.startsWith('ai_'));
  const aiRow=el('div','flex items-center gap-3 mt-5');
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep disabled:opacity-40',
    `<i data-lucide="sparkles" class="w-4 h-4"></i>${done?'重新整理':'請 AI 幫我整理成配置表'}`);
  aiBtn.disabled=readOnly();
  aiBtn.addEventListener('click',async()=>{
    if(done&&!confirm('重新整理會覆蓋下面的配置表與欄位，也會再花一次 AI 用量。確定嗎？'))return;
    const text=c.fields[part.rawId]?.value;
    let r=AI.runM2Mix();
    r=await runWithAi(r.task_code,
      `《職務需求界定》${part.code} ${part.title}。${part.purpose}`+
      `\n欄位定義（角色說明：整理＝把他說的話整理好；推論＝可以由你推論，人會再確認）：`+
      `\n${fields.map(f=>`・${f.id}｜${f.name}｜${f.type}｜${AI_ROLE_HINT[f.ai]||'整理'}`).join('\n')}`+
      // 這一節的核心價值就在這裡：把「大概要找個人」變成可以實際算一次的數字。
      `\nm2.resource_plan 是一張人力與資源配置表，一列一種合作形式。請依他講的內容與前面談過的工作量，`+
      `**主動估一個具體的起點**：每一列都要填合作形式、人數、負責範圍、預估成本，人數寫成「1 人」這種明確數量，`+
      `成本寫成「月薪 4.5 萬」「專案 8 萬」這類帶單位的金額。合作形式只能從既有選項挑。`+
      `\n他沒講到的部分就依常識與前面的脈絡推估，這是給他改的起點，留白對他沒有幫助；`+
      `但推估出來的數字要合理可辯護，不要填明顯離譜的值。若真的完全沒有依據可推，該列成本留空即可。`+
      `\n如果同時採用多種合作形式，就列多列；只採用一種，就只列一列。`+
      `\n其餘欄位依他的口述整理，並與配置表保持一致——例如組合、分工與預算分配要對得上表裡的列。`,
      r, {目前為止談過的內容:caseBrief(part.rawId), 這一題他說的:text,
          前面勾選的方案:F.M2_ALL_CATEGORIES.map(cat=>({類別:cat.title,已勾選:c.fields[cat.optionsId]?.value||[]}))}, aiBtn);
    if(!r)return;
    S.recordAiJob(c,r.task_code);
    for(const[fid,v]of Object.entries(r.organized_content)){
      if(aiEmpty(v))continue;
      const f=fields.find(x=>x.id===fid);
      S.saveField(c,fid,v,f&&f.ai==='AI-I'?'ai_inference':'ai_organized',r.task_code);
    }
    m2State().mix={warnings:r.warnings,inferences:r.inferences_requiring_confirmation,source:r._source,model:r._model};
    save();render();
  });
  aiRow.appendChild(aiBtn);
  area.appendChild(aiRow);

  const st=m2State().mix;
  if(st?.warnings?.length)area.appendChild(el('div','mt-6 p-3.5 rounded-xl bg-mist/45 border border-tealgreen/25 text-sm text-navy/70 leading-relaxed',
    `<div class="text-xs font-semibold text-tealdeep mb-2">延伸思考（不影響繼續）</div>`+
    st.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-tealdeep shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

  if(done)area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
    '<i data-lucide="list-checks" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">AI 整理草稿（數字都可以直接改）</span>'));
}

/** 一個解法類別：口述 → 決策表 → 檢核提醒（標題與大問題已在頁首） */
function renderCategory(cat){
  const wrap=el('section');
  answerBlock(wrap,cat.rawId,'可以先說說目前的實際情況。');

  // 決策表
  const picked=c.fields[cat.optionsId]?.value||[];
  const notes=c.fields[cat.optionsId+'_notes']?.value||{};
  wrap.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
    '<i data-lucide="check-square" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">可能的方案</span>'));

  const box=el('div','space-y-3');
  cat.options.forEach(opt=>{
    const on=picked.includes(opt.name);
    const card=el('div',`rounded-xl border p-4 transition-colors ${on?'border-tealgreen/50 bg-tealgreen/5':'border-navy/12 bg-white'}`);
    const head=el('label','flex items-start gap-3 cursor-pointer');
    const chk=el('input'); chk.type='checkbox'; chk.className='accent-tealgreen w-4 h-4 mt-1 shrink-0';
    chk.checked=on; chk.disabled=readOnly();
    chk.addEventListener('change',()=>{
      const cur=c.fields[cat.optionsId]?.value||[];
      const next=chk.checked?[...cur,opt.name]:cur.filter(x=>x!==opt.name);
      S.saveField(c,cat.optionsId,next,'user_input'); S.confirmField(c,cat.optionsId); save(); render();
    });
    head.appendChild(chk);
    head.appendChild(el('div','min-w-0',
      `<div class="font-semibold text-navy text-[15px] leading-snug">${esc(opt.name)}</div>
       <div class="text-[13px] text-navy/50 leading-relaxed mt-1.5"><span class="text-tealdeep font-semibold">什麼情況適用：</span>${esc(opt.when)}</div>`));
    card.appendChild(head);

    // 勾選後才展開「原因」與「後續行動」兩格，分開想、分開寫
    if(on){
      const cur=notes[opt.name]||{};
      const nw=el('div','mt-4 pt-4 border-t border-tealgreen/20 grid sm:grid-cols-2 gap-3');
      [['reason','原因','為什麼這個方案適合現在的情況？'],
       ['action','後續行動','接下來要做什麼、由誰做、什麼時候？']].forEach(([key,label,ph])=>{
        const w=el('div');
        w.innerHTML=`<div class="text-xs font-semibold text-tealdeep mb-1.5">${label}</div>`;
        const ta=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2.5 text-sm leading-relaxed min-h-[76px] bg-white');
        ta.placeholder=ph;
        ta.value=(typeof cur==='string'?(key==='reason'?cur:''):cur[key])||'';
        ta.disabled=readOnly();
        ta.addEventListener('input',()=>{
          const all={...(c.fields[cat.optionsId+'_notes']?.value||{})};
          const prev=typeof all[opt.name]==='string'?{reason:all[opt.name]}:{...(all[opt.name]||{})};
          prev[key]=ta.value; all[opt.name]=prev;
          S.saveField(c,cat.optionsId+'_notes',all,'user_input'); S.confirmField(c,cat.optionsId+'_notes'); save();
        });
        w.appendChild(ta); nw.appendChild(w);
      });
      card.appendChild(nw);
    }
    box.appendChild(card);
  });
  wrap.appendChild(box);

  if(cat.reminder)wrap.appendChild(el('div','mt-4 p-4 rounded-xl bg-accent/8 border border-accent/20 text-[13.5px] text-navy/70 leading-loose flex gap-2.5',
    `<i data-lucide="alert-circle" class="w-4 h-4 text-accent shrink-0 mt-1"></i><span><b class="text-accent">檢核提醒：</b>${esc(cat.reminder)}</span>`));

  return wrap;
}

/** 最後一部分的 AI 整理與交接 */
function renderM2Summary(area){
  const aiWrap=el('div','mt-12 pt-8 border-t border-navy/10');
  aiWrap.appendChild(el('div','flex items-center gap-2 mb-4',
    '<i data-lucide="sparkles" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">整理這一階段的結果</span>'));
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep',
    '<i data-lucide="sparkles" class="w-4 h-4"></i>請 AI 幫我整理');
  aiBtn.disabled=readOnly();
  aiWrap.appendChild(aiBtn);
  const result=el('div','mt-6'); aiWrap.appendChild(result);
  area.appendChild(aiWrap);

  /** 只讀已存好的內容重畫，不呼叫 AI。 */
  function paintM2(){
    const checks={}; F.m2AllFieldIds().forEach(id=>checks[id]=c.fields[id]?.value);
    drawM2(AI.runM2(checks));
  }

  /** 真的呼叫 AI，只在按下按鈕時。 */
  async function generateM2(){
    const checks={}; F.m2AllFieldIds().forEach(id=>checks[id]=c.fields[id]?.value);
    let r=AI.runM2(checks);
    // M2 之前完全沒接 AI，所以「承接的優先問題」「最低／理想改善程度」「限制」
    // 這些在第一部其實都講過的欄位，全部停在待確認。這裡補上。
    r=await runWithAi('M2-01',
      '《職務需求界定書》整理這一階段的結論，並把上游《問題釐清定位書》已經談過的內容承接下來。'+
      '\n請填寫這些欄位（他前面講過的就直接帶過來，不要因為這一頁沒重講就留白）：'+
      '\n・m2.priority_problem｜本次要處理的優先問題'+
      '\n・m2.min_improvement｜最低需要改善到什麼程度'+
      '\n・m2.ideal_improvement｜理想希望改善到什麼程度'+
      '\n・m2.constraints｜重要限制或不可犧牲條件'+
      '\n・m2.pending_assumptions｜仍待驗證的假設或資訊'+
      '\n・m2.out_of_scope｜暫時不處理的問題'+
      '\n以及依他實際勾選的方案，整理人力策略結論與角色類型判斷。',
      r, {目前為止談過的內容:caseBrief(), 他在這一頁的勾選與填寫:checks}, aiBtn);
      if(!r) return;   // AI 不可用時不寫入任何欄位，說明已由 runWithAi 顯示
    S.recordAiJob(c,'M2-01');
    // AI 補出來的欄位寫回案例，讓文件抓得到
    Object.entries(r.organized_content||{}).forEach(([fid,v])=>{
      if(fid.startsWith('m2.') && v!=null && v!=='') S.saveField(c,fid,v,'ai_organized','M2-01');
    });
    save();
    drawM2(r);
  }

  function drawM2(r){
    result.innerHTML='';
    r.contradictions.forEach(x=>result.appendChild(el('div','rounded-xl bg-white border-2 border-accent p-5 mb-4',
      `<div class="font-bold text-accent mb-2.5 flex items-center gap-1.5"><i data-lucide="alert-triangle" class="w-4 h-4"></i>需要回頭確認</div>
       <p class="text-[15px] text-navy/75 leading-loose mb-2">${esc(x.message)}</p>
       <p class="text-sm text-navy/55 leading-loose mb-4">${esc(x.detail)}</p>
       <div class="p-3.5 rounded-lg bg-mist/50 border border-navy/10 text-sm text-navy/70 leading-loose"><b class="text-tealdeep">由你決定：</b>${esc(x.suggestion)}</div>`)));
    if(r.warnings.length)result.appendChild(el('div','p-4 rounded-xl bg-accent/8 border border-accent/20 text-sm text-navy/70 leading-loose mb-4 space-y-1.5',
      r.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-accent shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

    const oc=r.organized_content;
    result.appendChild(el('div','bg-white rounded-xl border border-navy/10 p-5 mb-4',
      `<div class="font-semibold text-navy mb-3.5 text-sm">整理結果</div>
       <div class="text-sm space-y-2.5 text-navy/70 leading-relaxed">
         <div><b class="text-tealdeep">第一類 改善既有資源：</b>${oc.first_class.length?oc.first_class.map(esc).join('；'):'<span class="text-accent">未勾選</span>'}</div>
         <div><b class="text-tealdeep">第二類 增加能力或人力：</b>${oc.second_class.length?oc.second_class.map(esc).join('；'):'未勾選'}</div>
         <div><b class="text-tealdeep">合作形式組合：</b>${oc.engagement_mix?esc(oc.engagement_mix):'<span class="text-accent">未填寫</span>'}</div>
         <div><b class="text-tealdeep">預算配置：</b>${oc.budget_plan?esc(oc.budget_plan):'<span class="text-accent">未填寫</span>'}</div>
         <div><b class="text-tealdeep">人力策略結論：</b>${oc.staffing_decision.map(esc).join('；')||'<span class="text-accent">未勾選</span>'}</div>
         <div><b class="text-tealdeep">角色類型：</b>${oc.role_types.map(esc).join('；')||'<span class="text-accent">未勾選</span>'}</div>
       </div>`));

    refBlock(result,'交接至《職務與人才規格定位》',
      F.M2_HANDOFF.map(h=>`<div style="margin-bottom:8px"><b style="color:#136E68">${h.to}</b><ul style="margin:4px 0 0 16px">${h.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')
      +`<p style="color:#E88A55;margin-top:8px">${esc(F.M2_HANDOFF_NOTE)}</p>`);

    const cf=el('button','mt-2 bg-tealgreen text-white px-5 py-2.5 rounded-lg font-semibold','確認需求界定，進入職務與人才規格');
    cf.disabled=readOnly();
    cf.addEventListener('click',()=>{S.setModuleStatus(c,'m2','confirmed');goModule('m3');});
    result.appendChild(cf);
    if(window.lucide)lucide.createIcons();
  }
  aiBtn.addEventListener('click',()=>{
    const done=F.m2AllFieldIds().some(id=>c.fields[id]?.source_type==='ai_organized');
    if(done && !confirm('重新整理會覆蓋目前的內容，也會再花一次 AI 用量。確定嗎？')) return;
    generateM2();
  });
  // 進到這一頁只重畫已存好的內容，不呼叫 AI。
  if(S.getModuleStatus(c,'m2')==='confirmed')paintM2();
}


function renderM2Block(b){
  const wrap=el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3');
  if(b.title)wrap.appendChild(el('div','font-bold text-navy mb-1',b.title));
  if(b.note)wrap.appendChild(el('p','text-xs text-navy/50 mb-2',esc(b.note)));

  if(b.type==='checklist'){
    const cur=c.fields[b.id]?.value||[];
    b.options.forEach(opt=>{
      const row=el('label','flex items-start gap-2 py-1.5 cursor-pointer hover:bg-mist/30 rounded px-1');
      const chk=el('input'); chk.type='checkbox'; chk.className='accent-tealgreen w-4 h-4 mt-0.5 shrink-0';
      chk.checked=cur.includes(opt); chk.disabled=readOnly();
      chk.addEventListener('change',()=>{
        const v=c.fields[b.id]?.value||[];
        const next=chk.checked?[...v,opt]:v.filter(x=>x!==opt);
        S.saveField(c,b.id,next,'user_input'); S.confirmField(c,b.id); save();
      });
      row.appendChild(chk);
      row.appendChild(el('span','text-sm text-navy/75 leading-snug',esc(opt)));
      wrap.appendChild(row);
    });
    return wrap;
  }

  // type === 'fields'
  const grid=el('div','space-y-3');
  (b.fields||[]).forEach(f=>{
    const w=el('div');
    w.innerHTML=`<label class="block text-sm font-semibold text-navy mb-1">${f.name}</label>${f.help?`<p class="text-xs text-navy/40 mb-1">${esc(f.help)}</p>`:''}`;
    // 量化配置表（合作形式／人數／負責範圍／預估成本）走既有的重複列編輯器，
    // 它本來就有「+ 新增一列」與每列的 ✕，不必另外做一套。
    if(f.type==='repeat'){
      if(f.note)w.appendChild(el('p','text-xs text-navy/45 leading-relaxed mb-2',esc(f.note)));
      const rows=Array.isArray(c.fields[f.id]?.value)?c.fields[f.id].value:[];
      w.appendChild(repeatEditor(f,rows,false,(next)=>{
        S.saveField(c,f.id,next,'user_input'); S.confirmField(c,f.id); save();
      }));
      grid.appendChild(w);
      return;
    }
    let inp;
    if(f.type==='select'){
      inp=el('select','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm bg-white');
      inp.innerHTML='<option value="">—</option>'+f.options.map(o=>`<option ${c.fields[f.id]?.value===o?'selected':''}>${o}</option>`).join('');
    }else if(f.type==='list'){
      inp=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[70px]');
      inp.placeholder='一行一項'; inp.value=listToText(c.fields[f.id]?.value);
    }else if(f.type==='textarea'){
      inp=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[60px]');
      inp.value=c.fields[f.id]?.value||'';
    }else{
      inp=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm');
      inp.value=c.fields[f.id]?.value||'';
    }
    inp.disabled=readOnly();
    const upd=()=>{
      const v=f.type==='list'?textToList(inp.value):inp.value;
      S.saveField(c,f.id,v,'user_input'); S.confirmField(c,f.id); save();
    };
    inp.addEventListener('input',upd); inp.addEventListener('change',upd);
    w.appendChild(inp); grid.appendChild(w);
  });
  wrap.appendChild(grid);
  return wrap;
}

function renderExisting(area){

          S.switchPath(c,'full_design',reason);
          S.addDiscussionItem(c,{module:'existing',topic:'要負責結果，但沒有相應的決定權',reason:'已據此改走完整職務設計',by:'講師'});

// ═══════════ M3 職務與人才規格（一頁一題）═══════════
function m3State(){
  c.modules.m3=c.modules.m3||{structured_values:{}};
  c.modules.m3.sections=c.modules.m3.sections||{};
  return c.modules.m3;
}

function renderM3(area){
  const steps=stepsOf('m3'), i=cursor('m3'), step=steps[i];

  if(step.kind==='m3sec') renderSection(area,step.data);
  else if(step.kind==='m3dim') renderMaturityDim(area,step.data);
  else renderMaturityAggregate(area);

  const isLast=i===steps.length-1;
  stepNav(area,'m3',{
    nextLabel:isLast?'完成規格，進入正式文件':'下一題',
    nextEnabled:true,
    onNext:()=>{S.setModuleStatus(c,'m3','confirmed');goModule('m4');},
  });
}

// ── 一個小節 ──
function renderSection(area,s){
  const st=m3State().sections[s.code]||null;
  const shown=demoShown('sec:'+s.code, st);   // 示範：按 AI 揭露前先藏
  const allConfirmed=F.sectionOutputs(s).every(o=>S.isConfirmed(c,o.id));

  thinkHeader(area,{eyebrow:`職務與人才規格 · ${s.code}`,title:s.title,icon:'target',coreQuestion:s.coreQuestion});
  answerBlock(area,s.rawId,s.responseHint);

  const aiRow=el('div','flex items-center gap-3 mt-5');
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep disabled:opacity-40',
    `<i data-lucide="sparkles" class="w-4 h-4"></i>${shown?'重新整理':'請 AI 幫我整理'}`);
  aiBtn.disabled=readOnly();
  aiBtn.addEventListener('click',async()=>{
    if(isDemo){ demoFakeRun('sec:'+s.code, aiBtn); return; }   // 示範：假裝在跑
    const text=c.fields[s.rawId]?.value;
    // 沒寫東西也讓他按。整理不出來就整理不出來，不要用彈窗擋人。
    const ctx={existing:{'existing.role_reason':c.fields['existing.role_reason']?.value}};
    if(s.isAnchor) ctx.anchorItems=anchorSourceItems(s.code);
    let r=AI.runSection(s.code,text,ctx);
    const rules=F.sectionOutputs(s).map(o=>`・${o.id}｜${o.name}｜${o.type}${o.rule?`｜${o.rule}`:''}`).join('\n');
    r=await runWithAi(r.task_code,
      `《職務與人才規格定位》${s.code} ${s.title}。依使用者的口述整理可編輯草稿。回應品質、資訊不足、推論或不同意見都不阻擋流程。\n各欄位的定義與轉換原則：\n${rules}`
      +(s.guard?`\n特別注意：${s.guard}`:''),
      r, {目前為止談過的內容:caseBrief(s.rawId), 這一題他說的:text, 可用的錨點項目:ctx.anchorItems}, aiBtn);
      if(!r) return;   // AI 不可用時不寫入任何欄位，說明已由 runWithAi 顯示
    S.recordAiJob(c,r.task_code);
    for(const [fid,v] of Object.entries(r.organized_content)){
      if(aiEmpty(v))continue;   // 同 M1：AI 回空值代表沒東西可寫，不是要清空這一格
      S.saveField(c,fid,v,s.isAnchor?'ai_inference':'ai_organized',r.task_code);
    }
    m3State().sections[s.code]={inferences:r.inferences_requiring_confirmation,gaps:r.information_gaps,warnings:r.warnings,source:r._source,model:r._model};
    save();render();
  });
  aiRow.appendChild(aiBtn);
  if(allConfirmed)aiRow.appendChild(el('span','inline-flex items-center gap-1 text-sm text-tealdeep font-semibold',
    '<i data-lucide="check-circle" class="w-4 h-4"></i>本題已確認'));
  area.appendChild(aiRow);

  if(!shown) return;

  if(st.warnings?.length)area.appendChild(el('div','mt-6 p-3.5 rounded-xl bg-accent/8 border border-accent/20 text-sm text-navy/70 leading-relaxed',
    st.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-accent shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

  area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
    '<i data-lucide="list-checks" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">AI 整理草稿（可逐項保留，也可先繼續）</span>'));
  const outWrap=el('div','space-y-3'); area.appendChild(outWrap);
  s.outputs.forEach(o=>outWrap.appendChild(outputCard(o,st)));

  if(s.m5Outputs){
    area.appendChild(el('div','mt-7 mb-3 flex items-center gap-2',
      '<i data-lucide="clipboard-check" class="w-4 h-4 text-accent"></i><span class="text-sm font-bold text-navy">會用到甄選流程設計書的內容</span>'));
    const m5Wrap=el('div','space-y-3'); area.appendChild(m5Wrap);
    s.m5Outputs.forEach(o=>m5Wrap.appendChild(outputCard(o,st)));
  }
}

/** 錨點小節的項目來源：取已確認的上游條目 */
function anchorSourceItems(sectionCode){
  const g=id=>c.fields[id]?.value||[];
  if(sectionCode==='2.3') return [...g('m3.prehire_knowledge'),...g('m3.core_judgments')];
  if(sectionCode==='3.3') return [...g('m3.required_tools'),...g('m3.professional_methods')];
  if(sectionCode==='4.3') return [...g('m3.quality_requirements'),...g('m3.ethics_nonnegotiables')];
  return [];
}


function outputCard(field,st){
  const fv=c.fields[field.id]; const confirmed=fv?.confirmed;
  const box=el('div',`rounded-xl border p-3.5 ${confirmed?'border-tealgreen/40 bg-white':'border-navy/12 bg-white'}`);
  const inf=st.inferences?.find(i=>i.field===field.id);
  const gaps=(st.gaps||[]).filter(g=>g.field===field.id);

  box.appendChild(el('div','flex items-center justify-between mb-2',
    `<div class="font-semibold text-navy text-sm">${field.name}</div>
     <div class="flex items-center gap-1.5">
       ${roleBadge(field.ai)}
       ${confirmed?'<span class="badge bg-tealgreen text-white">已確認</span>':''}
     </div>`));


  const body=el('div'); box.appendChild(body);
  const v=fv?.value;
  const src=field.ai==='AI-I'?'ai_inference':'ai_organized';
  const onChange=(nv)=>{S.saveField(c,field.id,nv,src,fv?.ai_task);save();};

  if(field.type==='list'){
    const t=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[70px] col-ai');
    t.value=listToText(v); t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(textToList(t.value)));
    body.appendChild(t);
  }else if(field.type==='textarea'){
    const t=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[60px] col-ai');
    t.value=v||''; t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(t.value));
    body.appendChild(t);
  }else if(field.type==='select'){
    const sel=el('select','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm bg-white col-ai');
    sel.innerHTML='<option value="">—</option>'+(field.options||[]).map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('');
    sel.disabled=confirmed||readOnly();
    sel.addEventListener('change',()=>onChange(sel.value));
    body.appendChild(sel);
  }else if(field.type==='text'){
    const t=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm col-ai');
    t.value=v||''; t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(t.value));
    body.appendChild(t);
  }else if(field.type==='repeat'){
    body.appendChild(repeatEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }else if(field.type==='fixedrows'){
    body.appendChild(fixedRowsEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }else if(field.type==='anchors'){
    body.appendChild(anchorsEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }

  if(inf) box.appendChild(el('div','mt-2 text-[11px] text-accent flex gap-1.5',
    `<i data-lucide="git-branch" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>AI 提供的補充角度：${esc(inf.note)}`));
  gaps.forEach(g=>box.appendChild(el('div','mt-1 text-[11px] text-navy/50 flex gap-1.5',
    `<i data-lucide="help-circle" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>可選補充：${esc(g.message)}`)));

  // 確認／取消確認
  if(!confirmed){
    const ok=el('button','mt-3 bg-tealgreen text-white px-3.5 py-1.5 rounded-lg text-sm font-semibold disabled:opacity-40','接受這項整理');
    ok.disabled=readOnly();
    ok.addEventListener('click',()=>{S.confirmField(c,field.id);save();render();});
    box.appendChild(ok);
  }else{
    const e=el('button','mt-2 text-xs text-navy/50 hover:text-accent','取消確認並修改');
    e.addEventListener('click',()=>{c.fields[field.id].confirmed=false;save();render();});
    box.appendChild(e);
  }
  return box;
}

// ── 重複物件編輯器（主要工作內容）──────────────────────
/**
 * 欄位一多，橫式表格每格只剩幾個字寬，內容會被截成「t所有的工」這種樣子。
 * 超過四欄就改成一列一張卡片：欄名在上、內容在下、可以換行，讀得到也改得動。
 */
function cardRowsEditor(field,rows,disabled,onChange){
  const wrap=el('div','space-y-3');
  const ro=disabled||readOnly();
  function redraw(){
    wrap.innerHTML='';
    rows.forEach((r,i)=>{
      const card=el('div','rounded-xl border border-navy/12 bg-white p-4');
      const head=el('div','flex items-center justify-between mb-3');
      head.innerHTML=`<span class="text-[11px] font-bold tracking-wider text-tealdeep">第 ${i+1} 項</span>`;
      if(!ro){
        const b=el('button','text-navy/30 hover:text-accent','<i data-lucide="x" class="w-4 h-4"></i>');
        b.addEventListener('click',()=>{rows.splice(i,1);onChange(rows);redraw();});
        head.appendChild(b);
      }
      card.appendChild(head);
      const grid=el('div','grid sm:grid-cols-2 gap-x-4 gap-y-3');
      field.columns.forEach(col=>{
        const cell=el('div', col.wide||(col.key==='statement')?'sm:col-span-2':'');
        cell.innerHTML=`<label class="block text-[11px] font-semibold text-navy/55 mb-1">${col.name}</label>`;
        const node=cellInput({...col,wide:col.type!=='select'&&col.type!=='suggest'},r[col.key],
          'w-full border border-navy/15 rounded-lg px-2.5 py-2 text-sm leading-relaxed resize-y');
        const inp=realInput(node);
        inp.disabled=ro;
        const upd=()=>{rows[i][col.key]=inp.value;onChange(rows);};
        inp.addEventListener('input',upd); inp.addEventListener('change',upd);
        cell.appendChild(node); grid.appendChild(cell);
      });
      card.appendChild(grid); wrap.appendChild(card);
    });
    if(!ro){
      const add=el('button','text-sm text-tealdeep font-semibold','+ 新增一項');
      add.addEventListener('click',()=>{rows.push(Object.fromEntries(field.columns.map(col=>[col.key,col.type==='select'?col.options[0]:''])));onChange(rows);redraw();});
      wrap.appendChild(add);
    }
    if(window.lucide)lucide.createIcons();
  }
  redraw();
  return wrap;
}

/**
 * 建一個輸入框。type='suggest' 會附上建議選項（datalist）：
 * 可以從清單挑，也可以直接打自己的，選項只是加速用的。
 */
let _dlSeq=0;
function cellInput(col,value,cls){
  if(col.type==='select'){
    const s=el('select',cls+' bg-white');
    s.innerHTML=(col.options||[]).map(o=>`<option ${value===o?'selected':''}>${esc(o)}</option>`).join('');
    return s;
  }
  if(col.type==='multi'){
    // 一格可以選多項。存成「A、B、C」的字串，下游文件與匯出不用改。
    const wrap=el('details','relative border border-navy/15 rounded-lg bg-white jd-multi');
    const sum=el('summary','flex items-start gap-1.5 px-2.5 py-2 text-sm cursor-pointer select-none list-none leading-relaxed');
    const ro=readOnly();
    const picked=()=>String(value||'').split('、').map(s=>s.trim()).filter(Boolean);
    /*
     * 每個已選項目都要能就地移除。
     *
     * 原本只能展開面板去取消勾選，而 summary 用了 list-none 把展開三角形藏掉，
     * 等於沒有任何「這裡可以打開」的提示——使用者按下去之後不知道怎麼關掉。
     * 現在：chip 自帶 ✕ 可直接移除，summary 右側補一個開合指示。
     */
    const paintSum=()=>{
      const p=picked();
      const chips=p.map(x=>`<span class="inline-flex items-center gap-1 bg-mist/60 text-navy/75 rounded px-1.5 py-0.5 text-[12px] mr-1 mb-0.5">${esc(x)}`
        +(ro?'':`<button type="button" data-rm="${esc(x)}" aria-label="移除 ${esc(x)}" class="text-navy/35 hover:text-accent leading-none text-[13px]">✕</button>`)
        +`</span>`).join('');
      sum.innerHTML=`<span class="flex-1">${p.length?chips:`<span class="text-navy/35">${esc(col.placeholder||'點這裡選，可複選')}</span>`}</span>`
        +`<i data-lucide="chevron-down" class="w-4 h-4 shrink-0 text-navy/30 mt-0.5 jd-multi-caret"></i>`;
      if(window.lucide)lucide.createIcons();
    };
    paintSum();
    // ✕ 在 summary 裡面，點下去會順手把面板收合，所以要攔掉預設行為
    sum.addEventListener('click',(e)=>{
      const btn=e.target.closest?.('[data-rm]'); if(!btn)return;
      e.preventDefault(); e.stopPropagation();
      const ordered=picked().filter(x=>x!==btn.dataset.rm);
      hidden.value=ordered.join('、'); value=hidden.value;
      paintSum(); syncChecks();
      hidden.dispatchEvent(new Event('input',{bubbles:true}));
    });
    wrap.appendChild(sum);
    const panel=el('div','px-2.5 pb-2.5 pt-1 max-h-52 overflow-y-auto space-y-1 border-t border-navy/10');
    // 這個隱藏 input 是對外的統一介面：呼叫端照舊讀 .value、監聽 input
    const hidden=el('input'); hidden.type='hidden'; hidden.value=value||'';
    // chip 上的 ✕ 移除項目後，面板裡的勾選要跟著取消，否則兩邊會不一致
    const boxes=new Map();
    const syncChecks=()=>{const p=picked();boxes.forEach((cb,opt)=>{cb.checked=p.includes(opt);});};
    (col.options||[]).forEach(o=>{
      const lab=el('label','flex items-start gap-2 text-[13px] text-navy/75 cursor-pointer py-0.5');
      const cb=el('input'); cb.type='checkbox'; cb.className='mt-0.5'; cb.checked=picked().includes(o);
      boxes.set(o,cb);
      cb.addEventListener('change',()=>{
        const set=new Set(picked());
        cb.checked?set.add(o):set.delete(o);
        // 依選項原始順序輸出，避免每次勾選順序都不一樣
        const ordered=(col.options||[]).filter(x=>set.has(x));
        [...set].filter(x=>!(col.options||[]).includes(x)).forEach(x=>ordered.push(x));
        hidden.value=ordered.join('、'); value=hidden.value;
        paintSum();
        hidden.dispatchEvent(new Event('input',{bubbles:true}));
      });
      lab.appendChild(cb); lab.appendChild(el('span','',esc(o)));
      panel.appendChild(lab);
    });
    wrap.appendChild(panel); wrap.appendChild(hidden);
    wrap._input=hidden;
    return wrap;
  }
  if(col.type==='suggest'){
    const wrap=el('div','relative');
    const i=el('input',cls);
    const id='dl'+(++_dlSeq);
    i.setAttribute('list',id);
    i.value=value||''; if(col.placeholder)i.placeholder=col.placeholder;
    const dl=el('datalist'); dl.id=id;
    dl.innerHTML=(col.options||[]).map(o=>`<option value="${esc(o)}">`).join('');
    wrap.appendChild(i); wrap.appendChild(dl);
    wrap._input=i;
    return wrap;
  }
  const i=el(col.wide?'textarea':'input',cls);
  if(col.wide) i.rows=2;
  i.value=value||''; if(col.placeholder)i.placeholder=col.placeholder;
  return i;
}
/** cellInput 可能回傳包裝層，取出真正的輸入元素 */
const realInput = n => n._input || n;

function repeatEditor(field,rows,disabled,onChange){
  // 欄位多的表格改用卡片，避免每格被壓到看不清楚
  if((field.columns||[]).length>4) return cardRowsEditor(field,rows,disabled,onChange);
  const wrap=el('div','overflow-x-auto');
  const tbl=el('table','w-full text-sm border-collapse');
  tbl.innerHTML='<thead><tr>'+field.columns.map(col=>`<th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">${col.name}</th>`).join('')+'<th></th></tr></thead>';
  const tb=el('tbody'); tbl.appendChild(tb);
  function redraw(){
    tb.innerHTML='';
    rows.forEach((r,i)=>{
      const tr=el('tr');
      field.columns.forEach(col=>{
        const td=el('td','px-1 py-1 border-b border-navy/5 align-top');
        const node=cellInput({...col,wide:false},r[col.key],'w-full border border-navy/15 rounded px-1.5 py-1 text-sm');
        const inp=realInput(node);
        inp.disabled=disabled||readOnly();
        const upd=()=>{rows[i][col.key]=inp.value;onChange(rows);};
        inp.addEventListener('input',upd); inp.addEventListener('change',upd);
        td.appendChild(node); tr.appendChild(td);
      });
      const del=el('td','px-1');
      if(!disabled&&!readOnly()){
        const b=el('button','text-navy/30 hover:text-accent','<i data-lucide="x" class="w-4 h-4"></i>');
        b.addEventListener('click',()=>{rows.splice(i,1);onChange(rows);redraw();});
        del.appendChild(b);
      }
      tr.appendChild(del); tb.appendChild(tr);
    });
    if(window.lucide)lucide.createIcons();
  }
  redraw(); wrap.appendChild(tbl);
  if(!disabled&&!readOnly()){
    const add=el('button','mt-2 text-sm text-tealdeep font-semibold','+ 新增一列');
    add.addEventListener('click',()=>{rows.push(Object.fromEntries(field.columns.map(col=>[col.key,col.type==='select'?col.options[0]:''])));onChange(rows);redraw();});
    wrap.appendChild(add);
  }
  // 占比總和提示（不自動修正）
  const total=rows.reduce((s,r)=>{const n=parseFloat(String(r.frequency_share||'').replace('%',''));return s+(isNaN(n)?0:n);},0);
  if(total>0)wrap.appendChild(el('div',`mt-1 text-[11px] ${Math.abs(total-100)<=10?'text-navy/40':'text-accent'}`,
    `時間占比總和：${total}%（宜接近 100%，系統不自動修正）`));
  return wrap;
}

// ── 固定列編輯器（組織關係：對上／對下／平行／對外）──────
function fixedRowsEditor(field,rows,disabled,onChange){
  // 確保四列都在
  const base=field.rows.map(name=>{
    const found=rows.find(r=>r[field.rowKey]===name);
    return found||Object.assign({[field.rowKey]:name},Object.fromEntries(field.columns.map(cc=>[cc.key,''])));
  });
  const wrap=el('div','overflow-x-auto');
  const tbl=el('table','w-full text-sm border-collapse');
  tbl.innerHTML='<thead><tr><th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">'+field.rowName+'</th>'+
    field.columns.map(cc=>`<th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">${cc.name}</th>`).join('')+'</tr></thead>';
  const tb=el('tbody'); tbl.appendChild(tb);
  base.forEach((r,i)=>{
    const tr=el('tr');
    tr.appendChild(el('td','px-2 py-1 border-b border-navy/5 font-semibold text-navy text-xs whitespace-nowrap',esc(r[field.rowKey])));
    field.columns.forEach(cc=>{
      // 欄位少了以後空間夠，「主要負責事項」給多行，寫得下完整描述
      const td=el('td',`px-1 py-1 border-b border-navy/5 align-top${cc.wide?'':' whitespace-nowrap'}`);
      if(cc.wide) td.style.width='55%';
      const node=cellInput(cc,r[cc.key],'w-full border border-navy/15 rounded px-1.5 py-1 text-xs leading-relaxed resize-y');
      const inp=realInput(node);
      inp.disabled=disabled||readOnly();
      const upd=()=>{base[i][cc.key]=inp.value;onChange(base);};
      inp.addEventListener('input',upd); inp.addEventListener('change',upd);
      td.appendChild(node); tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  wrap.appendChild(tbl);
  wrap.appendChild(el('p','mt-1 text-[11px] text-navy/40','這張表不一定放在人力銀行職缺頁面，但應在甄選過程中向候選人口頭說明。'));
  return wrap;
}

/** 取出所有已有內容的 M3 欄位值（確認狀態保留，但不阻擋文件草稿） */
function confirmedM3(){
  const out={};
  [...F.m3OutputFields().map(f=>f.id),'m3.maturity_anchors'].forEach(id=>{
    if(c.fields[id] && c.fields[id].value != null) out[id]=c.fields[id].value;

  ['m5.candidate_process_info','m5.process_steps'].forEach(id=>{

  return out;
}
