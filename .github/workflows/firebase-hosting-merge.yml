# 推到 main 就自動部署到 Firebase Hosting（GCP 專案：careervalue-ormap）
# 需要在 GitHub repo 設定一個 secret：FIREBASE_SERVICE_ACCOUNT_CAREERVALUE_ORMAP
#   內容 = GCP 服務帳戶的 JSON 金鑰（見 CLAUDE.md「自動部署」段落的建立步驟）
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 內容管線：content/**（Markdown）→ blog/**、feed.xml、sitemap.xml
      # 手寫應用頁不經過這一步，維持純靜態（政策見 CLAUDE.md「Build-step policy」）。
      # 產生器檢查沒過時會以非零狀態結束，本 job 直接失敗 → 不會部署 →
      # 線上網站維持前一次成功部署的版本。
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install content pipeline deps
        run: npm ci --omit=dev

      - name: Build content
        run: npm run build:content

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAREERVALUE_ORMAP }}
          channelId: live
          projectId: careervalue-ormap
