<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬職涯覺察報告 | 原味藍圖 Ormap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Noto Sans TC', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .chart-container { position: relative; width: 100%; height: 350px; }
        .mesh-gradient { background: radial-gradient(at 100% 0%, rgba(13, 148, 136, 0.1) 0, transparent 50%), radial-gradient(at 0% 100%, rgba(13, 148, 136, 0.05) 0, transparent 50%); }
    </style>
</head>
<body class="antialiased relative">

    <header class="fixed top-0 w-full glass-nav z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center">
                <a href="dashboard.html" class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white font-black text-lg mr-3 shadow-sm hover:bg-slate-800 transition-colors">O</a>
                <h1 class="text-sm sm:text-lg font-bold text-slate-800">原味藍圖 <span class="text-slate-400 font-normal ml-1">專屬洞察報告</span></h1>
            </div>
            <div id="top-badge" class="text-[10px] font-black text-teal-600 uppercase tracking-widest bg-teal-50 px-3 py-1 rounded-full border border-teal-100">
                Confidential
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-28 pb-20">
        
        <div id="loading-screen" class="flex flex-col items-center justify-center py-32">
            <i data-lucide="loader-2" class="w-12 h-12 text-teal-500 animate-spin mb-4"></i>
            <p class="text-slate-500 font-bold tracking-widest animate-pulse">正在為您調閱專屬報告數據...</p>
        </div>

        <div id="error-screen" class="hidden text-center py-32">
            <i data-lucide="file-warning" class="w-16 h-16 text-rose-400 mx-auto mb-4"></i>
            <h2 class="text-2xl font-black text-slate-800 mb-2">找不到此報告</h2>
            <p class="text-slate-500 mb-6">報告連結可能已失效或網址有誤，請確認後再試。</p>
            <a href="dashboard.html" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold">回到個人儀表板</a>
        </div>

        <div id="report-content" class="hidden opacity-0 transition-opacity duration-1000"></div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDI_joRjSRWZ5qW9sr2rkpQ6o2q-ORhicQ",
            authDomain: "careervalue-ormap.firebaseapp.com",
            projectId: "careervalue-ormap",
            storageBucket: "careervalue-ormap.firebasestorage.app",
            messagingSenderId: "883599167982",
            appId: "1:883599167982:web:6dee33f8abf03de9b53eff",
            measurementId: "G-YR8YK2CBK6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        const reportId = urlParams.get('id');

        // =============================================
        // 📦 資料變數（從 JSON 動態載入）
        // =============================================
        let matrix = [];
        let blockA = {}, blockB = {}, blockC = {};
        let module2A = {}, module2B = {};

        function getBlockB(c1, c2) {
            return blockB[c1+c2] || blockB[c2+c1] || {
                name: '跨域整合者',
                desc: '你具備極佳的特質切換能力，能在不同的挑戰中展現多元的適應力。',
                synergy: '你能在截然不同的維度中找到獨特的平衡。'
            };
        }

        async function loadReportData() {
            try {
                const [twaRes, htiRes] = await Promise.all([
                    fetch('data/twa-matrix.json'),
                    fetch('data/hti-reports.json')
                ]);

                if (!twaRes.ok || !htiRes.ok) throw new Error('JSON 載入失敗');

                const twaData = await twaRes.json();
                const htiData = await htiRes.json();

                // 組裝 TWA matrix（只需要 v 和 n 供雷達圖計算）
                matrix = twaData.matrix.map(item => ({
                    v: item.value,
                    n: item.need
                }));

                // 組裝 HTI blockA
                Object.entries(htiData.blockA).forEach(([code, data]) => {
                    blockA[code] = {
                        title: data.title,
                        adv: data.advantage,
                        instinct: data.instinct,
                        env1: data.env1 || '',
                        env2: data.env2 || '',
                        env3: data.env3 || ''
                    };
                });

                // 組裝 HTI blockB
                Object.entries(htiData.blockB).forEach(([combo, data]) => {
                    blockB[combo] = {
                        name: data.name,
                        desc: data.description,
                        synergy: data.synergy
                    };
                });

                // 組裝 HTI blockC
                Object.entries(htiData.blockC).forEach(([code, data]) => {
                    blockC[code] = {
                        type: data.type_name || data.type,
                        desc: data.description
                    };
                });

                // 組裝模組二
                module2A = htiData.module2A || {};
                module2B = htiData.module2B || {};

                return true;
            } catch (error) {
                console.error('報告資料載入失敗:', error);
                return false;
            }
        }

        // ================= 核心啟動邏輯 =================
        async function fetchReport() {
            if (!reportId) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('error-screen').classList.remove('hidden');
                return;
            }
            try {
                const docSnap = await getDoc(doc(db, "assessments", reportId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.toolType === "HTI") {
                        renderHTIReport(data);
                    } else {
                        renderTWAReport(data);
                    }
                    document.getElementById('loading-screen').classList.add('hidden');
                    const content = document.getElementById('report-content');
                    content.classList.remove('hidden');
                    setTimeout(() => content.classList.remove('opacity-0'), 50);
                } else {
                    throw new Error("Report not found");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('error-screen').classList.remove('hidden');
            }
        }

        // ================= HTI 渲染引擎 (100% 完整重現) =================
        function renderHTIReport(data) {
            document.title = "何倫特質解析報告 | 原味藍圖";
            document.getElementById('top-badge').innerText = "HTI ASSESSMENT";
            document.getElementById('top-badge').className = "text-[10px] font-black text-orange-600 uppercase tracking-widest bg-orange-50 px-3 py-1 rounded-full border border-orange-100";
            
            const scores = data.scores || {};
            const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('zh-TW') : new Date().toLocaleDateString('zh-TW');
            const userName = data.name || "探索者";

            // HTI 演算法
            const sorted = Object.entries(scores).sort(([,a], [,b]) => b - a);
            const Top1 = sorted[0][0]; const Top2 = sorted[1][0]; const Top3 = sorted[2][0];
            const maxScore = sorted[0][1]; const minScore = sorted[5][1];

            const diff = maxScore - minScore;
            let focusStatus, focusDesc, focusAdvice;
            const m2a = module2A;
            if (diff >= 5) {
                focusStatus = m2a['高']?.status || '高度聚焦';
                focusDesc = m2a['高']?.description || '';
                focusAdvice = m2a['高']?.advice || '';
            } else if (diff >= 3 && diff <= 4) {
                focusStatus = m2a['中']?.status || '中度聚焦';
                focusDesc = m2a['中']?.description || '';
                focusAdvice = m2a['中']?.advice || '';
            } else {
                focusStatus = m2a['低']?.status || '低度聚焦';
                focusDesc = m2a['低']?.description || '';
                focusAdvice = m2a['低']?.advice || '';
            }

            const hexArray = ['R', 'I', 'A', 'S', 'E', 'C'];
            let distance = Math.abs(hexArray.indexOf(Top1) - hexArray.indexOf(Top2));
            if (distance > 3) distance = 6 - distance;
            let syncStatus, syncDesc, syncAdvice;
            const m2b = module2B;
            if (distance === 1) {
                syncStatus = m2b['高']?.status || '高度協作';
                syncDesc = m2b['高']?.description || '';
                syncAdvice = m2b['高']?.advice || '';
            } else if (distance === 2) {
                syncStatus = m2b['中']?.status || '中度協作';
                syncDesc = m2b['中']?.description || '';
                syncAdvice = m2b['中']?.advice || '';
            } else {
                syncStatus = m2b['低']?.status || '跨界協作';
                syncDesc = m2b['低']?.description || '';
                syncAdvice = m2b['低']?.advice || '';
            }

            const bA = blockA[Top1] || blockA['R'];
            const bB_main = getBlockB(Top1, Top2);
            const bB_sub1 = getBlockB(Top1, Top3);
            const bB_sub2 = getBlockB(Top2, Top3);
            const bC = blockC[Top3] || blockC['R'];

            // 把 HTI 專屬的 HTML 塞進容器
            document.getElementById('report-content').innerHTML = `
                <div class="bg-white p-8 lg:p-12 rounded-[3rem] shadow-sm border border-slate-200 relative overflow-hidden mb-8" style="background: radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%), radial-gradient(at 0% 100%, rgba(13, 148, 136, 0.05) 0, transparent 50%);">
                    <div class="absolute top-0 left-0 w-full h-3 bg-orange-500"></div>
                    <div class="text-center mb-8">
                        <div class="text-orange-500 font-black tracking-[0.4em] uppercase text-[10px] mb-4">PERSONAL ENERGY MATRIX</div>
                        <h2 class="text-3xl lg:text-5xl font-black text-slate-800 mb-4 tracking-tight uppercase">何倫特質解析報告</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/60 p-6 rounded-3xl border border-white">
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">報告所有人</div>
                            <div class="text-2xl font-black text-slate-800">${userName}</div>
                        </div>
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">分析日期</div>
                            <div class="text-lg font-bold text-slate-600">${dateStr}</div>
                        </div>
                    </div>
                </div>

                <div class="text-center pb-6 mt-12 mb-6">
                    <p class="text-sm font-bold text-slate-400 tracking-widest mb-4">你的專屬動力角色</p>
                    <h3 class="text-4xl md:text-6xl font-black text-slate-900 leading-tight tracking-wide">
                        【${Top1}${Top2}${Top3} <span class="text-orange-500">${bB_main.name}</span>】
                    </h3>
                </div>

                <div class="flex flex-col lg:flex-row gap-12 items-stretch mt-6">
                    <div class="w-full lg:w-1/2 relative overflow-hidden rounded-[3rem] border border-orange-100 shadow-xl shadow-orange-900/5 bg-gradient-to-b from-orange-50 to-white p-8 md:p-14 flex items-center justify-center">
                        <div class="w-full max-w-[460px] relative z-10 chart-container">
                            <canvas id="reportRadarChart"></canvas>
                        </div>
                    </div>
                    <div class="w-full lg:w-1/2 flex flex-col justify-center">
                        <div class="bg-white/80 p-10 md:p-14 rounded-[3rem] border border-white shadow-sm relative overflow-hidden h-full flex flex-col justify-center">
                            <div class="relative z-10">
                                <div class="inline-flex items-center gap-2 px-4 py-2 bg-orange-100/80 text-orange-800 rounded-full text-xs font-black tracking-widest mb-6">
                                    <i data-lucide="zap" class="w-4 h-4"></i> CORE MOTIVE
                                </div>
                                <h4 class="text-3xl font-black text-slate-800 mb-8"><span class="text-orange-500">${bA.title}</span> 的本能</h4>
                                <div class="space-y-6">
                                    <div class="flex items-start gap-4">
                                        <div class="w-8 h-8 rounded-full bg-teal-50 flex items-center justify-center shrink-0 mt-0.5"><i data-lucide="check-circle-2" class="w-5 h-5 text-teal-600"></i></div>
                                        <p class="text-base text-slate-700 leading-loose font-medium">${bA.adv}</p>
                                    </div>
                                    <div class="flex items-start gap-4">
                                        <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center shrink-0 mt-0.5"><i data-lucide="flame" class="w-5 h-5 text-orange-500"></i></div>
                                        <p class="text-base text-slate-700 leading-loose font-medium">${bA.instinct}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="max-w-4xl mx-auto space-y-12 mt-16 bg-white p-8 lg:p-12 rounded-[3rem] border border-slate-200 shadow-sm">
                    <div class="pl-6 border-l-4 border-orange-500">
                        <h4 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">🧭 行動風格</h4>
                        <p class="text-lg text-slate-600 leading-loose"><span class="font-bold text-orange-500">${bB_main.name}</span>。${bB_main.synergy} 作為一位${bB_main.name}，${bB_main.desc}</p>
                    </div>
                    <div class="pl-6 border-l-4 border-teal-500">
                        <h4 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">💡 理想舞台 (最適合的環境特徵)</h4>
                        <p class="text-lg text-slate-600 leading-loose">要讓這樣的風格完美發揮，你需要對的土壤。在日常情境中，你最適合投入於「<span class="font-bold text-teal-600">${bA.env1}</span>」。當身處於「<span class="font-bold text-teal-600">${bA.env2}</span>」時，你會感到特別安心與自在；且你通常偏好「<span class="font-bold text-teal-600">${bA.env3}</span>」。</p>
                    </div>
                    <div class="pl-6 border-l-4 border-slate-300">
                        <h4 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">✨ 獨特氣質</h4>
                        <p class="text-lg text-slate-600 leading-loose">來自「<span class="font-bold text-slate-700">${bC.type}</span>」的特色。${bC.desc}</p>
                    </div>
                </div>

                <div class="bg-slate-50 p-10 md:p-16 rounded-[3rem] border border-slate-100 shadow-sm mt-16">
                    <h3 class="text-2xl font-black text-slate-800 mb-10 flex items-center justify-center gap-3"><i data-lucide="activity" class="text-teal-600 w-6 h-6"></i> 能量分佈客觀狀態</h3>
                    <div class="grid md:grid-cols-2 gap-12 md:gap-20">
                        <div class="space-y-4">
                            <h4 class="text-lg font-black text-teal-600">${focusStatus}</h4>
                            <p class="text-base text-slate-600 leading-loose mb-3">${focusDesc}</p>
                            <div class="bg-teal-100/50 p-4 rounded-xl">
                                <span class="text-xs font-bold text-teal-800 block mb-1">💡 發展建議</span>
                                <p class="text-xs text-teal-700 leading-relaxed">${focusAdvice}</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-lg font-black text-teal-600">${syncStatus}</h4>
                            <p class="text-base text-slate-600 leading-loose mb-3">${syncDesc}</p>
                            <div class="bg-teal-100/50 p-4 rounded-xl">
                                <span class="text-xs font-bold text-teal-800 block mb-1">💡 發展建議</span>
                                <p class="text-xs text-teal-700 leading-relaxed">${syncAdvice}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-orange-50/50 p-10 md:p-16 rounded-[3rem] border border-orange-100 mt-16">
                    <h4 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3"><i data-lucide="layers" class="text-orange-500 w-6 h-6"></i> 你的潛藏動能與發展維度</h4>
                    <p class="text-base text-slate-600 mb-10 leading-loose">人是豐富且多面向的。除了上述的核心風格外，在特定的情境下，你內在的特質也會產生不同的化學反應，展現出以下兩種潛藏的行動風格。這兩者非常適合做為你未來培養興趣、開展副業或嘗試新任務的探索方向：</p>
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-orange-50 hover:-translate-y-1 transition-transform">
                            <span class="font-black text-orange-600 block mb-4 bg-orange-100/50 inline-block px-4 py-2 rounded-xl">潛藏風格一：【${Top1}${Top3} ${bB_sub1.name}】</span>
                            <p class="leading-loose text-slate-600 text-base">${bB_sub1.desc}</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-orange-50 hover:-translate-y-1 transition-transform">
                            <span class="font-black text-orange-600 block mb-4 bg-orange-100/50 inline-block px-4 py-2 rounded-xl">潛藏風格二：【${Top2}${Top3} ${bB_sub2.name}】</span>
                            <p class="leading-loose text-slate-600 text-base">${bB_sub2.desc}</p>
                        </div>
                    </div>
                </div>

                <div class="mt-16 mb-8 text-center">
                    <p class="text-slate-400 text-sm font-medium mb-6">若需進一步的行動策略規劃，歡迎與您的諮詢師聯繫：</p>
                    <a href="https://line.me/R/ti/p/@900gjsny" target="_blank" class="inline-flex items-center justify-center px-10 py-4 bg-white border-2 border-orange-500 text-orange-500 rounded-2xl font-bold text-lg hover:bg-orange-50 hover:-translate-y-1 transition-all shadow-sm">
                        與諮詢師深度對談
                    </a>
                </div>
            `;
            lucide.createIcons();

            // 繪製 HTI 橘色雷達圖
            const ctx = document.getElementById('reportRadarChart');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['R 實踐者', 'I 思考者', 'A 創造者', 'S 支持者', 'E 推進者', 'C 常規者'],
                    datasets: [{
                        data: [scores.R, scores.I, scores.A, scores.S, scores.E, scores.C],
                        backgroundColor: 'rgba(249, 115, 22, 0.25)', borderColor: '#f97316', borderWidth: 3, pointBackgroundColor: '#f97316'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: { r: { beginAtZero: true, ticks: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // ================= TWA 渲染引擎 (保持不變) =================
        function renderTWAReport(data) {
            const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('zh-TW') : new Date().toLocaleDateString('zh-TW');
            const userName = data.name || "探索者";

            document.getElementById('report-content').innerHTML = `
                <div class="bg-white p-8 lg:p-12 rounded-[3rem] shadow-sm border border-slate-200 relative overflow-hidden mesh-gradient mb-8">
                    <div class="absolute top-0 left-0 w-full h-3 bg-teal-600"></div>
                    <div class="text-center mb-8">
                        <div class="text-teal-600 font-black tracking-[0.4em] uppercase text-[10px] mb-4">Discovery Insight Report 2026</div>
                        <h2 class="text-3xl lg:text-5xl font-black text-slate-800 mb-4 tracking-tight uppercase">職涯需求覺察報告</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/60 p-6 rounded-3xl border border-white">
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">報告所有人</div>
                            <div class="text-2xl font-black text-slate-800">${userName}</div>
                        </div>
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">分析日期</div>
                            <div class="text-lg font-bold text-slate-600">${dateStr}</div>
                        </div>
                        <div class="md:col-span-2 mt-2 pt-4 border-t border-slate-200/50">
                            <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-2">長遠職涯目標</div>
                            <div class="text-lg text-slate-700 italic font-medium leading-relaxed">${data.goal || "（未填寫長遠目標）"}</div>
                        </div>
                    </div>
                </div>

                <div class="mb-10 bg-white rounded-[3rem] p-8 lg:p-12 border border-slate-200 shadow-sm flex flex-col md:flex-row items-center gap-10">
                    <div class="flex-1 w-full max-w-sm chart-container"><canvas id="reportRadarChart"></canvas></div>
                    <div class="flex-1 text-center md:text-left border-t md:border-t-0 md:border-l border-slate-200 pt-8 md:pt-0 md:pl-10">
                        <div class="text-xs text-slate-400 font-black mb-4 uppercase tracking-[0.4em]">決策狀態解析</div>
                        <div class="text-4xl lg:text-5xl font-black text-teal-600 mb-4 tracking-tight">${rawData.focusType || "精準分析"}</div>
                        <p class="text-slate-500 text-sm italic font-medium leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-100"><span class="font-bold text-slate-700">高度重視指標：</span><br>${rawData.top5 || '無'}</p>
                    </div>
                </div>

                <div class="bg-white p-8 lg:p-12 rounded-[3rem] border border-slate-200 shadow-sm">
                    <h4 class="text-xl lg:text-2xl font-black text-slate-800 mb-6 flex items-center tracking-tight uppercase">
                        <i data-lucide="message-square" class="w-6 h-6 mr-3 text-teal-500"></i> 個人體悟與覺察
                    </h4>

                    <a href="https://line.me/R/ti/p/@900gjsny" target="_blank" class="inline-flex items-center justify-center px-10 py-4 bg-white border-2 border-teal-500 text-teal-600 rounded-2xl font-bold text-lg hover:bg-teal-50 hover:-translate-y-1 transition-all shadow-sm">

            lucide.createIcons();

            // 繪製 TWA 雙層雷達圖（欄位路徑修正：rawData.scores）
            const ctx = document.getElementById('reportRadarChart');
            const labels = ['成就','舒適','地位','利他','安全','自主'];
            const rawData = data.rawData || {};
            const valsIdeal = labels.map(c => {
                const items = matrix.filter(m => m.v.includes(c));
                let sum = 0; items.forEach(m => { sum += ((rawData.scores || {})['n' + matrix.indexOf(m)] || 0); });
                return (sum / (items.length * 10)) * 100;
            });
            const valsCurrent = labels.map(c => {
                const items = matrix.filter(m => m.v.includes(c));
                let sum = 0; items.forEach(m => { sum += ((rawData.currentScores || {})['n' + matrix.indexOf(m)] || 0); });
                return (sum / (items.length * 10)) * 100;
            });

            new Chart(ctx, {
                type: 'radar',
                data: { 
                    labels, 
                    datasets: [

                options: { 
                    maintainAspectRatio: false, 
                    scales: { r: { min: 0, max: 100, ticks: { display: false } } }, 
                    plugins: { legend: { display: true, position: 'bottom', labels: { font: { family: 'Noto Sans TC', weight: 'bold' } } } }
