<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職務設計與甄選｜案例工作區</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<script>
tailwind.config = { theme: { extend: {
  colors: { primary:'#0d9488', secondary:'#0f172a', ivory:'#FBF8F2', navy:'#142033',
    tealgreen:'#1E9188', tealdeep:'#136E68', accent:'#E88A55', mist:'#DCECEF' },
  fontFamily: { sans:['"Noto Sans TC"','sans-serif'], serif:['"Noto Serif TC"','serif'] },
}}}
</script>
<script src="https://unpkg.com/lucide@1.8.0"></script>
<style>
  body{background:#FBF8F2;color:#142033;}
  h1,h2,.serif{font-family:"Noto Serif TC",serif;}
  .col-raw{background:#F4F1EA;} .col-ai{background:#EAF5F3;} .col-inf{background:#FDF3EA;}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600;}
  textarea{resize:vertical;}
  [contenteditable]:focus{outline:2px solid #1E918855;border-radius:6px;}

  /* ── 思考頁：呼吸感 ── */
  .stage{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;font-size:13px;
         color:#14203399;white-space:nowrap;transition:background .15s ease,color .15s ease;}
  .stage.on{background:#142033;color:#FBF8F2;font-weight:600;}
  .stage.done{color:#136E68;}
  .stage:not(.locked){cursor:pointer;}
  .stage.locked{opacity:.4;}
  .stage-sep{flex:1;height:1px;background:#14203320;min-width:12px;}

  .qlist{counter-reset:q;}
  .qitem{display:flex;gap:14px;margin-bottom:18px;font-size:17px;line-height:2;color:#142033cc;}
  .qitem::before{counter-increment:q;content:counter(q);flex:none;width:26px;height:26px;margin-top:8px;
                 border-radius:50%;background:#DCECEF;color:#136E68;font-size:12px;font-weight:700;
                 display:grid;place-items:center;font-family:"Noto Sans TC",sans-serif;}

  .answer{width:100%;border:1px solid #14203322;border-radius:14px;padding:18px 20px;
          font-size:16px;line-height:1.95;background:#fff;min-height:220px;}
  .answer:focus{outline:none;border-color:#1E9188;box-shadow:0 0 0 4px #1E918818;}
  .answer::placeholder{color:#14203355;}

  details.ref{border:1px solid #14203318;border-radius:12px;background:#fff;}
  details.ref>summary{cursor:pointer;list-style:none;padding:10px 14px;font-size:12.5px;color:#136E68;font-weight:600;}
  details.ref>summary::-webkit-details-marker{display:none}
  details.ref[open]>summary{border-bottom:1px solid #14203312;}
  details.ref .body{padding:12px 14px;font-size:13px;line-height:1.8;color:#142033aa;}
</style>
</head>
<body class="min-h-screen font-sans">

<header class="border-b border-navy/10 bg-ivory/85 backdrop-blur sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <a href="./index.html" class="text-navy/50 hover:text-navy shrink-0"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
      <div class="min-w-0">
        <div class="font-bold leading-tight truncate" id="hCaseTitle">案例</div>
        <div class="text-[11px] text-navy/50 leading-tight truncate" id="hCaseSub"></div>
      </div>
    </div>
    <div class="flex items-center gap-3 shrink-0">
      <div id="accessChip" class="hidden badge bg-accent/15 text-accent"></div>
      <div class="flex items-center gap-1 bg-white rounded-full p-1 border border-navy/10 text-sm" id="identitySwitch">
        <button data-role="student" class="px-3 py-1 rounded-full">學員</button>
        <button data-role="instructor" class="px-3 py-1 rounded-full">講師</button>
      </div>
    </div>
  </div>
</header>

<!-- 頂部流程進度 -->
<div class="border-b border-navy/10 bg-white/70 backdrop-blur sticky top-16 z-20">
  <div class="max-w-3xl mx-auto px-5 py-4">
    <nav id="stageBar"></nav>
  </div>
</div>

<div class="max-w-3xl mx-auto px-5 py-10">
  <div id="closedBanner" class="hidden mb-6 p-4 rounded-xl bg-navy/5 border border-navy/10 text-sm text-navy/60"></div>
  <main id="moduleArea" class="min-w-0"></main>
</div>

<script type="module">
import * as F from './jd-fields.js';
import * as S from './jd-store.js';
import * as AI from './jd-mock-ai.js';
import { DOCUMENTS, getDocument, downloadDocument, downloadAllDocuments, collectPending, countPending } from './jd-word.js';

const $ = (s,r=document)=>r.querySelector(s);
const el=(t,cls,html)=>{const e=document.createElement(t);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const listToText=a=>Array.isArray(a)?a.join('\n'):(a||'');
const textToList=t=>String(t||'').split('\n').map(s=>s.trim()).filter(Boolean);

const caseId = new URLSearchParams(location.search).get('caseId');
let c = S.getCase(caseId);
if(!c){ document.body.innerHTML='<div class="p-10 text-center text-navy/60">找不到案例。<a class="text-tealgreen underline" href="./index.html">回列表</a></div>'; throw new Error('no case'); }

let currentModule = c.current_module || 'existing';

// ── 身分切換 ──
function paintIdentity(){
  const role=S.getIdentity();
  document.querySelectorAll('#identitySwitch button').forEach(b=>{
    const on=b.dataset.role===role;
    b.classList.toggle('bg-navy',on); b.classList.toggle('text-ivory',on); b.classList.toggle('text-navy/60',!on);
  });
}
document.querySelectorAll('#identitySwitch button').forEach(b=>b.addEventListener('click',()=>{S.setIdentity(b.dataset.role);paintIdentity();render();}));
const isInstructor=()=>S.getIdentity()==='instructor';

function save(){ S.saveCase(c); }

// ── 模組是否可進入（前一模組需 confirmed）──
const flow=()=>F.modulesForPath(c.path_type);

function moduleUnlocked(m){
  const seq=flow();
  const idx=seq.indexOf(m);
  if(idx<=0) return true;
  const prev=seq[idx-1];
  return S.getModuleStatus(c,prev)==='confirmed';
}

/* ══════════ 階段 × 步驟 模型 ══════════
   階段（頂部大流程）：思考階段各自一站，三份正式文件與下載合併成「產出文件」。
   步驟（階段內）：一次只顯示一步，避免使用者一往下拉就看到別題。 */

const DOC_MODULES=['m4','m5','m6','output'];

function stages(){
  const think=flow().filter(m=>!DOC_MODULES.includes(m));
  return [...think.map(m=>({key:m,title:F.MODULE_META[m].title,modules:[m]})),
          {key:'docs',title:'產出文件',modules:DOC_MODULES}];
}
const stageOf=(m)=>stages().find(s=>s.modules.includes(m));

/** 一個模組內的步驟清單 */
function stepsOf(mod){
  if(mod==='m1') return F.M1_CHAPTERS.map(ch=>({title:ch.title,kind:'m1ch',data:ch}));
  if(mod==='m2') return F.M2_PARTS.map(p=>({title:p.title,kind:'m2part',data:p}));
  if(mod==='m3') return [
    ...F.m3Sections().map(s=>({title:s.title,kind:'m3sec',data:s})),
    ...F.MATURITY_DIMENSIONS.map(d=>({title:d.name,kind:'m3dim',data:d})),
    {title:'彙整五個維度',kind:'m3agg'},
  ];
  return [{title:F.MODULE_META[mod].title,kind:'single'}];
}

function cursor(mod){
  const st=c.modules[mod]; const n=stepsOf(mod).length;
  return Math.min(Math.max(st?.cursor||0,0),n-1);
}
function setCursor(mod,i){
  if(!c.modules[mod])c.modules[mod]={structured_values:{}};
  c.modules[mod].cursor=Math.max(0,Math.min(i,stepsOf(mod).length-1));
  save();
}

// ── 頂部階段列 ──
function renderStageBar(){
  const bar=$('#stageBar'); bar.innerHTML='';
  const list=stages();
  const curStage=stageOf(currentModule);

  const row=el('div','flex items-center gap-1 overflow-x-auto');
  list.forEach((s,i)=>{
    if(i>0)row.appendChild(el('div','stage-sep'));
    const allDone=s.modules.every(m=>S.getModuleStatus(c,m)==='confirmed');
    const unlocked=moduleUnlocked(s.modules[0]);
    const on=curStage&&curStage.key===s.key;
    const b=el('button',`stage ${on?'on':''} ${allDone?'done':''} ${unlocked?'':'locked'}`);
    const dot = allDone&&!on
      ? `<span class="w-5 h-5 rounded-full bg-tealgreen text-white grid place-items-center shrink-0"><i data-lucide="check" class="w-3 h-3"></i></span>`
      : `<span class="w-5 h-5 rounded-full ${on?'bg-ivory/25':'bg-navy/10'} grid place-items-center text-[11px] font-bold shrink-0">${i+1}</span>`;
    b.innerHTML=`${dot}<span>${s.title}</span>`;
    if(unlocked)b.addEventListener('click',()=>{ goModule(s.modules[0]); });
    row.appendChild(b);
  });
  bar.appendChild(row);

  // 階段內步驟指示
  const steps=stepsOf(currentModule);
  if(steps.length>1){
    const i=cursor(currentModule);
    const sub=el('div','flex items-center gap-2 mt-3');
    sub.innerHTML=`<span class="text-xs text-navy/45 shrink-0">第 ${i+1} / ${steps.length} 題</span>`;
    const dots=el('div','flex items-center gap-1 flex-wrap');
    steps.forEach((s,k)=>{
      const d=el('button',`h-1.5 rounded-full transition-all ${k===i?'w-6 bg-navy':'w-1.5 bg-navy/20 hover:bg-navy/40'}`);
      d.title=`${k+1}. ${s.title}`;
      d.addEventListener('click',()=>{setCursor(currentModule,k);render();});
      dots.appendChild(d);
    });
    sub.appendChild(dots);
    bar.appendChild(sub);
  }
  if(window.lucide)lucide.createIcons();
}

function goModule(m){
  if(!moduleUnlocked(m)){alert('請先完成前一個階段。');return;}
  currentModule=m; c.current_module=m; save(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/** 一頁一題的底部導覽 */
function stepNav(area,mod,{onNext,nextLabel,nextEnabled=true}={}){
  const steps=stepsOf(mod), i=cursor(mod);
  const wrap=el('div','flex items-center justify-between gap-3 mt-10 pt-6 border-t border-navy/10');
  const prev=el('button','inline-flex items-center gap-1.5 px-4 py-2.5 rounded-lg text-navy/60 hover:bg-navy/5 disabled:opacity-30',
    '<i data-lucide="arrow-left" class="w-4 h-4"></i>上一題');
  prev.disabled=i===0;
  prev.addEventListener('click',()=>{setCursor(mod,i-1);render();window.scrollTo({top:0,behavior:'smooth'});});
  wrap.appendChild(prev);

  const isLast=i===steps.length-1;
  const label=nextLabel||(isLast?'完成這個階段':'下一題');
  const next=el('button',`inline-flex items-center gap-1.5 px-5 py-2.5 rounded-lg font-semibold ${nextEnabled?'bg-navy text-ivory hover:bg-tealdeep':'bg-navy/15 text-navy/40 cursor-not-allowed'}`,
    `${label}<i data-lucide="arrow-right" class="w-4 h-4"></i>`);
  next.disabled=!nextEnabled;
  next.addEventListener('click',()=>{
    if(onNext&&isLast){onNext();return;}
    if(isLast)return;
    setCursor(mod,i+1);render();window.scrollTo({top:0,behavior:'smooth'});
  });
  wrap.appendChild(next);
  area.appendChild(wrap);
}

/** 思考頁共用標頭：只放標題，不放邊界說明 */
function thinkHeader(area,{eyebrow,title,icon}){
  area.appendChild(el('header','mb-8',
    `<div class="flex items-center gap-2 mb-2">
       ${icon?`<i data-lucide="${icon}" class="w-4 h-4 text-tealgreen"></i>`:''}
       <span class="text-[11px] tracking-[2px] text-tealdeep font-bold">${esc(eyebrow||'')}</span>
     </div>
     <h1 class="text-2xl font-black text-navy leading-snug">${esc(title)}</h1>`));
}

/** 核心引導問題（畫面上只留這個） */
function questionBlock(area,questions){
  const box=el('div','qlist mb-8');
  questions.forEach(q=>box.appendChild(el('div','qitem',esc(q))));
  area.appendChild(box);
}

/** 口述回應區 */
function answerBlock(area,fieldId,placeholder){
  const wrap=el('div','mb-2');
  wrap.appendChild(el('div','flex items-center gap-1.5 mb-2',
    '<i data-lucide="pencil-line" class="w-4 h-4 text-navy/35"></i><span class="text-sm font-semibold text-navy/70">你的回應</span>'));
  const ta=el('textarea','answer');
  ta.placeholder=placeholder||'用說的就好，不需要先整理成條列。';
  ta.value=c.fields[fieldId]?.value||''; ta.disabled=readOnly();
  ta.addEventListener('input',()=>{S.saveField(c,fieldId,ta.value,'user_input');save();});
  wrap.appendChild(ta);
  area.appendChild(wrap);
  return ta;
}

/** 可收合的參考資料（預設收起，避免增加閱讀負荷） */
function refBlock(area,label,html){
  const d=el('details','ref mb-6');
  d.innerHTML=`<summary><i data-lucide="book-open" class="w-3.5 h-3.5 inline-block align--2 mr-1"></i>${esc(label)}</summary><div class="body">${html}</div>`;
  area.appendChild(d);
}

// ── 存取狀態 / 倒數 ──
let countdownTimer=null;
function renderAccess(){
  S.evaluateClose(c);
  const chip=$('#accessChip'); const banner=$('#closedBanner');
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
  if(S.isClosed(c)){
    chip.classList.remove('hidden'); chip.className='badge bg-navy/10 text-navy/50'; chip.textContent='已關閉';
    banner.classList.remove('hidden');
    banner.innerHTML=`此案例已到達關閉時間，禁止編輯與 AI 呼叫（仍可下載既有結果）。${isInstructor()?'<button id="reopenBtn" class="mt-2 w-full bg-accent text-white rounded-lg py-1.5 font-semibold">講師重新開放 24 小時</button>':'<div class="mt-1 text-navy/40">需講師重新開放。</div>'}`;
    const rb=$('#reopenBtn'); if(rb)rb.addEventListener('click',()=>{const r=prompt('重開理由：','課堂補充');S.reopenCase(c,24,r||'講師重開');save();render();});
    save();
  } else if(c.access.scheduled_close_at || c.access.reopened_until){
    chip.classList.remove('hidden'); banner.classList.add('hidden');
    const tick=()=>{
      const ms=S.remainingMs(c);
      if(ms==null){chip.classList.add('hidden');return;}
      if(ms<=0){renderAccess();render();return;}
      const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);
      chip.className='badge bg-accent/15 text-accent';
      chip.textContent=`${c.access.reopened_until?'重開中':'關閉倒數'} ${h}時${m}分`;
    };
    tick(); countdownTimer=setInterval(tick,30000);
  } else {
    chip.classList.add('hidden'); banner.classList.add('hidden');
  }
}

const readOnly=()=>S.isClosed(c);

// ═══════════ 模組渲染 ═══════════
function render(){
  $('#hCaseTitle').textContent=c.fields['case.title']?.value||'案例';
  $('#hCaseSub').textContent=(c.fields['case.organization_name']?.value||'')+' · '+(c.fields['case.job_title_working']?.value||'');
  paintIdentity(); renderStageBar(); renderAccess();
  const area=$('#moduleArea'); area.innerHTML='';
  const R={existing:renderExisting, m1:renderM1, m2:renderM2, m3:renderM3, m4:renderM4, m5:renderM5, m6:renderM6, output:renderOutput};
  (R[currentModule]||renderExisting)(area);
  if(window.lucide)lucide.createIcons();
}

function moduleHeader(area,m,extra){
  const meta=F.MODULE_META[m];
  area.appendChild(el('div','mb-5',`
    <div class="text-[12px] tracking-[2px] text-tealdeep font-semibold mb-1">${F.groupLabel(m)}</div>
    <h1 class="text-2xl font-black text-navy">${meta.title}</h1>
    <p class="text-navy/55 mt-1">${meta.subtitle}</p>${extra||''}`));
}

// ── 通用：欄位輸入卡（U 純人工）──
function inputCard(field, value, onInput){
  const card=el('div','bg-white rounded-xl border border-navy/10 p-4');
  card.innerHTML=`<div class="flex items-center justify-between mb-1.5">
    <label class="font-semibold text-navy">${field.name}${field.required?' <span class="text-accent">*</span>':''}</label>
    <span class="badge bg-mist text-tealdeep">${F.AI_ROLE_LABEL[field.ai]||''}</span></div>
    ${field.help?`<p class="text-xs text-navy/40 mb-2">${field.help}</p>`:''}`;
  let input;
  if(field.type==='list'){
    input=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[80px] focus:outline-none focus:border-tealgreen');
    input.placeholder='一行一項'; input.value=listToText(value);
    input.addEventListener('input',()=>onInput(textToList(input.value)));
  }else if(field.type==='textarea'){
    input=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[80px] focus:outline-none focus:border-tealgreen');
    input.value=value||''; input.addEventListener('input',()=>onInput(input.value));
  }else{
    input=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-tealgreen');
    input.value=value||''; input.addEventListener('input',()=>onInput(input.value));
  }
  if(readOnly())input.disabled=true;
  card.appendChild(input);
  return card;
}

// ═══════════ M1 問題釐清（一頁一題）═══════════
function m1State(){
  c.modules.m1=c.modules.m1||{structured_values:{}};
  c.modules.m1.chapters=c.modules.m1.chapters||{};
  return c.modules.m1;
}

function renderM1(area){
  const i=cursor('m1');
  const ch=F.M1_CHAPTERS[i];
  const st=m1State().chapters[ch.code]||null;
  const allConfirmed=ch.outputs.every(o=>S.isConfirmed(c,o.id));

  thinkHeader(area,{eyebrow:`問題釐清 · ${ch.code}`,title:ch.title,icon:'search'});
  questionBlock(area,ch.questions);

  if(ch.showProblemTypes){
    refBlock(area,'參考：八種問題類型',
      F.PROBLEM_TYPES.map(t=>`<div style="margin-bottom:6px"><b style="color:#136E68">${t.name}</b>　${esc(t.desc)}</div>`).join(''));
  }

  answerBlock(area,ch.rawId,ch.responseHint);

  const aiRow=el('div','flex items-center gap-3 mt-5');
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep disabled:opacity-40',
    `<i data-lucide="sparkles" class="w-4 h-4"></i>${st?'重新整理':'請 AI 幫我整理'}`);
  aiBtn.disabled=readOnly();
  aiBtn.addEventListener('click',()=>{
    const text=c.fields[ch.rawId]?.value;
    if(!text||!text.trim()){alert('請先在回應區說說你的想法。');return;}
    const r=AI.runM1Chapter(ch.code,text);
    S.recordAiJob(c,r.task_code);
    if(r.cannot_complete){alert(r.cannot_complete_reason);return;}
    for(const[fid,v]of Object.entries(r.organized_content)){
      const f=ch.outputs.find(o=>o.id===fid);
      S.saveField(c,fid,v,f&&f.ai==='AI-I'?'ai_inference':'ai_organized',r.task_code);
    }
    m1State().chapters[ch.code]={inferences:r.inferences_requiring_confirmation,gaps:r.information_gaps,warnings:r.warnings};
    save();render();
  });
  aiRow.appendChild(aiBtn);
  if(allConfirmed)aiRow.appendChild(el('span','inline-flex items-center gap-1 text-sm text-tealdeep font-semibold',
    '<i data-lucide="check-circle" class="w-4 h-4"></i>本題已確認'));
  area.appendChild(aiRow);

  if(st){
    if(st.warnings?.length)area.appendChild(el('div','mt-6 p-3.5 rounded-xl bg-accent/8 border border-accent/20 text-sm text-navy/70 leading-relaxed',
      st.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-accent shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

    area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
      '<i data-lucide="list-checks" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">AI 整理結果，請逐項確認</span>'));
    const outWrap=el('div','space-y-3'); area.appendChild(outWrap);
    ch.outputs.forEach(o=>outWrap.appendChild(outputCard(o,st)));
  }

  const isLast=i===F.M1_CHAPTERS.length-1;
  const allChaptersDone=F.M1_CHAPTERS.every(x=>x.outputs.every(o=>S.isConfirmed(c,o.id)));
  stepNav(area,'m1',{
    nextLabel:isLast?'完成問題釐清':'下一題',
    nextEnabled:!isLast||allChaptersDone,
    onNext:()=>{S.setModuleStatus(c,'m1','confirmed');goModule('m2');},
  });
}


// ═══════════ M2 職務需求界定（勾選式作業 · 一頁一部分）═══════════
function renderM2(area){
  const i=cursor('m2');
  const part=F.M2_PARTS[i];
  const isLast=i===F.M2_PARTS.length-1;

  thinkHeader(area,{eyebrow:`職務需求界定 · ${part.code}`,title:part.title,icon:'list-checks'});
  if(part.note)area.appendChild(el('p','text-[15px] text-navy/60 leading-loose mb-7 -mt-4',esc(part.note)));

  part.blocks.forEach(b=>area.appendChild(renderM2Block(b)));

  // 最後一部分才做整理與交接
  if(isLast){
    const aiWrap=el('div','mt-10 pt-8 border-t border-navy/10');
    aiWrap.appendChild(el('div','flex items-center gap-2 mb-4',
      '<i data-lucide="sparkles" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">整理勾選結果</span>'));
    const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep',
      '<i data-lucide="sparkles" class="w-4 h-4"></i>整理勾選結果');
    aiBtn.disabled=readOnly();
    aiWrap.appendChild(aiBtn);
    const result=el('div','mt-5'); aiWrap.appendChild(result);
    area.appendChild(aiWrap);

    function paintM2(){
      const checks={}; F.m2AllFieldIds().forEach(id=>checks[id]=c.fields[id]?.value);
      const r=AI.runM2(checks); S.recordAiJob(c,'M2-01');
      result.innerHTML='';
      r.contradictions.forEach(x=>result.appendChild(el('div','rounded-xl bg-white border-2 border-accent p-5 mb-4',
        `<div class="font-bold text-accent mb-2 flex items-center gap-1.5"><i data-lucide="alert-triangle" class="w-4 h-4"></i>勾選結果矛盾</div>
         <p class="text-[15px] text-navy/75 leading-loose mb-1">${esc(x.message)}</p>
         <p class="text-sm text-navy/55 leading-loose mb-3">${esc(x.detail)}</p>
         <div class="p-3 rounded-lg bg-mist/50 border border-navy/10 text-sm text-navy/70 leading-loose"><b class="text-tealdeep">由你決定：</b>${esc(x.suggestion)}</div>`)));
      if(r.warnings.length)result.appendChild(el('div','p-3.5 rounded-xl bg-accent/8 border border-accent/20 text-sm text-navy/70 leading-loose mb-4',
        r.warnings.map(w=>`<div>${esc(w)}</div>`).join('')));
      const oc=r.organized_content;
      result.appendChild(el('div','bg-white rounded-xl border border-navy/10 p-5 mb-4',
        `<div class="font-semibold text-navy mb-3 text-sm">整理結果</div>
         <div class="text-sm space-y-2 text-navy/70 leading-relaxed">
           <div><b class="text-tealdeep">環境盤點：</b>${oc.environment_summary.length?oc.environment_summary.length+' 項':'<span class="text-accent">未勾選</span>'}</div>
           <div><b class="text-tealdeep">策略組合：</b>${oc.strategy_combination.length?oc.strategy_combination.map(esc).join('；'):'<span class="text-accent">未勾選</span>'}</div>
           <div><b class="text-tealdeep">人力策略結論：</b>${oc.staffing_decision.map(esc).join('；')||'<span class="text-accent">未勾選</span>'}</div>
           <div><b class="text-tealdeep">角色類型：</b>${oc.role_types.map(esc).join('；')||'<span class="text-accent">未勾選</span>'}</div>
           <div><b class="text-tealdeep">待諮詢：</b>${oc.need_consult.length?oc.need_consult.length+' 項':'無'}</div>
         </div>`));
      refBlock(result,'交接至《職務與人才規格定位》',
        F.M2_HANDOFF.map(h=>`<div style="margin-bottom:8px"><b style="color:#136E68">${h.to}</b><ul style="margin:4px 0 0 16px">${h.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')
        +`<p style="color:#E88A55;margin-top:8px">${esc(F.M2_HANDOFF_NOTE)}</p>`);
      const cf=el('button','bg-tealgreen text-white px-5 py-2.5 rounded-lg font-semibold','確認需求界定，進入職務與人才規格');
      cf.disabled=readOnly();
      cf.addEventListener('click',()=>{S.setModuleStatus(c,'m2','confirmed');goModule('m3');});
      result.appendChild(cf);
      if(window.lucide)lucide.createIcons();
    }
    aiBtn.addEventListener('click',paintM2);
    if(S.getModuleStatus(c,'m2')==='confirmed')paintM2();
  }

  stepNav(area,'m2',{
    nextLabel:isLast?'完成需求界定':'下一部分',
    nextEnabled:!isLast||S.getModuleStatus(c,'m2')==='confirmed',
    onNext:()=>goModule('m3'),
  });
}


function renderM2Block(b){
  const wrap=el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3');
  if(b.title)wrap.appendChild(el('div','font-bold text-navy mb-1',b.title));
  if(b.note)wrap.appendChild(el('p','text-xs text-navy/50 mb-2',esc(b.note)));

  if(b.type==='checklist'){
    const cur=c.fields[b.id]?.value||[];
    b.options.forEach(opt=>{
      const row=el('label','flex items-start gap-2 py-1.5 cursor-pointer hover:bg-mist/30 rounded px-1');
      const chk=el('input'); chk.type='checkbox'; chk.className='accent-tealgreen w-4 h-4 mt-0.5 shrink-0';
      chk.checked=cur.includes(opt); chk.disabled=readOnly();
      chk.addEventListener('change',()=>{
        const v=c.fields[b.id]?.value||[];
        const next=chk.checked?[...v,opt]:v.filter(x=>x!==opt);
        S.saveField(c,b.id,next,'user_input'); S.confirmField(c,b.id); save();
      });
      row.appendChild(chk);
      row.appendChild(el('span','text-sm text-navy/75 leading-snug',esc(opt)));
      wrap.appendChild(row);
    });
    return wrap;
  }

  // type === 'fields'
  const grid=el('div','space-y-3');
  (b.fields||[]).forEach(f=>{
    const w=el('div');
    w.innerHTML=`<label class="block text-sm font-semibold text-navy mb-1">${f.name}</label>${f.help?`<p class="text-xs text-navy/40 mb-1">${esc(f.help)}</p>`:''}`;
    let inp;
    if(f.type==='select'){
      inp=el('select','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm bg-white');
      inp.innerHTML='<option value="">—</option>'+f.options.map(o=>`<option ${c.fields[f.id]?.value===o?'selected':''}>${o}</option>`).join('');
    }else if(f.type==='list'){
      inp=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[70px]');
      inp.placeholder='一行一項'; inp.value=listToText(c.fields[f.id]?.value);
    }else if(f.type==='textarea'){
      inp=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[60px]');
      inp.value=c.fields[f.id]?.value||'';
    }else{
      inp=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm');
      inp.value=c.fields[f.id]?.value||'';
    }
    inp.disabled=readOnly();
    const upd=()=>{
      const v=f.type==='list'?textToList(inp.value):inp.value;
      S.saveField(c,f.id,v,'user_input'); S.confirmField(c,f.id); save();
    };
    inp.addEventListener('input',upd); inp.addEventListener('change',upd);
    w.appendChild(inp); grid.appendChild(w);
  });
  wrap.appendChild(grid);
  return wrap;
}


// ═══════════ existing 基礎確認 ═══════════
function renderExisting(area){
  moduleHeader(area,'existing');
  const grid=el('div','space-y-3'); area.appendChild(grid);
  // 本次優化目標（案例層，唯讀顯示）
  grid.appendChild(el('div','bg-mist/40 rounded-xl border border-navy/10 p-4 text-sm',
    `<div class="font-semibold text-navy mb-1">本次優化目標</div><div class="text-navy/70">${(c.fields['case.optimization_goals']?.value||[]).map(esc).join('、')||'—'}</div>`));
  for(const f of F.EXISTING_FIELDS){
    grid.appendChild(inputCard(f, c.fields[f.id]?.value, v=>{ S.saveField(c,f.id,v,'user_input'); save(); }));
  }
  // 完整度檢查
  const panel=el('div','mt-5'); area.appendChild(panel);
  const btnRow=el('div','flex items-center gap-3');
  const chkBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg font-semibold hover:bg-tealdeep',
    '<i data-lucide="scan-search" class="w-4 h-4"></i>檢查資訊是否足夠');
  chkBtn.disabled=readOnly();
  btnRow.appendChild(chkBtn); panel.appendChild(btnRow);
  const result=el('div','mt-4'); panel.appendChild(result);

  chkBtn.addEventListener('click',()=>{
    const existing={}; F.EXISTING_FIELDS.forEach(f=>existing[f.id]=c.fields[f.id]?.value);
    existing['existing.current_issues']=c.fields['existing.current_issues']?.value;
    const r=AI.runPath01(existing); S.recordAiJob(c,'PATH-01');
    result.innerHTML='';
    if(r.information_gaps.length){
      result.appendChild(el('div','p-4 rounded-xl bg-accent/10 border border-accent/30 mb-3',
        `<div class="font-semibold text-accent mb-1">尚需補齊 ${r.information_gaps.length} 項</div><ul class="text-sm text-navy/70 list-disc ml-5">${r.information_gaps.map(g=>`<li>${esc(g.message)}</li>`).join('')}</ul>`));
    }
    // ── 矛盾路線：系統會擋，但不替你決定 ──
    const decided=c.modules.existing?.contradiction_decision;
    if(r.contradictions.length && !decided){
      r.contradictions.forEach(x=>{
        const panel=el('div','rounded-xl bg-white border-2 border-accent p-4 mb-3');
        panel.innerHTML=`
          <div class="font-bold text-accent mb-1.5 flex items-center gap-1.5"><i data-lucide="alert-triangle" class="w-4 h-4"></i>發現權責矛盾</div>
          <p class="text-sm text-navy/75 mb-1.5">${esc(x.message)}</p>
          <p class="text-sm text-navy/55 mb-3">${esc(x.detail||'')}</p>
          <div class="grid sm:grid-cols-2 gap-2 mb-3">
            ${(x.fields||[]).map(fid=>{
              const f=F.EXISTING_FIELDS.find(ff=>ff.id===fid);
              const v=c.fields[fid]?.value;
              return `<div class="p-2.5 rounded-lg bg-accent/5 border border-accent/20">
                <div class="text-[11px] font-semibold text-accent mb-1">${f?f.name:fid}</div>
                <div class="text-xs text-navy/65 leading-relaxed">${esc(Array.isArray(v)?v.join('；'):(v||''))}</div></div>`;
            }).join('')}
          </div>
          <div class="p-3 rounded-lg bg-mist/50 border border-navy/10 text-sm text-navy/70 mb-3">
            <span class="font-semibold text-tealdeep">接下來由你決定：</span>${esc(x.suggestion)}
          </div>
          <div class="flex flex-wrap gap-2">
            <button data-act="switch" class="bg-accent text-white px-4 py-2 rounded-lg text-sm font-semibold">改走完整職務設計</button>
            <button data-act="keep" class="bg-white border border-navy/20 text-navy px-4 py-2 rounded-lg text-sm font-semibold">維持職務優化，列為待課堂討論</button>
          </div>`;
        result.appendChild(panel);
        panel.querySelector('[data-act="switch"]').addEventListener('click',()=>{
          const reason=prompt('切換路徑的理由（會寫入稽核紀錄）：','責任與授權不相符，需先重新界定需求');
          if(reason===null)return;
          S.switchPath(c,'full_design',reason);
          S.addDiscussionItem(c,{module:'existing',topic:'權責矛盾：被要求負責結果但無相應決定權',reason:'已據此改走完整職務設計',by:'講師'});
          if(!c.modules.existing)c.modules.existing={structured_values:{}};
          c.modules.existing.contradiction_decision={choice:'switch_to_path_a',at:new Date().toISOString()};
          currentModule='m1'; c.current_module='m1'; save(); render();
        });
        panel.querySelector('[data-act="keep"]').addEventListener('click',()=>{
          S.addDiscussionItem(c,{module:'existing',topic:'權責矛盾：被要求負責結果但無相應決定權',reason:'學員選擇維持職務優化，此矛盾未解決，需課堂討論組織授權安排',by:'講師'});
          S.addAuditEvent(c,'contradiction_deferred','維持職務優化，矛盾列為待課堂討論');
          if(!c.modules.existing)c.modules.existing={structured_values:{}};
          c.modules.existing.contradiction_decision={choice:'keep_path_b',at:new Date().toISOString()};
          save(); render();
          alert('已列為待課堂討論。\n此項目會一路帶到最終文件的「待確認事項」，不會被藏起來。');
        });
      });
    }
    if(decided){
      const isSwitch=decided.choice==='switch_to_path_a';
      result.appendChild(el('div','p-3 rounded-xl bg-mist/50 border border-navy/15 text-sm text-navy/70 mb-3',
        `<span class="font-semibold text-tealdeep">已由人決定：</span>${isSwitch?'改走完整職務設計':'維持職務優化，權責矛盾列為待課堂討論（會出現在最終文件的待確認事項）'}`));
    }
    const blockedByContradiction=r.contradictions.length && !decided;
    if(r.organized_content.readiness==='ready' && !blockedByContradiction){
      result.appendChild(el('div','p-4 rounded-xl bg-tealgreen/10 border border-tealgreen/30',
        `<div class="font-semibold text-tealdeep mb-2 flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i>資訊完整，可進入 M3</div>
        <button id="confirmExisting" class="bg-tealgreen text-white px-4 py-2 rounded-lg font-semibold">確認基礎資訊並進入 M3</button>`));
      $('#confirmExisting').addEventListener('click',()=>{
        F.EXISTING_FIELDS.forEach(f=>S.confirmField(c,f.id));
        S.setModuleStatus(c,'existing','confirmed');
        currentModule='m3'; c.current_module='m3'; save(); render();
      });
    }
    if(window.lucide)lucide.createIcons();
  });
}

// ═══════════ M3 職務與人才規格（一頁一題）═══════════
function m3State(){
  c.modules.m3=c.modules.m3||{structured_values:{}};
  c.modules.m3.sections=c.modules.m3.sections||{};
  return c.modules.m3;
}

function renderM3(area){
  const steps=stepsOf('m3'), i=cursor('m3'), step=steps[i];

  if(step.kind==='m3sec') renderSection(area,step.data);
  else if(step.kind==='m3dim') renderMaturityDim(area,step.data);
  else renderMaturityAggregate(area);

  const isLast=i===steps.length-1;
  const outputsOk=F.m3OutputFields().every(f=>S.isConfirmed(c,f.id));
  const maturityOk=S.isConfirmed(c,'m3.maturity_anchors');
  stepNav(area,'m3',{
    nextLabel:isLast?'完成規格，進入正式文件':'下一題',
    nextEnabled:!isLast||(outputsOk&&maturityOk),
    onNext:()=>{S.setModuleStatus(c,'m3','confirmed');goModule('m4');},
  });
}

// ── 一個小節 ──
function renderSection(area,s){
  const st=m3State().sections[s.code]||null;
  const allConfirmed=F.sectionOutputs(s).every(o=>S.isConfirmed(c,o.id));

  thinkHeader(area,{eyebrow:`職務與人才規格 · ${s.code}`,title:s.title,icon:'target'});
  questionBlock(area,s.questions);
  answerBlock(area,s.rawId,s.responseHint);

  const aiRow=el('div','flex items-center gap-3 mt-5');
  const aiBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-tealdeep disabled:opacity-40',
    `<i data-lucide="sparkles" class="w-4 h-4"></i>${st?'重新整理':'請 AI 幫我整理'}`);
  aiBtn.disabled=readOnly();
  aiBtn.addEventListener('click',()=>{
    const text=c.fields[s.rawId]?.value;
    if(!text||!text.trim()){alert('請先在回應區說說你的想法。');return;}
    const ctx={existing:{'existing.role_reason':c.fields['existing.role_reason']?.value}};
    if(s.isAnchor) ctx.anchorItems=anchorSourceItems(s.code);
    const r=AI.runSection(s.code,text,ctx);
    S.recordAiJob(c,r.task_code);
    if(r.cannot_complete){alert(r.cannot_complete_reason);return;}
    for(const [fid,v] of Object.entries(r.organized_content)){
      S.saveField(c,fid,v,s.isAnchor?'ai_inference':'ai_organized',r.task_code);
    }
    m3State().sections[s.code]={inferences:r.inferences_requiring_confirmation,gaps:r.information_gaps,warnings:r.warnings};
    save();render();
  });
  aiRow.appendChild(aiBtn);
  if(allConfirmed)aiRow.appendChild(el('span','inline-flex items-center gap-1 text-sm text-tealdeep font-semibold',
    '<i data-lucide="check-circle" class="w-4 h-4"></i>本題已確認'));
  area.appendChild(aiRow);

  if(!st) return;

  if(st.warnings?.length)area.appendChild(el('div','mt-6 p-3.5 rounded-xl bg-accent/8 border border-accent/20 text-sm text-navy/70 leading-relaxed',
    st.warnings.map(w=>`<div class="flex gap-2"><i data-lucide="info" class="w-4 h-4 text-accent shrink-0 mt-1"></i><span>${esc(w)}</span></div>`).join('')));

  area.appendChild(el('div','mt-8 mb-3 flex items-center gap-2',
    '<i data-lucide="list-checks" class="w-4 h-4 text-tealgreen"></i><span class="text-sm font-bold text-navy">AI 整理結果，請逐項確認</span>'));
  const outWrap=el('div','space-y-3'); area.appendChild(outWrap);
  s.outputs.forEach(o=>outWrap.appendChild(outputCard(o,st)));

  if(s.m5Outputs){
    area.appendChild(el('div','mt-7 mb-3 flex items-center gap-2',
      '<i data-lucide="clipboard-check" class="w-4 h-4 text-accent"></i><span class="text-sm font-bold text-navy">會用到甄選流程設計書的內容</span>'));
    const m5Wrap=el('div','space-y-3'); area.appendChild(m5Wrap);
    s.m5Outputs.forEach(o=>m5Wrap.appendChild(outputCard(o,st)));
  }
}

/** 錨點小節的項目來源：取已確認的上游條目 */
function anchorSourceItems(sectionCode){
  const g=id=>c.fields[id]?.value||[];
  if(sectionCode==='2.3') return [...g('m3.prehire_knowledge'),...g('m3.core_judgments')];
  if(sectionCode==='3.3') return [...g('m3.required_tools'),...g('m3.professional_methods')];
  if(sectionCode==='4.3') return [...g('m3.quality_requirements'),...g('m3.ethics_nonnegotiables')];
  return [];
}


function outputCard(field,st){
  const fv=c.fields[field.id]; const confirmed=fv?.confirmed;
  const box=el('div',`rounded-xl border p-3.5 ${confirmed?'border-tealgreen/40 bg-white':'border-navy/12 bg-white'}`);
  const inf=st.inferences?.find(i=>i.field===field.id);
  const gaps=(st.gaps||[]).filter(g=>g.field===field.id);

  box.appendChild(el('div','flex items-center justify-between mb-2',
    `<div class="font-semibold text-navy text-sm">${field.name}</div>
     <div class="flex items-center gap-1.5">
       <span class="badge ${field.ai==='AI-I'?'bg-accent/15 text-accent':'bg-mist text-tealdeep'}">${F.AI_ROLE_LABEL[field.ai]}</span>
       ${confirmed?'<span class="badge bg-tealgreen text-white">已確認</span>':''}
     </div>`));

  // 轉換原則預設收起，需要時才展開，避免增加閱讀負荷
  if(field.rule){
    const d=el('details','ref mb-2');
    d.innerHTML=`<summary>整理原則</summary><div class="body">${esc(field.rule)}</div>`;
    box.appendChild(d);
  }

  const body=el('div'); box.appendChild(body);
  const v=fv?.value;
  const src=field.ai==='AI-I'?'ai_inference':'ai_organized';
  const onChange=(nv)=>{S.saveField(c,field.id,nv,src,fv?.ai_task);save();};

  if(field.type==='list'){
    const t=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[70px] col-ai');
    t.value=listToText(v); t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(textToList(t.value)));
    body.appendChild(t);
  }else if(field.type==='textarea'){
    const t=el('textarea','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm min-h-[60px] col-ai');
    t.value=v||''; t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(t.value));
    body.appendChild(t);
  }else if(field.type==='select'){
    const sel=el('select','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm bg-white col-ai');
    sel.innerHTML='<option value="">—</option>'+(field.options||[]).map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('');
    sel.disabled=confirmed||readOnly();
    sel.addEventListener('change',()=>onChange(sel.value));
    body.appendChild(sel);
  }else if(field.type==='text'){
    const t=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm col-ai');
    t.value=v||''; t.disabled=confirmed||readOnly();
    t.addEventListener('input',()=>onChange(t.value));
    body.appendChild(t);
  }else if(field.type==='repeat'){
    body.appendChild(repeatEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }else if(field.type==='fixedrows'){
    body.appendChild(fixedRowsEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }else if(field.type==='anchors'){
    body.appendChild(anchorsEditor(field,Array.isArray(v)?v:[],confirmed,onChange));
  }

  if(inf) box.appendChild(el('div','mt-2 text-[11px] text-accent flex gap-1.5',
    `<i data-lucide="git-branch" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>AI 推論待確認：${esc(inf.note)}`));
  gaps.forEach(g=>box.appendChild(el('div','mt-1 text-[11px] text-navy/50 flex gap-1.5',
    `<i data-lucide="help-circle" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>缺口：${esc(g.message)}`)));

  // 確認／取消確認
  if(!confirmed){
    const ok=el('button','mt-3 bg-tealgreen text-white px-3.5 py-1.5 rounded-lg text-sm font-semibold disabled:opacity-40','接受並確認');
    const blocked=field.type==='anchors'&&!(c.fields[field.id]?.value||[]).every(a=>a.minimum_level);
    ok.disabled=readOnly()||blocked;
    if(blocked) box.appendChild(el('p','mt-1 text-[11px] text-accent','每個項目都需由人工設定「最低可接受等級」後才能確認。'));
    ok.addEventListener('click',()=>{S.confirmField(c,field.id);save();render();});
    box.appendChild(ok);
  }else{
    const e=el('button','mt-2 text-xs text-navy/50 hover:text-accent','取消確認並修改');
    e.addEventListener('click',()=>{c.fields[field.id].confirmed=false;save();render();});
    box.appendChild(e);
  }
  return box;
}

// ── 重複物件編輯器（主要工作內容）──────────────────────
function repeatEditor(field,rows,disabled,onChange){
  const wrap=el('div','overflow-x-auto');
  const tbl=el('table','w-full text-sm border-collapse');
  tbl.innerHTML='<thead><tr>'+field.columns.map(col=>`<th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">${col.name}</th>`).join('')+'<th></th></tr></thead>';
  const tb=el('tbody'); tbl.appendChild(tb);
  function redraw(){
    tb.innerHTML='';
    rows.forEach((r,i)=>{
      const tr=el('tr');
      field.columns.forEach(col=>{
        const td=el('td','px-1 py-1 border-b border-navy/5 align-top');
        let inp;
        if(col.type==='select'){
          inp=el('select','w-full border border-navy/15 rounded px-1.5 py-1 text-sm bg-white');
          inp.innerHTML=col.options.map(o=>`<option ${r[col.key]===o?'selected':''}>${o}</option>`).join('');
        }else{
          inp=el('input','w-full border border-navy/15 rounded px-1.5 py-1 text-sm');
          inp.value=r[col.key]||''; if(col.placeholder)inp.placeholder=col.placeholder;
        }
        inp.disabled=disabled||readOnly();
        const upd=()=>{rows[i][col.key]=inp.value;onChange(rows);};
        inp.addEventListener('input',upd); inp.addEventListener('change',upd);
        td.appendChild(inp); tr.appendChild(td);
      });
      const del=el('td','px-1');
      if(!disabled&&!readOnly()){
        const b=el('button','text-navy/30 hover:text-accent','<i data-lucide="x" class="w-4 h-4"></i>');
        b.addEventListener('click',()=>{rows.splice(i,1);onChange(rows);redraw();});
        del.appendChild(b);
      }
      tr.appendChild(del); tb.appendChild(tr);
    });
    if(window.lucide)lucide.createIcons();
  }
  redraw(); wrap.appendChild(tbl);
  if(!disabled&&!readOnly()){
    const add=el('button','mt-2 text-sm text-tealdeep font-semibold','+ 新增一列');
    add.addEventListener('click',()=>{rows.push(Object.fromEntries(field.columns.map(col=>[col.key,col.type==='select'?col.options[0]:''])));onChange(rows);redraw();});
    wrap.appendChild(add);
  }
  // 占比總和提示（不自動修正）
  const total=rows.reduce((s,r)=>{const n=parseFloat(String(r.frequency_share||'').replace('%',''));return s+(isNaN(n)?0:n);},0);
  if(total>0)wrap.appendChild(el('div',`mt-1 text-[11px] ${Math.abs(total-100)<=10?'text-navy/40':'text-accent'}`,
    `時間占比總和：${total}%（宜接近 100%，系統不自動修正）`));
  return wrap;
}

// ── 固定列編輯器（組織關係：對上／對下／平行／對外）──────
function fixedRowsEditor(field,rows,disabled,onChange){
  // 確保四列都在
  const base=field.rows.map(name=>{
    const found=rows.find(r=>r[field.rowKey]===name);
    return found||Object.assign({[field.rowKey]:name},Object.fromEntries(field.columns.map(cc=>[cc.key,''])));
  });
  const wrap=el('div','overflow-x-auto');
  const tbl=el('table','w-full text-sm border-collapse');
  tbl.innerHTML='<thead><tr><th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">'+field.rowName+'</th>'+
    field.columns.map(cc=>`<th class="text-left text-navy/50 font-medium px-2 py-1 border-b border-navy/10 text-xs">${cc.name}</th>`).join('')+'</tr></thead>';
  const tb=el('tbody'); tbl.appendChild(tb);
  base.forEach((r,i)=>{
    const tr=el('tr');
    tr.appendChild(el('td','px-2 py-1 border-b border-navy/5 font-semibold text-navy text-xs whitespace-nowrap',esc(r[field.rowKey])));
    field.columns.forEach(cc=>{
      const td=el('td','px-1 py-1 border-b border-navy/5 align-top');
      const inp=el('input','w-full border border-navy/15 rounded px-1.5 py-1 text-xs');
      inp.value=r[cc.key]||''; inp.disabled=disabled||readOnly();
      const upd=()=>{base[i][cc.key]=inp.value;onChange(base);};
      inp.addEventListener('input',upd);
      td.appendChild(inp); tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  wrap.appendChild(tbl);
  wrap.appendChild(el('p','mt-1 text-[11px] text-navy/40','這張表不一定放在人力銀行職缺頁面，但應在甄選過程中向候選人口頭說明。'));
  return wrap;
}

    else{inp=el('input','w-full border border-navy/15 rounded-lg px-3 py-2 text-sm');inp.value=info[col.key]||'';}
    inp.disabled=readOnly();
    const upd=()=>{info[col.key]=inp.value;S.saveField(c,'m5.candidate_process_info',{...info},'user_input');save();};
    inp.addEventListener('input',upd);inp.addEventListener('change',upd);
    w.appendChild(inp);grid.appendChild(w);
  });
  infoWrap.appendChild(grid);area.appendChild(infoWrap);

  const genBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg font-semibold hover:bg-tealdeep mb-4','<i data-lucide="list-checks" class="w-4 h-4"></i>產生甄選流程建議');
  genBtn.disabled=readOnly();
  area.appendChild(genBtn);
  const preview=el('div');area.appendChild(preview);

  function paint(){
    const confirmed=confirmedM3();
    const r=AI.runM5(confirmed);S.saveField(c,'m5.process_steps',r.organized_content['m5.process_steps'],'ai_inference','M5-01');S.saveField(c,'m5.interview_questions',r.organized_content['m5.interview_questions'],'ai_inference','M5-02');
    const P=F.M5_PROCESS_TABLE, Q=F.M5_QUESTION_TABLE;
    preview.innerHTML='';
    preview.appendChild(el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3',`
      <h3 class="font-bold text-navy mb-2">${P.name}</h3>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-navy/50 text-left">${P.columns.map(cc=>`<th class="px-2 py-1 border-b border-navy/10 text-xs">${cc.name}</th>`).join('')}</tr></thead><tbody>${r.organized_content['m5.process_steps'].map(s=>`<tr>${P.columns.map(cc=>`<td class="px-2 py-1 border-b border-navy/5">${esc(s[cc.key])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
      <h3 class="font-bold text-navy mt-4 mb-2">${Q.name}</h3>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-navy/50 text-left">${Q.columns.map(cc=>`<th class="px-2 py-1 border-b border-navy/10 text-xs">${cc.name}</th>`).join('')}</tr></thead><tbody>${r.organized_content['m5.interview_questions'].map(q=>`<tr>${Q.columns.map(cc=>`<td class="px-2 py-1 border-b border-navy/5 text-xs">${esc(q[cc.key])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
      <h3 class="font-bold text-navy mt-4 mb-2">表格三：各職能的行為定錨等級</h3>
      <div class="text-sm space-y-1">${(r.organized_content['m5.behavior_anchors']||[]).map(a=>`<div class="flex justify-between border-b border-navy/5 py-1"><span>${esc(a.competency)}</span><span class="text-navy/50 text-xs">最低 ${esc(a.minimum_level||'待確認')}／理想 ${esc(a.ideal_level||'待確認')}</span></div>`).join('')||'<span class="text-accent">尚無錨點</span>'}</div>`));
    if(r.warnings.length)preview.appendChild(el('div','p-3 rounded-lg bg-accent/10 border border-accent/25 text-sm text-navy/70 mb-3',r.warnings.map(esc).join('<br>')));
    const cf=el('button','bg-tealgreen text-white px-4 py-2 rounded-lg font-semibold','確認甄選流程，進入 JD');
    cf.disabled=readOnly();
    cf.addEventListener('click',()=>{S.setModuleStatus(c,'m5','confirmed');currentModule='m6';c.current_module='m6';save();render();});
    preview.appendChild(cf);
  }
  genBtn.addEventListener('click',()=>{S.recordAiJob(c,'M5-01');S.recordAiJob(c,'M5-02');S.recordAiJob(c,'M5-03');paint();});
  if(S.getModuleStatus(c,'m5')==='confirmed')paint();
}

// ═══════════ M6 JD 對外文案 ═══════════
function renderM6(area){
  moduleHeader(area,'m6');
  const ready=S.getModuleStatus(c,'m4')==='confirmed'&&S.getModuleStatus(c,'m5')==='confirmed';
  if(!ready){area.appendChild(el('div','p-4 rounded-xl bg-accent/10 border border-accent/30 text-sm text-navy/70','JD 必須等職務說明書與甄選流程設計書都確認後才能產生。'));return;}
  const genBtn=el('button','inline-flex items-center gap-2 bg-navy text-ivory px-4 py-2.5 rounded-lg font-semibold hover:bg-tealdeep mb-4','<i data-lucide="megaphone" class="w-4 h-4"></i>產生候選人版 JD');
  genBtn.disabled=readOnly();
  area.appendChild(genBtn);
  const preview=el('div');area.appendChild(preview);

  function paint(){
    const confirmed=confirmedM3();
    const caseFields={'case.job_title_working':c.fields['case.job_title_working']?.value};
    const r=AI.runM6(confirmed,caseFields);
    for(const[fid,v]of Object.entries(r.organized_content))S.saveField(c,fid,v,'ai_organized','M6-01');
    // QA-02 揭露檢查
    const jdText=JSON.stringify(r.organized_content);
    const qa=AI.runQA02(jdText);S.recordAiJob(c,'QA-02');
    preview.innerHTML='';
    preview.appendChild(el('div','p-3 rounded-lg mb-3 text-sm '+(qa.organized_content.pass?'bg-tealgreen/10 border border-tealgreen/30 text-tealdeep':'bg-accent/10 border-2 border-accent text-navy/70'),
      qa.organized_content.pass?'<b>對外揭露檢查通過</b>：未偵測到完整題目／L1–L5／內部評分。':'<b>揭露檢查未通過</b>：'+qa.warnings.map(esc).join('；')));
    preview.appendChild(el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-3',`
      <div class="text-[11px] text-navy/40 mb-2">下列為對外可揭露內容</div>
      <h3 class="text-lg font-bold text-navy">${esc(r.organized_content['m6.job_title'])}</h3>
      <div class="text-sm space-y-2 mt-2 text-navy/75">
        <div><b class="text-tealdeep">角色定位：</b>${esc(r.organized_content['m6.role_positioning'])}</div>
        <div><b class="text-tealdeep">工作內容：</b><ul class="list-disc ml-5">${r.organized_content['m6.work_items'].map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>
        <div><b class="text-tealdeep">需要具備的職能：</b>${r.organized_content['m6.minimum_competencies'].map(esc).join('、')||'<span class="text-accent">尚未設定最低等級</span>'}</div>
        <div><b class="text-tealdeep">面試流程：</b>${r.organized_content['m6.interview_process'].map(esc).join(' → ')}</div>
      </div>`));
    const cf=el('button',`px-4 py-2 rounded-lg font-semibold ${qa.organized_content.pass?'bg-tealgreen text-white':'bg-navy/15 text-navy/40'}`,'發布前確認，完成三份正式輸出');
    cf.disabled=!qa.organized_content.pass||readOnly();
    cf.addEventListener('click',()=>{S.saveField(c,'m6.publish_confirmation',{confirmed:true,at:new Date().toISOString()},'user_input');S.confirmField(c,'m6.job_title');S.confirmField(c,'m6.role_positioning');S.setModuleStatus(c,'m6','confirmed');c.overall_status='output_ready';currentModule='output';c.current_module='output';save();render();});
    preview.appendChild(cf);
    if(window.lucide)lucide.createIcons();
  }
  genBtn.addEventListener('click',()=>{S.recordAiJob(c,'M6-01');paint();});
  if(S.getModuleStatus(c,'m6')==='confirmed')paint();
}

// ═══════════ output 預覽與下載 ═══════════
function renderOutput(area){
  moduleHeader(area,'output');
  const pending=countPending(c);
  const allConfirmed=['m4','m5','m6'].every(m=>S.getModuleStatus(c,m)==='confirmed');

  // 產生前檢查
  const check=el('div','bg-white rounded-2xl border border-navy/10 p-5 mb-4');
  check.innerHTML=`<div class="font-bold text-navy mb-3">產生前檢查</div>
    <div class="space-y-1.5 text-sm">
      ${checkRow('三份正式輸出已確認',allConfirmed)}
      ${checkRow('JD 通過對外揭露檢查',S.getModuleStatus(c,'m6')==='confirmed')}
      ${checkRow('最低適任等級已由人工確認',allAnchors().length>0&&allAnchors().every(a=>a.minimum_level))}
      ${checkRow(`待確認事項：${pending} 項`+(pending?'（一般補充，警告後可輸出）':''),true,pending>0)}
    </div>`;
  area.appendChild(check);

  // 四份獨立文件：分頁預覽 + 單獨下載
  const docWrap=el('div','bg-white rounded-2xl border border-navy/10 overflow-hidden mb-4');
  docWrap.innerHTML='<div class="px-5 py-3 border-b border-navy/10 font-bold text-navy flex items-center gap-2"><i data-lucide="files" class="w-4 h-4"></i>四份獨立文件</div>';
  const tabs=el('div','flex flex-wrap gap-1.5 px-5 pt-4');
  const meta=el('div','px-5 pt-3 text-xs');
  const iframe=el('iframe','w-full bg-white mt-3');iframe.style.height='460px';iframe.style.border='0';iframe.style.borderTop='1px solid #14203318';
  docWrap.appendChild(tabs);docWrap.appendChild(meta);docWrap.appendChild(iframe);
  area.appendChild(docWrap);

  let activeKey=DOCUMENTS[0].key;
  function paintDoc(){
    tabs.innerHTML='';
    DOCUMENTS.forEach(d=>{
      const on=d.key===activeKey;
      const b=el('button',`px-3 py-1.5 rounded-lg text-sm font-semibold border ${on?'bg-navy text-ivory border-navy':'bg-white text-navy/60 border-navy/15 hover:border-tealgreen/50'}`,d.name);
      b.addEventListener('click',()=>{activeKey=d.key;paintDoc();});
      tabs.appendChild(b);
    });
    const d=getDocument(activeKey);
    meta.innerHTML=`<span class="badge ${d.external?'bg-tealgreen/15 text-tealdeep':'bg-accent/15 text-accent'}">${d.external?'可對外提供':'內部資料，不對外公開'}</span>
      <span class="text-navy/45 ml-2">${d.kind}</span>
      <button id="dlOne" class="ml-2 text-tealdeep font-semibold hover:underline">下載這一份</button>`;
    iframe.srcdoc=d.build(c);
    $('#dlOne').addEventListener('click',()=>{
      const n=downloadDocument(c,d.key);
      c.exports.push({at:new Date().toISOString(),file:n,doc:d.key});
      if(allConfirmed)S.markFirstDownload(c);
      save();render();
    });
    if(window.lucide)lucide.createIcons();
  }
  paintDoc();

  // 下載
  const dlWrap=el('div','bg-navy text-ivory rounded-2xl p-5');
  if(!allConfirmed){
    dlWrap.innerHTML='<div class="font-bold mb-1">尚未可下載</div><p class="text-ivory/70 text-sm">請先完成並確認 M4／M5／M6 三份正式輸出。</p>';
  }else if(c.access.first_final_download_at){
    dlWrap.innerHTML=`<div class="font-bold mb-1 flex items-center gap-2"><i data-lucide="check-circle" class="w-5 h-5 text-tealgreen"></i>已完成首次下載</div>
      <p class="text-ivory/70 text-sm mb-3">首次下載：${new Date(c.access.first_final_download_at).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',hour12:false})}；預定關閉：${c.access.scheduled_close_at?new Date(c.access.scheduled_close_at).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',hour12:false}):'—'}</p>
      <button id="dlAgain" class="bg-ivory text-navy px-4 py-2 rounded-lg font-semibold">再次下載全部四份</button>`;
  }else{
    dlWrap.innerHTML=`<div class="font-bold mb-1">產生並下載四份文件</div>
      <p class="text-ivory/70 text-sm mb-3">引導與思考、職務說明書、甄選流程設計書、JD 對外文案，各自獨立成檔（Word 可開啟的 .doc）。<strong class="text-accent">成功下載後將啟動 72 小時關閉倒數</strong>，關閉後不可編輯與呼叫 AI。</p>
      <button id="dlBtn" class="bg-accent text-white px-5 py-2.5 rounded-lg font-bold inline-flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i>產生並下載全部四份</button>`;
  }
  area.appendChild(dlWrap);

  const dlBtn=$('#dlBtn');
  if(dlBtn)dlBtn.addEventListener('click',()=>{
    if(!confirm('將產生四份文件並進入最終確認，成功下載後開始 72 小時關閉倒數。確定繼續？'))return;
    downloadAllDocuments(c,(doc,name)=>{c.exports.push({at:new Date().toISOString(),file:name,doc:doc.key});save();});
    // 兩段式：下載觸發成功後才記錄首次下載（05 第 8–9 步）
    S.markFirstDownload(c);save();
    setTimeout(()=>{render();alert('四份文件已下載。\n72 小時關閉倒數已啟動。');},DOCUMENTS.length*700+400);
  });
  const dlAgain=$('#dlAgain');
  if(dlAgain)dlAgain.addEventListener('click',()=>{
    downloadAllDocuments(c,(doc,name)=>{c.exports.push({at:new Date().toISOString(),file:name,doc:doc.key});save();});
  });
  if(window.lucide)lucide.createIcons();
}
function checkRow(label,ok,warn){
  const icon=ok?(warn?'alert-circle':'check-circle'):'x-circle';
  const color=ok?(warn?'text-accent':'text-tealgreen'):'text-accent';
  return `<div class="flex items-center gap-2 ${color}"><i data-lucide="${icon}" class="w-4 h-4"></i><span class="text-navy/75">${label}</span></div>`;
}

render();
</script>
</body>
</html>
