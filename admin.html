<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>諮詢師後台 | Ormap CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { primary: '#0d9488', secondary: '#0f172a' } } }
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  body { font-family: 'Noto Sans TC', sans-serif; }
  .status-未測驗 { background:#f1f5f9; color:#64748b; border-color:#e2e8f0; }
  .status-已完成 { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
  .status-已諮詢 { background:#eff6ff; color:#2563eb; border-color:#bfdbfe; }

</head>
<body class="bg-slate-50 min-h-screen antialiased text-slate-900">

<!-- 全頁 loading -->
<div id="initLoading" class="fixed inset-0 bg-slate-50 flex flex-col items-center justify-center z-[100]">

  <p class="text-slate-400 text-sm font-medium">驗證身分中...</p>

<!-- Navbar -->

    <div class="flex justify-between h-16 items-center">
      <div class="flex items-center gap-3">
        <button id="backBtn" onclick="showList()" class="hidden w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-colors">

<!-- 無權限 -->

<!-- ══════════════════════════════════════
     層級一：個案列表
══════════════════════════════════════ -->
<div id="viewList" class="hidden max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

  <!-- 標題 + 統計 -->
  <header class="mb-8 flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-black text-secondary">個案管理</h1>
      <p class="text-slate-500 text-sm mt-1">所有曾使用平台的用戶</p>
    </div>
    <!-- 統計數字 -->
    <div class="flex gap-3 flex-wrap">
      <div class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 flex items-center gap-2">
        <i data-lucide="users" class="w-4 h-4 text-primary"></i>

      </div>
      <div class="px-4 py-2 bg-teal-50 border border-teal-100 rounded-xl text-sm font-bold text-teal-700 flex items-center gap-2">
        <i data-lucide="shield-check" class="w-4 h-4"></i>
        已授權 <span id="statAuthorized">0</span>
      </div>
      <div class="px-4 py-2 bg-slate-100 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 flex items-center gap-2">
        <i data-lucide="shield-off" class="w-4 h-4"></i>
        未授權 <span id="statUnauthorized">0</span>

    </div>
  </header>

  <!-- 搜尋 & 篩選 -->
  <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-6 flex flex-col sm:flex-row gap-3">
    <div class="relative flex-1">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input id="searchInput" type="text" placeholder="搜尋姓名或 Email…"
        class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
    </div>
    <div class="flex gap-2 flex-wrap">
      <!-- 授權篩選 -->
      <select id="filterAccess"
        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
        <option value="">全部用戶</option>
        <option value="authorized">已授權</option>
        <option value="unauthorized">未授權</option>
      </select>
      <!-- 工具篩選 -->
      <select id="filterTool"
        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
        <option value="">全部工具</option>
        <option value="TWA">TWA</option>
        <option value="HTI">HTI</option>
      </select>
      <!-- 狀態篩選（僅已授權有狀態） -->
      <select id="filterStatus"
        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
        <option value="">全部狀態</option>
        <option value="未測驗">未測驗</option>
        <option value="已完成">已完成</option>
        <option value="已諮詢">已諮詢</option>
        <option value="待追蹤">待追蹤</option>
      </select>
      <!-- 排序 -->
      <select id="sortBy"
        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
        <option value="date-desc">最近測驗</option>
        <option value="date-asc">最早測驗</option>
        <option value="name">姓名</option>
      </select>
    </div>
  </div>

  <!-- Loading -->
  <div id="listLoading" class="space-y-3">
    <div class="h-20 bg-slate-200 animate-pulse rounded-2xl"></div>
    <div class="h-20 bg-slate-200 animate-pulse rounded-2xl"></div>
    <div class="h-20 bg-slate-200 animate-pulse rounded-2xl"></div>

  <div id="listEmpty" class="hidden py-24 text-center">
    <div class="flex justify-center mb-4 text-slate-300"><i data-lucide="inbox" class="w-16 h-16"></i></div>
    <h3 class="text-lg font-bold text-slate-600">目前沒有任何用戶資料</h3>
  </div>

  <div id="listNoResult" class="hidden py-24 text-center">
    <div class="flex justify-center mb-4 text-slate-300"><i data-lucide="search-x" class="w-16 h-16"></i></div>
    <h3 class="text-lg font-bold text-slate-600">找不到符合的用戶</h3>
  </div>

  <div id="clientList" class="space-y-3"></div>
</div>

<!-- ══════════════════════════════════════
     層級二：個案詳情
══════════════════════════════════════ -->
<div id="viewDetail" class="hidden max-w-4xl mx-auto px-4 py-8 sm:px-6 lg:px-8 slide-enter">

  <!-- Header -->
  <div class="bg-white rounded-2xl border border-slate-200 p-6 mb-6">
    <div class="flex items-center gap-4">
      <div id="detailAvatar" class="w-14 h-14 rounded-2xl bg-teal-50 text-primary flex items-center justify-center text-xl font-black flex-shrink-0"></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-3 flex-wrap">
          <h2 id="detailName" class="text-xl font-black text-secondary"></h2>
          <div id="detailStatusBadge"></div>
          <div id="detailAuthBadge"></div>
        </div>
        <p id="detailEmail" class="text-sm text-slate-400 mt-0.5"></p>
      </div>
    </div>
  </div>

  <!-- 未授權提示 -->
  <div id="unauthorizedNotice" class="hidden bg-slate-50 border border-slate-200 rounded-2xl p-6 mb-6 text-center">
    <div class="flex justify-center mb-3 text-slate-400"><i data-lucide="lock" class="w-10 h-10"></i></div>
    <h3 class="font-bold text-slate-600 mb-1">此用戶尚未授權查看報告</h3>
    <p class="text-sm text-slate-400">用戶需要在個人後台開啟授權，諮詢師才能查看完整報告內容。</p>
    <div class="mt-4 pt-4 border-t border-slate-200" id="unauthorizedBasicInfo"></div>
  </div>

  <!-- 已授權：快速摘要 -->
  <div id="detailSummarySection" class="hidden bg-white rounded-2xl border border-slate-200 p-6 mb-6">
    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">最新測驗摘要</h3>
    <div id="detailSummaryGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
  </div>

  <!-- 已授權：測驗紀錄 + 縱向追蹤 -->
  <div id="detailAssessmentsSection" class="hidden bg-white rounded-2xl border border-slate-200 p-6 mb-6">
    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">測驗紀錄與縱向追蹤</h3>
    <div id="detailAssessments" class="space-y-6"></div>
  </div>

  <!-- 狀態標籤（已授權才顯示） -->
  <div id="detailStatusSection" class="hidden bg-white rounded-2xl border border-slate-200 p-6 mb-6">
    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">個案狀態</h3>
    <div id="detailStatusButtons" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- 諮詢紀錄（已授權才顯示） -->
  <div id="detailNotesSection" class="hidden bg-white rounded-2xl border border-slate-200 p-6 mb-6">
    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">
      諮詢紀錄
      <span class="text-slate-300 font-normal normal-case ml-1">（最多保留 10 筆）</span>
    </h3>
    <div class="mb-5">
      <textarea id="newNoteInput" rows="3" placeholder="記錄本次諮詢重點、追蹤事項、觀察…"
        class="w-full resize-none bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-700 leading-relaxed focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"></textarea>
      <div class="flex justify-end mt-2">
        <button id="addNoteBtn"
          class="px-5 py-2.5 bg-primary text-white rounded-xl font-bold text-sm hover:bg-teal-700 transition-all flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄
        </button>
      </div>
    </div>
    <div id="noteTimeline" class="space-y-3"></div>
    <div id="noteEmpty" class="hidden py-8 text-center text-slate-400 text-sm">尚無諮詢紀錄</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import {
  getFirestore, collection, query, orderBy, getDocs,
  doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const COUNSELOR_WHITELIST = ["tim010003@gmail.com"];

const firebaseConfig = {
  apiKey: "AIzaSyDI_joRjSRWZ5qW9sr2rkpQ6o2q-ORhicQ",
  authDomain: "careervalue-ormap.firebaseapp.com",
  projectId: "careervalue-ormap",
  storageBucket: "careervalue-ormap.firebasestorage.app",
  messagingSenderId: "883599167982",
  appId: "1:883599167982:web:6dee33f8abf03de9b53eff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STATUS_LIST = ['未測驗', '已完成', '已諮詢', '待追蹤'];
let clientMap = {};
let currentUid = null;
let currentCounselorName = '';
let twaChart = null;

// ── 驗證 ──────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  document.getElementById('initLoading').style.display = 'none';
  if (!user) { window.location.href = 'index.html'; return; }
  if (!COUNSELOR_WHITELIST.includes(user.email)) {
    document.getElementById('navUserInfo').classList.remove('hidden');
    document.getElementById('navUserPhoto').src = user.photoURL || '';
    document.getElementById('navUserName').innerText = user.displayName || user.email;
    document.getElementById('accessDenied').classList.remove('hidden');
    lucide.createIcons(); return;
  }
  currentCounselorName = user.displayName || user.email;
  document.getElementById('navUserInfo').classList.remove('hidden');
  document.getElementById('navUserPhoto').src = user.photoURL || '';
  document.getElementById('navUserName').innerText = currentCounselorName;
  lucide.createIcons();
  loadData();
});

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

// ── 載入所有 assessments ──────────────────────────────
async function loadData() {
  try {
    // ⭐ 層一：不再過濾 counselorAccess，讀取全部
    const q = query(collection(db, "assessments"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    document.getElementById('listLoading').classList.add('hidden');

    if (snapshot.empty) {
      document.getElementById('listEmpty').classList.remove('hidden');
      document.getElementById('viewList').classList.remove('hidden');
      return;
    }

    // 以 uid 群組
    const uids = [...new Set(snapshot.docs.map(d => d.data().uid).filter(Boolean))];
    const notesMap = await fetchNotesByUid(uids);

    clientMap = {};
    snapshot.docs.forEach(docSnap => {
      const data = { id: docSnap.id, ...docSnap.data() };
      const uid = data.uid || data.id;
      const name = data.clientInfo?.name || data.name || '（未留名）';
      const email = data.clientInfo?.email || data.email || '';
      if (!clientMap[uid]) {
        clientMap[uid] = {
          uid, name, email,
          assessments: [],
          note: notesMap[uid] || { status: '', notes: [] },
          authorized: false  // 預設未授權
        };
      }
      clientMap[uid].assessments.push(data);
      // 只要有一筆 counselorAccess == true 就算已授權
      if (data.counselorAccess === true) clientMap[uid].authorized = true;
    });

    // 統計數字
    const allClients = Object.values(clientMap);
    const authorizedCount = allClients.filter(c => c.authorized).length;
    document.getElementById('statTotal').innerText = allClients.length;
    document.getElementById('statAuthorized').innerText = authorizedCount;
    document.getElementById('statUnauthorized').innerText = allClients.length - authorizedCount;

    renderClientList(allClients);
    document.getElementById('viewList').classList.remove('hidden');
  } catch (err) {
    console.error(err);
    document.getElementById('listLoading').classList.add('hidden');
  }
}

async function fetchNotesByUid(uids) {
  const map = {};
  await Promise.all(uids.map(async uid => {
    try {
      const snap = await getDoc(doc(db, "counselor_notes", uid));
      if (snap.exists()) map[uid] = snap.data();
    } catch(e) {}
  }));
  return map;
}

// ── 個案列表渲染 ──────────────────────────────────────
function renderClientList(clients) {
  const container = document.getElementById('clientList');
  container.innerHTML = '';
  document.getElementById('listEmpty').classList.add('hidden');
  document.getElementById('listNoResult').classList.add('hidden');

  if (clients.length === 0) {
    document.getElementById('listNoResult').classList.remove('hidden');
    return;
  }

  clients.forEach(client => {
    const card = document.createElement('div');
    const isAuthorized = client.authorized;

    card.className = `bg-white rounded-2xl border ${isAuthorized ? 'border-slate-200 hover:border-slate-300 hover:shadow-md' : 'border-slate-100'} p-5 flex items-center gap-4 transition-all cursor-pointer ${isAuthorized ? '' : 'opacity-70'}`;
    card.onclick = () => showDetail(client.uid);

    const initial = client.name.charAt(0) || '?';
    const status = client.note?.status || '';
    const tools = [...new Set(client.assessments.map(a => a.toolType))];
    const latestDate = client.assessments[0]?.createdAt?.toDate
      ? client.assessments[0].createdAt.toDate().toLocaleDateString('zh-TW') : '未知';
    const hasNotes = client.note?.notes?.length > 0;

    const toolBadges = tools.map(t => t === 'TWA'
      ? `<span class="text-[10px] font-bold px-2 py-0.5 bg-teal-50 text-teal-700 rounded-full">TWA</span>`
      : `<span class="text-[10px] font-bold px-2 py-0.5 bg-orange-50 text-orange-700 rounded-full">HTI</span>`
    ).join('');

    // 授權標記
    const authBadge = isAuthorized
      ? `<span class="text-[10px] font-bold px-2 py-0.5 bg-teal-50 text-teal-700 border border-teal-100 rounded-full flex items-center gap-1"><i data-lucide="shield-check" class="w-2.5 h-2.5"></i>已授權</span>`
      : `<span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 border border-slate-200 rounded-full flex items-center gap-1"><i data-lucide="shield-off" class="w-2.5 h-2.5"></i>未授權</span>`;

    card.innerHTML = `
      <div class="w-11 h-11 rounded-xl ${isAuthorized ? 'bg-teal-50 text-primary' : 'bg-slate-100 text-slate-400'} flex items-center justify-center text-base font-black flex-shrink-0">${initial}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap mb-1">
          <span class="font-bold ${isAuthorized ? 'text-secondary' : 'text-slate-500'}">${client.name}</span>
          ${authBadge}
          ${status ? `<span class="text-[10px] font-bold px-2 py-0.5 border rounded-full status-${status}">${status}</span>` : ''}
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          ${toolBadges}
          <span class="text-xs text-slate-400">最近 ${latestDate}</span>
          ${hasNotes ? `<span class="text-xs text-slate-400 flex items-center gap-0.5"><i data-lucide="message-square" class="w-3 h-3"></i> 有紀錄</span>` : ''}
        </div>
        ${client.email ? `<p class="text-xs text-slate-400 mt-0.5 truncate">${client.email}</p>` : ''}
      </div>
      <div class="text-right flex-shrink-0 flex flex-col items-end gap-1">
        <div class="text-xs text-slate-400">${client.assessments.length} 份報告</div>
      </div>
      <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 flex-shrink-0"></i>
    `;
    container.appendChild(card);
  });
  lucide.createIcons();
}

// ── 搜尋 & 篩選 & 排序 ───────────────────────────────
function applyFilter() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const access = document.getElementById('filterAccess').value;
  const tool = document.getElementById('filterTool').value;
  const status = document.getElementById('filterStatus').value;
  const sort = document.getElementById('sortBy').value;

  let list = Object.values(clientMap).filter(c => {
    const matchKw = !kw || c.name.toLowerCase().includes(kw) || c.email.toLowerCase().includes(kw);
    const matchAccess = !access || (access === 'authorized' ? c.authorized : !c.authorized);
    const matchTool = !tool || c.assessments.some(a => a.toolType === tool);
    const matchStatus = !status || (c.note?.status || '') === status;
    return matchKw && matchAccess && matchTool && matchStatus;
  });

  // 排序
  if (sort === 'date-desc') {
    list.sort((a, b) => {
      const ta = a.assessments[0]?.createdAt?.toDate?.() || 0;
      const tb = b.assessments[0]?.createdAt?.toDate?.() || 0;
      return tb - ta;
    });
  } else if (sort === 'date-asc') {
    list.sort((a, b) => {
      const ta = a.assessments[0]?.createdAt?.toDate?.() || 0;
      const tb = b.assessments[0]?.createdAt?.toDate?.() || 0;
      return ta - tb;
    });
  } else if (sort === 'name') {
    list.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
  }

  renderClientList(list);
}

['searchInput','filterAccess','filterTool','filterStatus','sortBy'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilter);
  document.getElementById(id).addEventListener('change', applyFilter);
});

// ── 個案詳情 ──────────────────────────────────────────
window.showDetail = (uid) => {
  currentUid = uid;
  const client = clientMap[uid];
  if (!client) return;

  document.getElementById('viewList').classList.add('hidden');
  document.getElementById('viewDetail').classList.remove('hidden');
  document.getElementById('backBtn').classList.remove('hidden');
  document.getElementById('backBtn').classList.add('flex');

  // Header
  document.getElementById('detailAvatar').innerText = client.name.charAt(0);
  document.getElementById('detailName').innerText = client.name;
  document.getElementById('detailEmail').innerText = client.email;

  const status = client.note?.status || '';
  document.getElementById('detailStatusBadge').innerHTML = status
    ? `<span class="text-xs font-bold px-2 py-0.5 border rounded-full status-${status}">${status}</span>` : '';

  document.getElementById('detailAuthBadge').innerHTML = client.authorized
    ? `<span class="text-xs font-bold px-2 py-0.5 bg-teal-50 text-teal-700 border border-teal-100 rounded-full">已授權</span>`
    : `<span class="text-xs font-bold px-2 py-0.5 bg-slate-100 text-slate-500 border border-slate-200 rounded-full">未授權</span>`;

  if (!client.authorized) {
    // 未授權：顯示基本資訊，隱藏報告
    document.getElementById('unauthorizedNotice').classList.remove('hidden');
    document.getElementById('detailSummarySection').classList.add('hidden');
    document.getElementById('detailAssessmentsSection').classList.add('hidden');
    document.getElementById('detailStatusSection').classList.add('hidden');
    document.getElementById('detailNotesSection').classList.add('hidden');

    // 顯示基本資訊（工具類型、測驗日期）
    const tools = [...new Set(client.assessments.map(a => a.toolType))];
    const dates = client.assessments.map(a =>
      a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('zh-TW') : '未知'
    );
    document.getElementById('unauthorizedBasicInfo').innerHTML = `
      <div class="flex flex-wrap gap-4 justify-center text-sm text-slate-500">
        <div><span class="text-slate-400 text-xs block mb-1">使用工具</span>${tools.map(t => `<span class="font-bold text-slate-600">${t}</span>`).join('、')}</div>
        <div><span class="text-slate-400 text-xs block mb-1">測驗次數</span><span class="font-bold text-slate-600">${client.assessments.length} 次</span></div>
        <div><span class="text-slate-400 text-xs block mb-1">最近測驗</span><span class="font-bold text-slate-600">${dates[0] || '未知'}</span></div>
      </div>
    `;
  } else {
    // 已授權：顯示完整功能
    document.getElementById('unauthorizedNotice').classList.add('hidden');
    renderSummary(client);
    renderAssessments(client);
    renderStatusButtons(status);
    renderNotes(client.note?.notes || []);
    document.getElementById('detailSummarySection').classList.remove('hidden');
    document.getElementById('detailAssessmentsSection').classList.remove('hidden');
    document.getElementById('detailStatusSection').classList.remove('hidden');
    document.getElementById('detailNotesSection').classList.remove('hidden');
    document.getElementById('newNoteInput').value = '';
  }

  lucide.createIcons();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.showList = () => {
  currentUid = null;
  document.getElementById('viewDetail').classList.add('hidden');
  document.getElementById('viewList').classList.remove('hidden');
  document.getElementById('backBtn').classList.add('hidden');
  if (twaChart) { twaChart.destroy(); twaChart = null; }
};

// ── 快速摘要 ──────────────────────────────────────────
function renderSummary(client) {
  const grid = document.getElementById('detailSummaryGrid');
  grid.innerHTML = '';
  const twaLatest = client.assessments.find(a => a.toolType === 'TWA');
  const htiLatest = client.assessments.find(a => a.toolType === 'HTI');
  if (twaLatest) {
    const focusType = twaLatest.rawData?.focusType || '—';
    const top5 = twaLatest.rawData?.top5 || '—';
    grid.innerHTML += `<div class="p-4 bg-teal-50 rounded-xl">
      <div class="text-[10px] font-bold text-teal-600 uppercase tracking-widest mb-1">TWA 決策狀態</div>
      <div class="text-base font-black text-teal-800">${focusType}</div>
      <div class="text-xs text-teal-600 mt-1 leading-relaxed">${top5}</div>
    </div>`;
  }
  if (htiLatest) {
    const summary = htiLatest.summary?.text || '—';
    const scores = htiLatest.scores || {};
    const top = Object.entries(scores).sort(([,a],[,b]) => b-a)[0]?.[0] || '—';
    grid.innerHTML += `<div class="p-4 bg-orange-50 rounded-xl">
      <div class="text-[10px] font-bold text-orange-600 uppercase tracking-widest mb-1">HTI 核心特質</div>
      <div class="text-base font-black text-orange-800">${summary}</div>
      <div class="text-xs text-orange-600 mt-1">最高維度：${top}</div>
    </div>`;
  }
}

// ── 測驗紀錄 + 縱向追蹤 ──────────────────────────────
function renderAssessments(client) {
  const container = document.getElementById('detailAssessments');
  container.innerHTML = '';

  const twaList = client.assessments.filter(a => a.toolType === 'TWA')
    .sort((a,b) => (b.createdAt?.toDate?.() || 0) - (a.createdAt?.toDate?.() || 0));
  const htiList = client.assessments.filter(a => a.toolType === 'HTI')
    .sort((a,b) => (b.createdAt?.toDate?.() || 0) - (a.createdAt?.toDate?.() || 0));

  if (twaList.length > 0) {
    const block = document.createElement('div');
    block.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <span class="text-[10px] font-black px-2 py-0.5 bg-teal-50 text-teal-700 rounded-full tracking-widest uppercase">TWA</span>
        <span class="text-sm font-bold text-slate-600">工作價值觀評測</span>
        <span class="text-xs text-slate-400">${twaList.length} 次</span>
      </div>
      <div class="space-y-2 mb-4" id="twaReportList"></div>
      ${twaList.length > 1 ? `<div class="mt-4 pt-4 border-t border-slate-100">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">前五名心理需求歷次變化</p>
        <div style="position:relative;height:220px"><canvas id="twaTrackChart"></canvas></div>
      </div>` : ''}
    `;
    container.appendChild(block);

    const reportList = block.querySelector('#twaReportList');
    twaList.forEach(a => {
      const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('zh-TW') : '未知';
      const focusType = a.rawData?.focusType || '—';
      const div = document.createElement('div');
      div.className = "flex items-center gap-3 p-3 bg-slate-50 rounded-xl hover:bg-teal-50 transition-colors";
      div.innerHTML = `
        <div class="w-1.5 h-1.5 rounded-full bg-teal-400 flex-shrink-0"></div>
        <span class="text-xs text-slate-400 w-20 flex-shrink-0">${date}</span>
        <span class="text-sm text-slate-600 flex-1">${focusType}</span>
        <a href="report.html?id=${a.id}" target="_blank" class="text-xs text-primary font-bold hover:underline flex items-center gap-1">
          查看報告 <i data-lucide="external-link" class="w-3 h-3"></i>
        </a>
      `;
      reportList.appendChild(div);
    });

    if (twaList.length > 1) setTimeout(() => drawTWAChart(twaList), 100);
  }

  if (htiList.length > 0) {
    const block = document.createElement('div');
    block.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <span class="text-[10px] font-black px-2 py-0.5 bg-orange-50 text-orange-700 rounded-full tracking-widest uppercase">HTI</span>
        <span class="text-sm font-bold text-slate-600">何倫特質解析</span>
        <span class="text-xs text-slate-400">${htiList.length} 次</span>
      </div>
      <div class="space-y-2" id="htiReportList"></div>
    `;
    container.appendChild(block);

    const reportList = block.querySelector('#htiReportList');
    htiList.forEach(a => {
      const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('zh-TW') : '未知';
      const summary = a.summary?.text || '—';
      const div = document.createElement('div');
      div.className = "flex items-center gap-3 p-3 bg-slate-50 rounded-xl hover:bg-orange-50 transition-colors";
      div.innerHTML = `
        <div class="w-1.5 h-1.5 rounded-full bg-orange-400 flex-shrink-0"></div>
        <span class="text-xs text-slate-400 w-20 flex-shrink-0">${date}</span>
        <span class="text-sm text-slate-600 flex-1">${summary}</span>
        <a href="report.html?id=${a.id}" target="_blank" class="text-xs text-orange-500 font-bold hover:underline flex items-center gap-1">
          查看報告 <i data-lucide="external-link" class="w-3 h-3"></i>
        </a>
      `;
      reportList.appendChild(div);
    });
  }

  lucide.createIcons();
}

// TWA 縱向追蹤圖
function drawTWAChart(twaList) {
  const ctx = document.getElementById('twaTrackChart');
  if (!ctx) return;
  if (twaChart) { twaChart.destroy(); twaChart = null; }

  const colors = ['#0d9488','#14b8a6','#2dd4bf','#5eead4','#99f6e4'];
  const needNames = {
    n0:'發揮專長',n1:'看見成果',n2:'工作節奏',n3:'獨立作業',n4:'內容變化',
    n5:'薪資福利',n6:'公司穩健',n7:'環境舒適',n8:'升遷與發展',n9:'獲得認可',
    n10:'決策權力',n11:'社會地位',n12:'同事氣氛',n13:'社會貢獻',n14:'價值契合',
    n15:'制度合理',n16:'主管領導',n17:'主管專業',n18:'發揮創意',n19:'責任擔當'
  };

  const latestScores = twaList[0]?.rawData?.scores || {};
  const top5Keys = Object.entries(latestScores).sort(([,a],[,b]) => b-a).slice(0,5).map(([k]) => k);
  const labels = top5Keys.map(k => needNames[`n${k}`] || k);

  const datasets = twaList.slice(0,5).map((a,i) => {
    const scores = a.rawData?.scores || {};
    const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('zh-TW') : `第${i+1}次`;
    return {
      label: date,
      data: top5Keys.map(k => scores[`n${k}`] || 0),
      backgroundColor: colors[i] + '33',
      borderColor: colors[i],
      borderWidth: i === 0 ? 3 : 1.5,
      pointBackgroundColor: colors[i],
      pointRadius: i === 0 ? 4 : 3
    };
  });

  twaChart = new Chart(ctx, {
    type: 'radar',
    data: { labels, datasets },
    options: {
      maintainAspectRatio: false,
      scales: { r: { beginAtZero: true, max: 10, ticks: { display: false }, pointLabels: { font: { family: 'Noto Sans TC', size: 11 } } } },
      plugins: { legend: { display: true, position: 'bottom', labels: { font: { family: 'Noto Sans TC', size: 11 }, boxWidth: 12 } } }
    }
  });
}

// ── 狀態 ──────────────────────────────────────────────
function renderStatusButtons(currentStatus) {
  const container = document.getElementById('detailStatusButtons');
  container.innerHTML = '';
  STATUS_LIST.forEach(s => {
    const isActive = s === currentStatus;
    const btn = document.createElement('button');
    btn.className = isActive
      ? `px-3 py-1.5 text-xs font-bold rounded-full border transition-all status-${s} ring-2 ring-offset-1 ring-current`
      : `px-3 py-1.5 text-xs font-bold rounded-full border transition-all status-${s} opacity-60 hover:opacity-100`;
    btn.innerText = s;
    btn.onclick = () => saveStatus(s, currentStatus);
    container.appendChild(btn);
  });
}

async function saveStatus(newStatus, oldStatus) {
  if (!currentUid) return;
  const finalStatus = newStatus === oldStatus ? '' : newStatus;
  try {
    await setDoc(doc(db, "counselor_notes", currentUid), { status: finalStatus }, { merge: true });
    clientMap[currentUid].note = clientMap[currentUid].note || {};
    clientMap[currentUid].note.status = finalStatus;
    renderStatusButtons(finalStatus);
    document.getElementById('detailStatusBadge').innerHTML = finalStatus
      ? `<span class="text-xs font-bold px-2 py-0.5 border rounded-full status-${finalStatus}">${finalStatus}</span>` : '';
    applyFilter();
    lucide.createIcons();
  } catch(e) { console.error(e); alert("狀態更新失敗"); }
}

// ── 諮詢紀錄 ──────────────────────────────────────────
function renderNotes(notes) {
  const timeline = document.getElementById('noteTimeline');
  const empty = document.getElementById('noteEmpty');
  timeline.innerHTML = '';
  if (!notes || notes.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  [...notes].reverse().forEach((note, i) => {
    const dateStr = note.createdAtStr || '未知時間';
    const div = document.createElement('div');
    div.className = "flex gap-3";
    div.innerHTML = `
      <div class="flex flex-col items-center flex-shrink-0">
        <div class="w-2 h-2 rounded-full bg-primary mt-1.5"></div>
        ${i < notes.length - 1 ? '<div class="w-0.5 bg-slate-200 flex-1 mt-1"></div>' : ''}
      </div>
      <div class="pb-4 flex-1">
        <div class="flex items-center gap-2 mb-1.5">
          <span class="text-xs font-bold text-slate-500">${note.counselorName || '諮詢師'}</span>
          <span class="text-xs text-slate-400">${dateStr}</span>
        </div>
        <div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-700 leading-relaxed">${note.text}</div>
      </div>
    `;
    timeline.appendChild(div);
  });
}

document.getElementById('addNoteBtn').addEventListener('click', async () => {
  if (!currentUid) return;
  const text = document.getElementById('newNoteInput').value.trim();
  if (!text) return;

  const btn = document.getElementById('addNoteBtn');
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 儲存中…';
  lucide.createIcons();

  const existingNotes = clientMap[currentUid].note?.notes || [];
  const newNote = {
    text,
    counselorName: currentCounselorName,
    createdAtStr: new Date().toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
  };
  const updatedNotes = [newNote, ...existingNotes].slice(0, 10);

  try {
    await setDoc(doc(db, "counselor_notes", currentUid), { notes: updatedNotes }, { merge: true });
    clientMap[currentUid].note = clientMap[currentUid].note || {};
    clientMap[currentUid].note.notes = updatedNotes;
    document.getElementById('newNoteInput').value = '';
    renderNotes(updatedNotes);
    applyFilter();
  } catch(e) { console.error(e); alert("儲存失敗，請稍後再試。"); }

  btn.disabled = false;
  btn.innerHTML = '<i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄';
  lucide.createIcons();
});

lucide.createIcons();
</script>
